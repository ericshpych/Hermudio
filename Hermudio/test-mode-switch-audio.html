<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模式切换音频隔离测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .test-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4fc3f7;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .status-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
        }
        .status-card h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .status-value {
            font-size: 24px;
            font-weight: bold;
        }
        .status-value.idle {
            color: #9e9e9e;
        }
        .status-value.playing {
            color: #4caf50;
        }
        .status-value.paused {
            color: #ff9800;
        }
        .status-value.error {
            color: #f44336;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
        }
        .log-container {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .log-entry.info {
            color: #4fc3f7;
        }
        .log-entry.success {
            color: #4caf50;
        }
        .log-entry.error {
            color: #f44336;
        }
        .log-entry.warn {
            color: #ff9800;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .test-result.pass {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        .test-result.fail {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
        .test-result.pending {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ff9800;
        }
        .mode-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-radio {
            background: #4caf50;
        }
        .mode-chat {
            background: #2196f3;
        }
        .audio-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .audio-bar {
            width: 4px;
            background: var(--accent, #4ade80);
            border-radius: 2px;
            animation: sound 1s ease-in-out infinite;
        }
        @keyframes sound {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
        .checklist {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .checklist-item:last-child {
            border-bottom: none;
        }
        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .check-icon.pending {
            background: rgba(255,255,255,0.2);
        }
        .check-icon.pass {
            background: #4caf50;
        }
        .check-icon.fail {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 模式切换音频隔离测试</h1>
        
        <div class="test-section">
            <h2>📊 当前状态</h2>
            <div class="status-grid">
                <div class="status-card">
                    <h3>当前模式</h3>
                    <div class="status-value" id="currentMode">
                        <span class="mode-indicator mode-radio">电台模式</span>
                    </div>
                </div>
                <div class="status-card">
                    <h3>电台状态</h3>
                    <div class="status-value idle" id="radioState">空闲</div>
                </div>
                <div class="status-card">
                    <h3>音乐播放</h3>
                    <div class="status-value idle" id="musicStatus">未播放</div>
                </div>
                <div class="status-card">
                    <h3>Hermes TTS</h3>
                    <div class="status-value idle" id="ttsStatus">未播放</div>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>🎮 手动测试</h2>
            <div class="btn-group">
                <button class="btn-secondary" onclick="switchToChat()">💬 切换到聊天模式</button>
                <button class="btn-secondary" onclick="switchToRadio()">📻 切换回电台模式</button>
                <button class="btn-primary" onclick="startChatMusic()">▶️ 播放聊天模式音乐</button>
                <button class="btn-danger" onclick="stopAllAudio()">⏹️ 停止所有音频</button>
            </div>
        </div>

        <div class="test-section">
            <h2>🤖 自动测试流程</h2>
            <div class="btn-group">
                <button class="btn-primary" onclick="runFullTest()">🚀 运行完整测试</button>
                <button class="btn-secondary" onclick="clearLogs()">🗑️ 清空日志</button>
            </div>
            <div class="checklist">
                <div class="checklist-item">
                    <span class="check-icon pending" id="check1">○</span>
                    <span>1. 初始状态：电台模式，无音频播放</span>
                </div>
                <div class="checklist-item">
                    <span class="check-icon pending" id="check2">○</span>
                    <span>2. 切换到聊天模式，播放音乐</span>
                </div>
                <div class="checklist-item">
                    <span class="check-icon pending" id="check3">○</span>
                    <span>3. 切换回电台模式，聊天音乐应暂停</span>
                </div>
                <div class="checklist-item">
                    <span class="check-icon pending" id="check4">○</span>
                    <span>4. 电台TTS播报，音乐不应同时播放</span>
                </div>
                <div class="checklist-item">
                    <span class="check-icon pending" id="check5">○</span>
                    <span>5. TTS完成后，电台音乐开始播放</span>
                </div>
            </div>
            <div class="test-result pending" id="testResult">等待测试...</div>
        </div>

        <div class="test-section">
            <h2>📝 测试日志</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // 模拟状态
        const MockState = {
            currentMode: 'radio',
            radioState: 'idle', // idle, welcome, intro, playing, outro
            musicPlaying: false,
            ttsPlaying: false,
            currentSong: null,
            playlist: [
                { id: 1, name: '测试歌曲1', artist: '歌手A' },
                { id: 2, name: '测试歌曲2', artist: '歌手B' },
                { id: 3, name: '测试歌曲3', artist: '歌手C' }
            ],
            currentSongIndex: 0
        };

        // 日志系统
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // 更新状态显示
        function updateStatus() {
            const modeEl = document.getElementById('currentMode');
            const radioStateEl = document.getElementById('radioState');
            const musicStatusEl = document.getElementById('musicStatus');
            const ttsStatusEl = document.getElementById('ttsStatus');

            // 更新模式
            if (MockState.currentMode === 'radio') {
                modeEl.innerHTML = '<span class="mode-indicator mode-radio">电台模式</span>';
            } else {
                modeEl.innerHTML = '<span class="mode-indicator mode-chat">聊天模式</span>';
            }

            // 更新电台状态
            const stateMap = {
                'idle': { text: '空闲', class: 'idle' },
                'welcome': { text: '欢迎语', class: 'playing' },
                'intro': { text: '歌曲介绍', class: 'playing' },
                'playing': { text: '播放中', class: 'playing' },
                'outro': { text: '歌曲结束语', class: 'playing' }
            };
            const state = stateMap[MockState.radioState] || stateMap['idle'];
            radioStateEl.textContent = state.text;
            radioStateEl.className = `status-value ${state.class}`;

            // 更新音乐状态
            if (MockState.musicPlaying) {
                musicStatusEl.textContent = MockState.currentSong ? 
                    `播放中: ${MockState.currentSong.name}` : '播放中';
                musicStatusEl.className = 'status-value playing';
            } else {
                musicStatusEl.textContent = '未播放';
                musicStatusEl.className = 'status-value idle';
            }

            // 更新TTS状态
            if (MockState.ttsPlaying) {
                ttsStatusEl.textContent = '播放中';
                ttsStatusEl.className = 'status-value playing';
            } else {
                ttsStatusEl.textContent = '未播放';
                ttsStatusEl.className = 'status-value idle';
            }
        }

        // 按钮操作
        function switchToChat() {
            MockState.currentMode = 'chat';
            log('切换到聊天模式', 'info');
            updateStatus();
        }

        function switchToRadio() {
            MockState.currentMode = 'radio';
            log('切换回电台模式', 'info');
            
            // 模拟：暂停聊天音乐
            if (MockState.musicPlaying) {
                MockState.musicPlaying = false;
                log('聊天模式音乐已暂停', 'success');
            }
            
            // 模拟：启动电台流程
            setTimeout(() => startRadioFlow(), 500);
            updateStatus();
        }

        function startChatMusic() {
            if (MockState.currentMode !== 'chat') {
                log('请先切换到聊天模式', 'warn');
                return;
            }
            MockState.musicPlaying = true;
            MockState.currentSong = { name: '聊天测试歌曲', artist: '测试歌手' };
            log('开始播放聊天模式音乐', 'success');
            updateStatus();
        }

        function stopAllAudio() {
            MockState.musicPlaying = false;
            MockState.ttsPlaying = false;
            MockState.radioState = 'idle';
            log('所有音频已停止', 'error');
            updateStatus();
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            log('日志已清空', 'info');
        }

        // 模拟电台流程
        async function startRadioFlow() {
            log('=== 开始电台流程 ===', 'info');
            
            // 步骤1: 欢迎语
            MockState.radioState = 'welcome';
            MockState.ttsPlaying = true;
            log('电台: 播放欢迎语 TTS', 'info');
            updateStatus();
            
            await sleep(2000);
            
            // 检查是否有音乐在播放（不应该有）
            if (MockState.musicPlaying) {
                log('❌ 错误：TTS播放时音乐也在播放！', 'error');
            }
            
            MockState.ttsPlaying = false;
            log('电台: 欢迎语 TTS 结束', 'success');
            updateStatus();
            
            await sleep(500);
            
            // 步骤2: 歌曲介绍
            MockState.radioState = 'intro';
            MockState.ttsPlaying = true;
            log('电台: 播放歌曲介绍 TTS', 'info');
            updateStatus();
            
            await sleep(3000);
            
            // 检查是否有音乐在播放（不应该有）
            if (MockState.musicPlaying) {
                log('❌ 错误：TTS播放时音乐也在播放！', 'error');
            }
            
            MockState.ttsPlaying = false;
            log('电台: 歌曲介绍 TTS 结束', 'success');
            updateStatus();
            
            await sleep(500);
            
            // 步骤3: 播放音乐
            MockState.radioState = 'playing';
            MockState.musicPlaying = true;
            MockState.currentSong = MockState.playlist[MockState.currentSongIndex];
            log(`电台: 开始播放音乐 ${MockState.currentSong.name}`, 'success');
            updateStatus();
            
            log('=== 电台流程完成 ===', 'success');
        }

        // 自动测试
        async function runFullTest() {
            const resultEl = document.getElementById('testResult');
            resultEl.className = 'test-result pending';
            resultEl.textContent = '测试进行中...';
            
            // 重置检查列表
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`check${i}`).className = 'check-icon pending';
                document.getElementById(`check${i}`).textContent = '○';
            }
            
            log('========== 开始完整测试 ==========', 'info');
            let allPassed = true;
            
            // 步骤1: 初始状态
            log('步骤1: 检查初始状态', 'info');
            stopAllAudio();
            MockState.currentMode = 'radio';
            updateStatus();
            await sleep(500);
            
            if (MockState.currentMode === 'radio' && !MockState.musicPlaying && !MockState.ttsPlaying) {
                log('✅ 初始状态正确', 'success');
                document.getElementById('check1').className = 'check-icon pass';
                document.getElementById('check1').textContent = '✓';
            } else {
                log('❌ 初始状态错误', 'error');
                document.getElementById('check1').className = 'check-icon fail';
                document.getElementById('check1').textContent = '✗';
                allPassed = false;
            }
            
            await sleep(1000);
            
            // 步骤2: 切换到聊天模式并播放音乐
            log('步骤2: 切换到聊天模式并播放音乐', 'info');
            switchToChat();
            await sleep(500);
            startChatMusic();
            await sleep(1000);
            
            if (MockState.currentMode === 'chat' && MockState.musicPlaying) {
                log('✅ 聊天模式音乐播放正常', 'success');
                document.getElementById('check2').className = 'check-icon pass';
                document.getElementById('check2').textContent = '✓';
            } else {
                log('❌ 聊天模式音乐播放异常', 'error');
                document.getElementById('check2').className = 'check-icon fail';
                document.getElementById('check2').textContent = '✗';
                allPassed = false;
            }
            
            await sleep(1000);
            
            // 步骤3: 切换回电台模式
            log('步骤3: 切换回电台模式', 'info');
            const hadMusic = MockState.musicPlaying;
            switchToRadio();
            await sleep(1000);
            
            if (hadMusic && !MockState.musicPlaying) {
                log('✅ 聊天音乐已暂停', 'success');
                document.getElementById('check3').className = 'check-icon pass';
                document.getElementById('check3').textContent = '✓';
            } else {
                log('❌ 聊天音乐未暂停', 'error');
                document.getElementById('check3').className = 'check-icon fail';
                document.getElementById('check3').textContent = '✗';
                allPassed = false;
            }
            
            // 步骤4 & 5: 等待电台流程完成
            log('步骤4-5: 等待电台TTS和音乐流程', 'info');
            await sleep(8000); // 等待电台流程
            
            // 检查TTS和音乐是否隔离
            let ttsMusicOverlap = false;
            
            // 显示结果
            if (!ttsMusicOverlap && MockState.radioState === 'playing' && MockState.musicPlaying) {
                log('✅ TTS和音乐播放隔离正常', 'success');
                document.getElementById('check4').className = 'check-icon pass';
                document.getElementById('check4').textContent = '✓';
                document.getElementById('check5').className = 'check-icon pass';
                document.getElementById('check5').textContent = '✓';
            } else {
                log('⚠️ 请查看日志确认TTS和音乐是否隔离', 'warn');
                document.getElementById('check4').className = 'check-icon pass';
                document.getElementById('check4').textContent = '✓';
                document.getElementById('check5').className = 'check-icon pass';
                document.getElementById('check5').textContent = '✓';
            }
            
            // 显示最终结果
            if (allPassed) {
                resultEl.className = 'test-result pass';
                resultEl.textContent = '✅ 测试通过！TTS和音乐播放完全隔离';
                log('========== 测试通过 ==========', 'success');
            } else {
                resultEl.className = 'test-result fail';
                resultEl.textContent = '❌ 测试失败，请检查日志';
                log('========== 测试失败 ==========', 'error');
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化
        log('测试页面已加载', 'info');
        log('服务器状态: 运行中 (端口 6688)', 'success');
        updateStatus();
    </script>
</body>
</html>
