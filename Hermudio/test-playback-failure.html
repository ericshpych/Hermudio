<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放失败测试 - Hermudio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .test-section {
            background: #12121a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .test-section h2 {
            color: #60a5fa;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .test-button {
            background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            transition: opacity 0.2s;
        }

        .test-button:hover {
            opacity: 0.9;
        }

        .test-button.secondary {
            background: #1a1a25;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .log-container {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-entry.success {
            color: #4ade80;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        .log-entry.warn {
            color: #fbbf24;
        }

        .chat-preview {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            min-height: 200px;
        }

        .chat-message {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .message-time {
            font-size: 11px;
            color: #606070;
        }

        .message-bubble {
            background: #1a1a25;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .song-recommendations {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .song-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1a1a25;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .song-card:hover {
            background: #252532;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .song-card-play {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(74, 222, 128, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #4ade80;
        }

        .song-card-info {
            flex: 1;
        }

        .song-card-title {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 2px;
        }

        .song-card-artist {
            font-size: 12px;
            color: #a0a0b0;
        }

        .clear-logs {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-indicator.online {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        .status-indicator.offline {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 播放失败自动推荐测试</h1>

        <!-- 状态检查 -->
        <div class="test-section">
            <h2>📡 服务状态</h2>
            <p>
                <span id="serverStatus" class="status-indicator offline"></span>
                <span id="serverStatusText">检查中...</span>
            </p>
            <button class="test-button secondary" onclick="checkServerStatus()">刷新状态</button>
        </div>

        <!-- 模拟播放失败测试 -->
        <div class="test-section">
            <h2>🎵 模拟播放失败场景</h2>
            <p style="color: #a0a0b0; margin-bottom: 15px; font-size: 14px;">
                点击以下按钮模拟不同类型的播放失败，验证自动推荐逻辑
            </p>
            <button class="test-button" onclick="simulatePlayFailure('copyright')">模拟版权受限</button>
            <button class="test-button" onclick="simulatePlayFailure('network')">模拟网络错误</button>
            <button class="test-button" onclick="simulatePlayFailure('not_found')">模拟歌曲不存在</button>
            <button class="test-button" onclick="simulatePlayFailure('ncm_not_logged_in')">模拟未登录</button>
            <button class="test-button secondary" onclick="simulatePlayFailure('unknown')">模拟未知错误</button>
        </div>

        <!-- 真实播放测试 -->
        <div class="test-section">
            <h2>🔥 真实播放失败测试</h2>
            <p style="color: #a0a0b0; margin-bottom: 15px; font-size: 14px;">
                尝试播放一首可能因版权问题无法播放的歌曲
            </p>
            <button class="test-button" onclick="testRealPlayFailure()">测试真实播放</button>
        </div>

        <!-- 聊天预览 -->
        <div class="test-section">
            <h2>💬 聊天消息预览</h2>
            <div id="chatPreview" class="chat-preview">
                <div class="chat-message">
                    <div class="message-avatar">🎵</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">Hermes</span>
                            <span class="message-time">--:--</span>
                        </div>
                        <div class="message-bubble">
                            点击上方按钮开始测试，我会在这里显示播放失败消息和推荐歌曲
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志输出 -->
        <div class="test-section">
            <h2>📝 测试日志</h2>
            <div id="logContainer" class="log-container"></div>
            <button class="clear-logs" onclick="clearLogs()">清除日志</button>
        </div>
    </div>

    <script>
        // 日志记录
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            log('日志已清除', 'info');
        }

        // 检查服务器状态
        async function checkServerStatus() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    document.getElementById('serverStatus').className = 'status-indicator online';
                    document.getElementById('serverStatusText').textContent = '服务正常运行';
                    log('服务器连接成功', 'success');
                } else {
                    throw new Error('服务异常');
                }
            } catch (error) {
                document.getElementById('serverStatus').className = 'status-indicator offline';
                document.getElementById('serverStatusText').textContent = '服务离线 - ' + error.message;
                log('服务器连接失败: ' + error.message, 'error');
            }
        }

        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        // 添加聊天消息到预览
        function addChatMessage(text, isUser = false) {
            const container = document.getElementById('chatPreview');
            const message = document.createElement('div');
            message.className = 'chat-message';
            message.innerHTML = `
                <div class="message-avatar">${isUser ? '👤' : '🎵'}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-sender">${isUser ? 'You' : 'Hermes'}</span>
                        <span class="message-time">${getCurrentTime()}</span>
                    </div>
                    <div class="message-bubble">${text}</div>
                </div>
            `;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        // 添加推荐卡片到预览
        function addRecommendationCards(songs, style) {
            const container = document.getElementById('chatPreview');
            
            const styleNames = {
                'pop': '流行',
                'jazz': '爵士',
                'classical': '古典',
                'rock': '摇滚',
                'folk': '民谣',
                'electronic': '电子',
                'light': '轻音乐'
            };
            
            let message = `为你推荐${songs.length}首类似的${styleNames[style] || '流行'}歌曲：<br><br>`;
            songs.forEach((song, index) => {
                message += `${index + 1}. <strong>《${song.name}》</strong> — ${song.artist}<br>`;
            });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            msgDiv.innerHTML = `
                <div class="message-avatar">🎵</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-sender">Hermes</span>
                        <span class="message-time">${getCurrentTime()}</span>
                    </div>
                    <div class="message-bubble">${message}</div>
                    <div class="song-recommendations">
                        ${songs.map((song, index) => `
                            <div class="song-card" onclick="log('点击了歌曲: ${song.name}', 'info')">
                                <div class="song-card-play">▶</div>
                                <div class="song-card-info">
                                    <div class="song-card-title">${song.name}</div>
                                    <div class="song-card-artist">${song.artist}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 模拟播放失败
        async function simulatePlayFailure(errorType) {
            log(`开始模拟播放失败: ${errorType}`, 'info');
            
            // 模拟歌曲数据
            const mockSong = {
                id: 12345,
                name: '测试歌曲',
                artist: '测试艺人',
                album: '测试专辑'
            };
            
            // 模拟错误消息映射
            const errorMessages = {
                'copyright': '播放失败，因为歌曲版权受限',
                'network': '播放失败，因为网络连接问题',
                'not_found': '播放失败，因为歌曲不存在',
                'ncm_not_logged_in': '播放失败，因为需要先登录网易云音乐',
                'unknown': '播放失败，因为未知错误'
            };
            
            const errorMessage = errorMessages[errorType] || '播放失败';
            
            // 显示错误消息
            addChatMessage(`${errorMessage}。让我为你推荐其他类似的歌曲：`);
            log(`显示错误消息: ${errorMessage}`, 'warn');
            
            // 模拟搜索和推荐
            try {
                log('正在搜索类似歌曲...', 'info');
                
                // 模拟异步搜索
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 模拟返回的歌曲数据
                const mockSongs = [
                    { id: 1001, name: '相似歌曲 1', artist: '艺人 A' },
                    { id: 1002, name: '相似歌曲 2', artist: '艺人 B' },
                    { id: 1003, name: '相似歌曲 3', artist: '艺人 C' }
                ];
                
                // 推断风格（这里用 pop 作为默认）
                const style = 'pop';
                
                // 显示推荐卡片
                addRecommendationCards(mockSongs, style);
                log(`成功推荐 ${mockSongs.length} 首歌曲`, 'success');
                
            } catch (error) {
                log('推荐歌曲失败: ' + error.message, 'error');
                addChatMessage('抱歉，推荐歌曲时出错了。你可以直接告诉我你想听什么类型的音乐。');
            }
        }

        // 真实播放失败测试
        async function testRealPlayFailure() {
            log('开始真实播放失败测试...', 'info');
            
            try {
                // 尝试播放一首可能不存在的歌曲
                const fakeSongId = 999999999;
                const fakeEncryptedId = 'INVALID_ID_12345';
                
                log(`尝试播放歌曲 ID: ${fakeSongId}`, 'info');
                
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        songId: fakeSongId,
                        encryptedId: fakeEncryptedId
                    })
                });
                
                const result = await response.json();
                log('播放API返回: ' + JSON.stringify(result), 'info');
                
                if (!result.success) {
                    // 播放失败，触发推荐逻辑
                    const mockSong = {
                        id: fakeSongId,
                        name: '测试歌曲',
                        artist: '测试艺人',
                        album: '测试专辑'
                    };
                    
                    let errorMessage = '播放失败';
                    if (result.error === 'ncm_not_logged_in') {
                        errorMessage = '播放失败，因为需要先登录网易云音乐';
                    } else if (result.message) {
                        errorMessage = `播放失败，因为${result.message}`;
                    }
                    
                    addChatMessage(`${errorMessage}。让我为你推荐其他类似的歌曲：`);
                    
                    // 搜索类似歌曲
                    const searchResponse = await fetch('/api/search?keyword=流行&limit=5');
                    const searchData = await searchResponse.json();
                    
                    if (searchData.success && searchData.data && searchData.data.length > 0) {
                        const songs = searchData.data.slice(0, 3);
                        addRecommendationCards(songs, 'pop');
                        log(`成功推荐 ${songs.length} 首歌曲`, 'success');
                    } else {
                        addChatMessage('抱歉，暂时找不到类似的歌曲。');
                        log('搜索返回空结果', 'warn');
                    }
                } else {
                    log('播放成功（意外）', 'success');
                    addChatMessage('播放成功！');
                }
                
            } catch (error) {
                log('测试失败: ' + error.message, 'error');
                addChatMessage('测试过程中发生错误: ' + error.message);
            }
        }

        // 初始化
        checkServerStatus();
        log('测试页面已加载', 'info');
    </script>
</body>
</html>
