<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Speech API 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #151525 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a0a0b0;
            font-size: 14px;
        }

        .card {
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #4ade80 0%, #60a5fa 100%);
            border-radius: 2px;
        }

        .text-input {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            border-color: #4ade80;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 14px;
            color: #a0a0b0;
        }

        .select-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }

        .select-control:focus {
            border-color: #4ade80;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 40px;
            text-align: right;
            color: #4ade80;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        .status {
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 16px;
        }

        .status-idle {
            background: rgba(255,255,255,0.05);
            color: #a0a0b0;
        }

        .status-speaking {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }

        .wave-animation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
        }

        .wave-bar {
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #4ade80 0%, #60a5fa 100%);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }

        .sample-texts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .sample-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #a0a0b0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sample-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .voice-info {
            font-size: 12px;
            color: #606070;
            margin-top: 4px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Web Speech API 测试</h1>
            <p>测试浏览器的语音合成功能和音色选择</p>
        </div>

        <div class="card">
            <div class="card-title">文本内容</div>
            <textarea class="text-input" id="textInput" placeholder="输入要朗读的文本...">
哈喽，你好呀！欢迎来到 Hermudio 音乐电台。
今天天气真不错，让我为你推荐一些好听的歌曲吧！
希望你能享受这段美好的音乐时光。
            </textarea>
            
            <div class="sample-texts">
                <button class="sample-btn" onclick="setText('你好，世界！这是一个简单的测试。')">简单问候</button>
                <button class="sample-btn" onclick="setText('今天天气真好，适合出去走走。')">天气描述</button>
                <button class="sample-btn" onclick="setText('欢迎使用 Hermudio，AI 个性化音乐电台。')">应用介绍</button>
                <button class="sample-btn" onclick="setText('让我为你推荐一些适合当前心情的音乐。')">音乐推荐</button>
            </div>
            
            <div style="margin-top: 20px;">
                <div class="card-title">💡 推荐参数预设</div>
                <div class="sample-texts">
                    <button class="sample-btn" onclick="setPreset(1.0, 1.0, 1.0)">标准模式</button>
                    <button class="sample-btn" onclick="setPreset(0.9, 0.8, 1.0)">温柔模式</button>
                    <button class="sample-btn" onclick="setPreset(1.1, 1.1, 1.0)">活泼模式</button>
                    <button class="sample-btn" onclick="setPreset(0.85, 0.9, 1.0)">治愈模式</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">音色设置</div>
            <div class="controls">
                <div class="control-group">
                    <label class="control-label">选择音色</label>
                    <select class="select-control" id="voiceSelect">
                        <option value="">加载中...</option>
                    </select>
                    <div class="voice-info" id="voiceInfo"></div>
                </div>

                <div class="control-group">
                    <label class="control-label">语速</label>
                    <div class="slider-group">
                        <input type="range" class="slider" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
                        <span class="slider-value" id="rateValue">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">音调</label>
                    <div class="slider-group">
                        <input type="range" class="slider" id="pitchSlider" min="0.5" max="2" step="0.1" value="1">
                        <span class="slider-value" id="pitchValue">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">音量</label>
                    <div class="slider-group">
                        <input type="range" class="slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                        <span class="slider-value" id="volumeValue">1.0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">播放控制</div>
            <div class="buttons">
                <button class="btn btn-primary" id="speakBtn" onclick="speakText()">
                    ▶️ 开始朗读
                </button>
                <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()" disabled>
                    ⏸️ 暂停
                </button>
                <button class="btn btn-secondary" onclick="stopSpeaking()">
                    ⏹️ 停止
                </button>
            </div>

            <div class="status status-idle" id="status">
                <span id="statusText">准备就绪</span>
                <div class="wave-animation hidden" id="waveAnim">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">可用音色列表</div>
            <div id="voicesList" style="font-size: 13px; color: #a0a0b0; max-height: 200px; overflow-y: auto;">
                加载中...
            </div>
        </div>
    </div>

    <script>
        let voices = [];
        let isSpeaking = false;
        let isPaused = false;
        let utterance = null;

        // 初始化
        function init() {
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持 Web Speech API！');
                return;
            }

            // 加载音色
            loadVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = loadVoices;
            }

            // 设置滑块事件
            document.getElementById('rateSlider').addEventListener('input', (e) => {
                document.getElementById('rateValue').textContent = e.target.value;
            });

            document.getElementById('pitchSlider').addEventListener('input', (e) => {
                document.getElementById('pitchValue').textContent = e.target.value;
            });

            document.getElementById('volumeSlider').addEventListener('input', (e) => {
                document.getElementById('volumeValue').textContent = e.target.value;
            });

            document.getElementById('voiceSelect').addEventListener('change', (e) => {
                updateVoiceInfo();
            });
        }

        // 加载音色列表
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            const select = document.getElementById('voiceSelect');
            const list = document.getElementById('voicesList');

            select.innerHTML = '';
            let listHTML = '';

            // 先显示中文音色
            const chineseVoices = voices.filter(v => v.lang && v.lang.startsWith('zh'));
            const otherVoices = voices.filter(v => !v.lang || !v.lang.startsWith('zh'));

            if (chineseVoices.length > 0) {
                select.innerHTML += '<option value="" disabled>── 中文音色 ──</option>';
                chineseVoices.forEach((v, i) => {
                    const index = voices.indexOf(v);
                    const isFemale = v.name.toLowerCase().includes('female') || v.name.includes('女');
                    const label = `${v.name} (${v.lang}) ${isFemale ? '👩' : '👨'}`;
                    select.innerHTML += `<option value="${index}">${label}</option>`;
                    listHTML += `<div style="padding: 4px 0;">${label} - ${v.name}</div>`;
                });
            }

            if (otherVoices.length > 0) {
                select.innerHTML += '<option value="" disabled>── 其他音色 ──</option>';
                otherVoices.forEach((v, i) => {
                    const index = voices.indexOf(v);
                    select.innerHTML += `<option value="${index}">${v.name} (${v.lang})</option>`;
                });
            }

            if (voices.length === 0) {
                select.innerHTML = '<option value="">未找到可用音色</option>';
                listHTML = '未找到可用音色';
            }

            list.innerHTML = listHTML;

            // 默认选择第一个中文音色
            if (chineseVoices.length > 0) {
                const index = voices.indexOf(chineseVoices[0]);
                select.value = index;
                updateVoiceInfo();
            }
        }

        // 更新音色信息
        function updateVoiceInfo() {
            const select = document.getElementById('voiceSelect');
            const voice = voices[parseInt(select.value)];
            const info = document.getElementById('voiceInfo');
            
            if (voice) {
                info.textContent = `语言: ${voice.lang} | 名称: ${voice.name}`;
            }
        }

        // 设置文本
        function setText(text) {
            document.getElementById('textInput').value = text;
        }
        
        // 设置参数预设
        function setPreset(rate, pitch, volume) {
            document.getElementById('rateSlider').value = rate;
            document.getElementById('pitchSlider').value = pitch;
            document.getElementById('volumeSlider').value = volume;
            document.getElementById('rateValue').textContent = rate;
            document.getElementById('pitchValue').textContent = pitch;
            document.getElementById('volumeValue').textContent = volume;
        }

        // 开始朗读
        function speakText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('请输入要朗读的文本！');
                return;
            }

            // 停止之前的朗读
            stopSpeaking();

            utterance = new SpeechSynthesisUtterance(text);
            
            // 设置音色
            const voiceIndex = parseInt(document.getElementById('voiceSelect').value);
            if (voiceIndex >= 0 && voices[voiceIndex]) {
                utterance.voice = voices[voiceIndex];
            }

            // 设置参数
            utterance.rate = parseFloat(document.getElementById('rateSlider').value);
            utterance.pitch = parseFloat(document.getElementById('pitchSlider').value);
            utterance.volume = parseFloat(document.getElementById('volumeSlider').value);

            // 事件
            utterance.onstart = () => {
                isSpeaking = true;
                isPaused = false;
                updateStatus('正在朗读...', 'speaking');
                document.getElementById('speakBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
            };

            utterance.onend = () => {
                isSpeaking = false;
                isPaused = false;
                updateStatus('朗读完成', 'idle');
                document.getElementById('speakBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
            };

            utterance.onerror = (e) => {
                console.error('TTS 错误:', e);
                isSpeaking = false;
                isPaused = false;
                updateStatus('出错了: ' + e.error, 'idle');
                document.getElementById('speakBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
            };

            speechSynthesis.speak(utterance);
        }

        // 暂停/继续
        function togglePause() {
            if (isPaused) {
                speechSynthesis.resume();
                isPaused = false;
                document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
                updateStatus('正在朗读...', 'speaking');
            } else {
                speechSynthesis.pause();
                isPaused = true;
                document.getElementById('pauseBtn').textContent = '▶️ 继续';
                updateStatus('已暂停', 'idle');
            }
        }

        // 停止
        function stopSpeaking() {
            speechSynthesis.cancel();
            isSpeaking = false;
            isPaused = false;
            updateStatus('已停止', 'idle');
            document.getElementById('speakBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
        }

        // 更新状态
        function updateStatus(text, mode) {
            const statusText = document.getElementById('statusText');
            const statusDiv = document.getElementById('status');
            const waveAnim = document.getElementById('waveAnim');

            statusText.textContent = text;

            if (mode === 'speaking') {
                statusDiv.className = 'status status-speaking';
                waveAnim.classList.remove('hidden');
            } else {
                statusDiv.className = 'status status-idle';
                waveAnim.classList.add('hidden');
            }
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
