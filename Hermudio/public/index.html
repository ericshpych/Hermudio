<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermudio — Nightfall Ember</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ember-hue: 22;
    --rose-hue: 352;
    --gold-hue: 42;
    --blur: 110px;
    --card-bg: rgba(16, 10, 4, 0.88);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    background: #0d0802;
    color: #fff;
  }

  /* Stage — deep warm dark */
  .stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #1a0f05 0%, #0d0802 45%, #080502 100%);
  }

  /* Ember orbs — fireplace feel */
  .ember {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform;
    filter: blur(var(--blur)) saturate(1.4);
    mix-blend-mode: screen;
  }
  .ember.central {
    width: 60vmin; height: 60vmin;
    left: 50%; top: 38%;
    margin-left: -30vmin; margin-top: -30vmin;
    background: radial-gradient(circle at 45% 40%,
      oklch(0.85 0.16 var(--ember-hue)) 0%,
      oklch(0.70 0.18 calc(var(--ember-hue) + 4)) 35%,
      oklch(0.45 0.12 calc(var(--ember-hue) + 8) / 0) 65%);
    opacity: 0.75;
    animation: ember-central 22s ease-in-out infinite;
  }
  .ember.left {
    width: 45vmin; height: 45vmin;
    left: 20%; top: 55%;
    margin-left: -22.5vmin; margin-top: -22.5vmin;
    background: radial-gradient(circle at 50% 50%,
      oklch(0.72 0.14 var(--rose-hue)) 0%,
      oklch(0.55 0.16 calc(var(--rose-hue) - 6)) 40%,
      oklch(0.35 0.10 calc(var(--rose-hue) - 12) / 0) 70%);
    opacity: 0.5;
    animation: ember-left 30s ease-in-out infinite;
  }
  .ember.right {
    width: 38vmin; height: 38vmin;
    left: 75%; top: 25%;
    margin-left: -19vmin; margin-top: -19vmin;
    background: radial-gradient(circle at 50% 50%,
      oklch(0.80 0.13 var(--gold-hue)) 0%,
      oklch(0.65 0.14 calc(var(--gold-hue) - 3)) 45%,
      oklch(0.40 0.09 calc(var(--gold-hue) - 8) / 0) 70%);
    opacity: 0.55;
    animation: ember-right 26s ease-in-out infinite;
  }
  .ember.ground {
    width: 80vmin; height: 30vmin;
    left: 50%; top: 82%;
    margin-left: -40vmin; margin-top: -15vmin;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 80%,
      oklch(0.50 0.12 var(--ember-hue)) 0%,
      oklch(0.30 0.08 calc(var(--ember-hue) + 10) / 0) 60%);
    opacity: 0.35;
    filter: blur(40px) saturate(1.2);
    animation: ember-ground 18s ease-in-out infinite;
  }
  @keyframes ember-central {
    0%, 100% { transform: translate(0, 0) scale(1.0); opacity: 0.7; }
    25% { transform: translate(4vmin, -3vmin) scale(1.08); opacity: 0.8; }
    50% { transform: translate(-2vmin, 4vmin) scale(0.95); opacity: 0.65; }
    75% { transform: translate(3vmin, 2vmin) scale(1.05); opacity: 0.75; }
  }
  @keyframes ember-left {
    0%, 100% { transform: translate(0, 0) scale(1.0); opacity: 0.45; }
    40% { transform: translate(-5vmin, 3vmin) scale(1.1); opacity: 0.55; }
    70% { transform: translate(3vmin, -2vmin) scale(0.92); opacity: 0.4; }
  }
  @keyframes ember-right {
    0%, 100% { transform: translate(0, 0) scale(1.0); opacity: 0.5; }
    35% { transform: translate(4vmin, 3vmin) scale(1.12); opacity: 0.6; }
    65% { transform: translate(-3vmin, -2vmin) scale(0.90); opacity: 0.45; }
  }
  @keyframes ember-ground {
    0%, 100% { transform: translateX(0) scaleX(1.0); opacity: 0.3; }
    50% { transform: translateX(6vmin) scaleX(1.15); opacity: 0.4; }
  }

  .bg-grain {
    position: absolute; inset: 0;
    background-image: radial-gradient(ellipse at 50% 60%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 100%);
    pointer-events: none;
  }
  .bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* Card — warm dark glass */
  .card {
    position: relative;
    width: 440px;
    max-width: calc(100vw - 48px);
    height: min(840px, calc(100vh - 48px));
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,160,60,0.06),
      0 40px 80px -20px rgba(0,0,0,0.7),
      0 10px 30px -8px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,200,100,0.04);
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(1.2);
    -webkit-backdrop-filter: blur(40px) saturate(1.2);
  }

  /* Header */
  .header {
    position: relative;
    flex: 0 0 auto;
    min-height: 220px;
    background: transparent;
    color: #fff;
    padding: 24px 26px 0;
    overflow: hidden;
  }
  .header-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    position: relative; z-index: 2;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, oklch(0.82 0.14 var(--ember-hue)), oklch(0.70 0.16 calc(var(--ember-hue) - 10)));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 16px rgba(255,140,60,0.3);
    border: 1px solid rgba(255,180,80,0.2);
  }
  .brand-name {
    font-size: 24px; font-weight: 600;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.95);
    line-height: 1.1;
  }
  .brand-sub {
    font-size: 11px; font-weight: 300;
    color: rgba(255,180,100,0.5);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .header-time-wrap {
    text-align: right;
  }
  .header-time {
    font-size: 28px; font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.01em;
  }
  .header-date {
    font-size: 10px; color: rgba(255,200,100,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-status {
    margin-top: 12px;
    display: flex; align-items: center; gap: 8px;
    position: relative; z-index: 2;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: oklch(0.75 0.15 var(--ember-hue));
    box-shadow: 0 0 8px oklch(0.75 0.15 var(--ember-hue) / 0.6);
    animation: pulse-ember 1.4s ease-in-out infinite;
  }
  @keyframes pulse-ember {
    0%, 100% { opacity: 0.5; transform: scale(0.85); box-shadow: 0 0 4px oklch(0.75 0.15 var(--ember-hue) / 0.4); }
    50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px oklch(0.75 0.15 var(--ember-hue) / 0.7); }
  }
  .status-text {
    font-size: 11px; font-weight: 400;
    color: rgba(255,200,100,0.6);
    letter-spacing: 0.04em;
  }

  /* Waveform */
  .wave-wrap {
    position: absolute;
    left: -10px; right: -10px; bottom: 0;
    height: 140px;
    z-index: 1;
    pointer-events: none;
    mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.9) 55%, rgba(0,0,0,1) 100%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.9) 55%, rgba(0,0,0,1) 100%);
  }
  .wave-wrap canvas { width: 100%; height: 100%; display: block; }

  /* Body */
  .body {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    background: rgba(10, 6, 2, 0.85);
    border-radius: 24px 24px 0 0;
    margin-top: -16px;
    position: relative;
    z-index: 3;
    overflow: hidden;
  }

  /* Track meta */
  .track-meta {
    padding: 22px 26px 18px;
    position: relative;
  }
  .track-meta::before {
    content: '';
    position: absolute;
    top: 0; left: 26px; right: 26px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,160,60,0.12), transparent);
  }
  .track-song {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 34px; font-weight: 500;
    line-height: 1.05; letter-spacing: -0.02em;
    color: rgba(255,255,255,0.95);
    margin-bottom: 4px;
  }
  .track-artist {
    font-size: 14px; font-weight: 300;
    color: rgba(255,200,100,0.5);
    margin-bottom: 14px;
  }
  .track-source {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; color: rgba(255,180,80,0.3);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .track-source:hover { color: rgba(255,180,80,0.6); }

  /* Mini player */
  .mini-player {
    display: flex; align-items: center; gap: 10px;
  }
  .mp-btn {
    flex: 0 0 auto; width: 22px; height: 22px;
    border-radius: 50%;
    background: oklch(0.82 0.14 var(--ember-hue));
    border: none; color: #1a0a02;
    display: grid; place-items: center; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 0 8px oklch(0.82 0.14 var(--ember-hue) / 0.4);
  }
  .mp-btn:hover { transform: scale(1.06); }
  .mp-btn:active { transform: scale(0.94); }
  .mp-nav-btn {
    width: 18px; height: 18px;
    background: oklch(0.72 0.12 var(--ember-hue));
    box-shadow: 0 0 6px oklch(0.72 0.12 var(--ember-hue) / 0.3);
  }
  .mp-line {
    flex: 1 1 auto; height: 2px;
    background: rgba(255,200,100,0.12);
    border-radius: 999px;
    position: relative; overflow: hidden;
  }
  .mp-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 38%;
    background: oklch(0.80 0.14 var(--ember-hue));
    border-radius: 999px;
    transition: width 0.3s;
  }
  .mp-time {
    flex: 0 0 auto; font-size: 10px;
    color: rgba(255,200,100,0.35);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  /* Transcript */
  .transcript-wrap {
    flex: 1 1 auto;
    margin: 0 16px;
    background: rgba(255,200,100,0.02);
    border: 1px solid rgba(255,160,60,0.06);
    border-radius: 18px; overflow: hidden;
    position: relative; min-height: 180px; max-height: 320px;
    display: flex;
    flex-direction: column;
  }
  .transcript-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 18px 18px 40px;
    scroll-behavior: smooth;
  }
  .transcript-scroll::-webkit-scrollbar { width: 0; }
  .transcript-fade {
    position: absolute; left: 0; right: 0; bottom: 0; height: 50px;
    background: linear-gradient(180deg, rgba(10,6,2,0) 0%, rgba(10,6,2,1) 100%);
    pointer-events: none;
  }
  .turn { margin-bottom: 20px; }
  .turn-head {
    font-size: 10px; font-weight: 500;
    color: rgba(255,200,100,0.25);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .turn-head::before {
    content: '';
    width: 12px; height: 1px;
    background: rgba(255,160,60,0.2);
  }
  .turn.active .turn-head {
    color: rgba(255,200,100,0.5);
  }
  .turn.active .turn-head::before {
    background: oklch(0.75 0.14 var(--ember-hue));
    box-shadow: 0 0 6px oklch(0.75 0.14 var(--ember-hue) / 0.5);
  }
  .turn-body {
    font-size: 15px; line-height: 1.6;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.005em;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
  }
  .word { transition: color 0.2s, background 0.2s; }
  .word.said { color: rgba(255,255,255,0.65); }
  .word.current {
    color: rgba(255,240,200,1);
    background: rgba(255,180,80,0.18);
    border-radius: 4px; padding: 0 2px; margin: 0 -2px;
    box-shadow: 0 0 0 1px rgba(255,180,80,0.2);
  }
  .word.future { color: rgba(255,255,255,0.22); }

  /* Player */
  .player {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px 18px;
    background: rgba(10, 6, 2, 0.9);
  }
  .player-time {
    font-size: 12px; font-weight: 400;
    color: rgba(255,200,100,0.5);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    letter-spacing: 0.02em;
  }
  .player-bars {
    flex: 1 1 auto; height: 26px;
    display: flex; align-items: center; gap: 2px;
    cursor: pointer;
  }
  .player-bar {
    flex: 1 1 auto;
    border-radius: 999px;
    transition: background 0.15s;
    background: rgba(255,200,100,0.15);
  }
  .player-bar.played { background: rgba(255,200,100,0.7); }
  .play-btn {
    flex: 0 0 auto; width: 38px; height: 38px;
    border-radius: 50%;
    background: oklch(0.82 0.14 var(--ember-hue));
    border: none; color: #1a0a02;
    display: grid; place-items: center; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s;
    padding: 0;
    box-shadow: 0 0 16px oklch(0.82 0.14 var(--ember-hue) / 0.4);
  }
  .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 24px oklch(0.82 0.14 var(--ember-hue) / 0.6); }
  .play-btn:active { transform: scale(0.95); }
  .play-btn svg { width: 13px; height: 13px; }

  /* Sleep timer */
  .sleep-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px 12px;
    background: rgba(10,6,2,0.95);
    border-top: 1px solid rgba(255,160,60,0.05);
  }
  .sleep-label {
    font-size: 10px; color: rgba(255,200,100,0.3);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .sleep-timer {
    display: flex; align-items: center; gap: 8px;
  }
  .sleep-preset {
    font-size: 10px; color: rgba(255,200,100,0.35);
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,160,60,0.1);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }
  .sleep-preset:hover, .sleep-preset.active {
    color: rgba(255,200,100,0.8);
    border-color: rgba(255,160,60,0.3);
    background: rgba(255,160,60,0.06);
  }

  /* Tweaks */
  .tweaks-toggle {
    position: fixed; right: 16px; bottom: 16px;
    width: 40px; height: 40px; border-radius: 999px;
    background: rgba(16,10,4,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,160,60,0.12);
    color: rgba(255,200,100,0.6);
    display: grid; place-items: center;
    cursor: pointer; z-index: 1001;
    transition: transform 0.15s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .tweaks-toggle:hover { transform: scale(1.05); }
  .tweaks {
    position: fixed; right: 16px; bottom: 68px;
    width: 280px;
    background: rgba(16,10,4,0.96);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,160,60,0.1);
    border-radius: 16px; padding: 14px 16px;
    color: #fff; font-size: 13px;
    z-index: 1000;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    display: none;
  }
  .tweaks.visible { display: block; }
  .tweaks h3 {
    font-size: 11px; font-weight: 600; margin: 0 0 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,200,100,0.4);
  }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .tweak-row:last-child { margin-bottom: 0; }
  .tweak-row label { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; }
  .tweak-row input[type="range"] { width: 100%; accent-color: oklch(0.80 0.14 var(--ember-hue)); }
  .swatches { display: flex; gap: 8px; }
  .swatch {
    width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { border-color: rgba(255,200,100,0.8); }

  .design-label {
    position: fixed; top: 24px; right: 24px;
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,200,100,0.18);
    z-index: 50; font-weight: 500;
  }
  .topnav {
    position: fixed; top: 24px; left: 0; right: 0;
    display: flex; justify-content: center;
    align-items: center; gap: 44px; z-index: 50;
    pointer-events: none;
  }
  .topnav-link {
    pointer-events: auto;
    font-size: 12px; font-weight: 300;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.3);
    text-decoration: none; padding: 6px 4px;
    transition: color 0.18s;
  }
  .topnav-link:hover { color: rgba(255,200,100,0.7); }

  @media (prefers-reduced-motion: reduce) {
    .ember { animation-duration: 180s !important; }
    .status-dot { animation: none; }
  }
  /* Radio Mode and Chat Mode */
  .radio-mode {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
  }
  .chat-mode {
    display: none;
    flex-direction: column;
    flex: 1 1 auto;
    background: transparent;
    overflow: hidden;
  }
  .chat-mode.active {
    display: flex;
  }
  .radio-mode.active {
    display: flex;
  }

  /* Clock Section - Nightfall Ember */
  .clock-section {
    text-align: center;
    padding: 12px 16px 8px;
    position: relative;
  }
  .clock-bg {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at center, rgba(255, 140, 60, 0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .time-large {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.02em;
    font-family: 'Space Grotesk', sans-serif;
    font-variant-numeric: tabular-nums;
    color: rgba(255, 255, 255, 0.9);
    position: relative;
    z-index: 1;
  }
  .date-info {
    font-size: 10px;
    color: rgba(255, 200, 100, 0.35);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .on-air {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 3px 10px;
    background: rgba(255, 160, 60, 0.08);
    border-radius: 20px;
    font-size: 10px;
    color: rgba(255, 200, 100, 0.6);
    letter-spacing: 1px;
  }
  .on-air-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: oklch(0.75 0.15 var(--ember-hue));
    box-shadow: 0 0 8px oklch(0.75 0.15 var(--ember-hue) / 0.6);
    animation: pulse-ember 1.4s ease-in-out infinite;
  }
  .live-badge {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 9px;
    color: oklch(0.75 0.15 var(--ember-hue));
    letter-spacing: 1.5px;
  }

  /* Top Player Bar - Nightfall Ember */
  .top-player-bar {
    background: rgba(10, 6, 2, 0.85);
    border-bottom: 1px solid rgba(255, 160, 60, 0.06);
    padding: 8px 12px;
  }
  .player-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .track-info-mini {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .track-icon {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    background: linear-gradient(135deg, oklch(0.82 0.14 var(--ember-hue)) 0%, oklch(0.70 0.16 calc(var(--ember-hue) - 10)) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    position: relative;
  }
  .track-icon .star {
    position: absolute;
    top: -2px;
    left: -2px;
    width: 10px;
    height: 10px;
    background: oklch(0.82 0.14 var(--ember-hue));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;

<script>
        // Unregister Service Worker to prevent caching issues during development
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => {

        }

        // Waveform — warm ember color (demo style)
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        function drawWave(t) {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            const bars = 100;
            for (let i = 0; i < bars; i++) {
                const x = i * (w / bars) + (w / (bars * 2));
                const phase = (i / bars) * Math.PI * 3;
                const amp = Math.sin(t * 0.0007 + phase) * 0.45 + Math.sin(t * 0.0004 + phase * 1.7) * 0.25 + 0.35;
                const barH = Math.max(2, amp * h * 0.65);
                const alpha = 0.08 + amp * 0.55;
                const hue = 20 + amp * 15;
                ctx.fillStyle = `hsla(${hue}, 90%, ${60 + amp * 20}%, ${alpha})`;
                ctx.fillRect(x - 1, (h - barH) / 2, 2, barH);
            }
            requestAnimationFrame(drawWave);
        }
        drawWave(0);

        // Utility Functions
        const Utils = {
            // 智能分词：中文按字符分割，英文按单词分割
            splitTextForHighlight(text) {
                const result = [];
                let currentWord = '';

                for (const char of text) {
                    // 如果是中文字符（Unicode范围），单独作为一个单元
                    if (/[\u4e00-\u9fa5]/.test(char)) {
                        // 先保存之前的英文单词（如果有）
                        if (currentWord) {
                            result.push(currentWord);
                            currentWord = '';
                        }
                        result.push(char);
                    } else if (/\s/.test(char)) {
                        // 空格：保存当前单词并添加空格
                        if (currentWord) {
                            result.push(currentWord);
                            currentWord = '';
                        }
                        result.push(' ');
                    } else {
                        // 英文或标点，累积到当前单词
                        currentWord += char;
                    }
                }

                // 保存最后一个单词
                if (currentWord) {
                    result.push(currentWord);
                }

                return result;
            }
        };

        // API Client
        const API = {
            baseUrl: '',
            maxRetries: 3,
            retryDelay: 1000,

            async fetchWithRetry(url, options = {}, retryCount = 0, maxRetries = null) {
                const max = maxRetries !== null ? maxRetries : this.maxRetries;
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (retryCount < max) {
                        console.warn(`[API] Request failed, retrying ${retryCount + 1}/${max}:`, error.message);
                        await this.sleep(this.retryDelay * (retryCount + 1));
                        return this.fetchWithRetry(url, options, retryCount + 1, max);
                    }
                    console.error(`[API] Request failed after ${max} retries:`, error);
                    throw error;
                }
            },

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },

            async get(endpoint) {
                return this.fetchWithRetry(`${this.baseUrl}${endpoint}`);
            },

            async post(endpoint, data, options = {}) {
                const { retries = this.maxRetries } = options;
                return this.fetchWithRetry(`${this.baseUrl}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }, 0, retries);
            },

            // 直接 POST 请求，不启用重试机制
            async postNoRetry(endpoint, data) {
                try {
                    const response = await fetch(`${this.baseUrl}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    console.warn(`[API] Direct request failed (no retry):`, error.message);
                    throw error;
                }
            },

            health() { return this.get('/api/health'); },
            getScene() { return this.get('/api/scene'); },
            getStatus() { return this.get('/api/status'); },
            getLoginUrl() { return this.get('/api/login-url'); },
            search(keyword, limit = 10) { return this.get(`/api/search?keyword=${encodeURIComponent(keyword)}&limit=${limit}`); },
            
            async play(songId, encryptedId = null) {
                console.log('=== [API.play] START ===');
                console.log('=== [API.play] songId:', songId);
                console.log('=== [API.play] encryptedId:', encryptedId);
                console.log('=== [API.play] 调用 /api/play ===');
                
                const startTime = Date.now();
                try {
                    const response = await this.post('/api/play', { songId, encryptedId });
                    const endTime = Date.now();
                    console.log('=== [API.play] 响应耗时:', (endTime - startTime), 'ms ===');
                    console.log('=== [API.play] 响应内容:', response);
                    console.log('=== [API.play] END ===');
                    return response;
                } catch (error) {
                    console.error('=== [API.play] ERROR:', error);
                    console.log('=== [API.play] END ===');
                    throw error;
                }
            },
            
            playRecommend(blockedSongs = []) { return this.post('/api/play-recommend', { blockedSongs }); },
            playPrevious() { return this.post('/api/previous', {}); },
            
            async stop() {
                console.log('=== [API.stop] START ===');
                console.log('=== [API.stop] 调用 /api/stop ===');
                
                const startTime = Date.now();
                try {
                    const response = await this.post('/api/stop', {});
                    const endTime = Date.now();
                    console.log('=== [API.stop] 响应耗时:', (endTime - startTime), 'ms ===');
                    console.log('=== [API.stop] 响应内容:', response);
                    console.log('=== [API.stop] END ===');
                    return response;
                } catch (error) {
                    console.error('=== [API.stop] ERROR:', error);
                    console.log('=== [API.stop] END ===');
                    throw error;
                }
            },
            
            async pause() {
                console.log('=== [API.pause] START ===');
                console.log('=== [API.pause] 调用 /api/pause ===');
                
                const startTime = Date.now();
                try {
                    const response = await this.post('/api/pause', {});
                    const endTime = Date.now();
                    console.log('=== [API.pause] 响应耗时:', (endTime - startTime), 'ms ===');
                    console.log('=== [API.pause] 响应内容:', response);
                    console.log('=== [API.pause] END ===');
                    return response;
                } catch (error) {
                    console.error('=== [API.pause] ERROR:', error);
                    console.log('=== [API.pause] END ===');
                    throw error;
                }
            },
            
            async resume() {
                console.log('=== [API.resume] START ===');
                console.log('=== [API.resume] 调用 /api/resume ===');
                
                const startTime = Date.now();
                try {
                    const response = await this.post('/api/resume', {});
                    const endTime = Date.now();
                    console.log('=== [API.resume] 响应耗时:', (endTime - startTime), 'ms ===');
                    console.log('=== [API.resume] 响应内容:', response);
                    console.log('=== [API.resume] END ===');
                    return response;
                } catch (error) {
                    console.error('=== [API.resume] ERROR:', error);
                    console.log('=== [API.resume] END ===');
                    throw error;
                }
            },
            
            chat(message, blockedSongs = []) { return this.post('/api/chat', { message, blockedSongs }); },
            feedback(songId, action) { return this.post('/api/feedback', { songId, action }); },
            
            // Playlist Service APIs
            playlistInitialize() { return this.post('/api/playlist/initialize'); },
            playlistNext() { return this.post('/api/playlist/next'); },
            playlistStatus() { return this.get('/api/playlist/status'); },
            playlistRequestBatch() { return this.post('/api/playlist/request-batch'); },
            playlistRecordSkip(songId, song) { return this.post('/api/playlist/record-skip', { songId, song }); },
            playlistRecordFullPlay(songId, song) { return this.post('/api/playlist/record-full-play', { songId, song }); }
        };
        // TTS 解锁和提示函数
        let audioUnlocked = false;
        window.ttsNeedsRetry = false;
        window.ttsIsRetrying = false; // 重试标志，避免 stop() 干扰重试
        
        function showUnlockPrompt() {
            const existing = document.getElementById('tts-unlock-prompt');
            if (existing) return;
            const prompt = document.createElement('div');
            prompt.id = 'tts-unlock-prompt';
            prompt.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.9);
                color: white;
                padding: 30px 40px;
                border-radius: 16px;
                text-align: center;
                z-index: 99999;
                cursor: pointer;
                border: 1px solid rgba(255,255,255,0.2);
            `;
            prompt.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px;">🔇</div>
                <div style="font-size: 18px; margin-bottom: 8px;">点击任意位置启用语音播报</div>
                <div style="font-size: 13px; color: #aaa;">由于浏览器限制，需要您点击一下才能播放语音</div>
            `;
            // 点击弹窗本身也触发解锁
            prompt.onclick = (e) => {
                e.stopPropagation(); // 阻止冒泡到 document
                console.log('[TTS] Unlock prompt clicked!');
                unlockAudio();
                prompt.remove();
                // 移除文档级监听器
                if (window.unlockPromptDocumentHandler) {
                    document.removeEventListener('click', window.unlockPromptDocumentHandler);
                    window.unlockPromptDocumentHandler = null;
                }
            };
            // 添加文档级点击监听，点击任意位置都能关闭弹窗并触发解锁
            window.unlockPromptDocumentHandler = (e) => {
                // 如果点击的是弹窗本身，不重复处理
                if (e.target === prompt || prompt.contains(e.target)) return;
                console.log('[TTS] Document clicked, closing unlock prompt');
                unlockAudio();
                prompt.remove();
            };
            document.addEventListener('click', window.unlockPromptDocumentHandler);
            document.body.appendChild(prompt);
            console.log('[TTS] Unlock prompt shown');
        }
        
        function unlockAudio() {
            console.log('[Audio] unlockAudio called, ttsNeedsRetry:', window.ttsNeedsRetry, 'audioUnlocked:', audioUnlocked);

            // 防抖：如果在 500ms 内被频繁调用，忽略后续调用
            const now = Date.now();
            if (this._lastUnlockAudioTime && (now - this._lastUnlockAudioTime) < 500) {
                console.log('[Audio] Debouncing unlockAudio call');
                return;
            }
            this._lastUnlockAudioTime = now;

            // 关闭可能存在的解锁弹窗
            const prompt = document.getElementById('tts-unlock-prompt');
            if (prompt) {
                prompt.remove();
            }

            // 移除文档级监听器
            if (window.unlockPromptDocumentHandler) {
                document.removeEventListener('click', window.unlockPromptDocumentHandler);
                window.unlockPromptDocumentHandler = null;
            }

            // 如果 TTS 需要重试，执行重试
            if (window.ttsNeedsRetry) {
                console.log('[Audio] TTS retry needed, executing...');
                console.log('[Audio] Retry text length:', window.ttsRetryText ? window.ttsRetryText.length : 'null');
                console.log('[Audio] Retry options:', window.ttsRetryOptions ? 'provided' : 'null');
                // 【关键修复】先 cancel() 取消任何待处理的语音，再 resume() 解锁，然后 speak()
                // 这样可以确保 speechSynthesis 处于干净的状态，避免 not-allowed 错误持续
                if (window.speechSynthesis) {
                    console.log('[Audio] Resetting speechSynthesis state...');
                    window.speechSynthesis.cancel(); // 取消任何待执行的语音

                    // 等待 cancel 完成，然后确保 resume
                    setTimeout(() => {
                        console.log('[Audio] After cancel, checking speechSynthesis state:');
                        console.log('[Audio]   speaking:', window.speechSynthesis.speaking);
                        console.log('[Audio]   pending:', window.speechSynthesis.pending);
                        console.log('[Audio]   paused:', window.speechSynthesis.paused);

                        if (window.speechSynthesis.paused) {
                            console.log('[Audio] Resuming speechSynthesis...');
                            window.speechSynthesis.resume();
                        }

                        // 再次延迟确保状态更新
                        setTimeout(() => {
                            console.log('[Audio] Final state before speak:');
                            console.log('[Audio]   speaking:', window.speechSynthesis.speaking);
                            console.log('[Audio]   pending:', window.speechSynthesis.pending);
                        }, 50);
                    }, 50);
                }
                const retryText = window.ttsRetryText;
                const retryOptions = window.ttsRetryOptions;
                window.ttsNeedsRetry = false;
                window.ttsRetryText = null;
                window.ttsRetryOptions = null;
                console.log('[Audio] Calling TTSService.speak with text length:', retryText ? retryText.length : 0);

                // 【额外延迟】确保 cancel/resume 序列完成后再调用 speak
                // 使用更长的延迟，确保浏览器状态完全更新
                setTimeout(() => {
                    console.log('[Audio] ⚠️⚠️⚠️ Delayed TTSService.speak called AFTER 200ms delay! ⚠️⚠️⚠️');
                    console.log('[Audio]   ttsNeedsRetry:', window.ttsNeedsRetry);
                    console.log('[Audio]   speechSynthesis.speaking:', window.speechSynthesis.speaking);
                    console.log('[Audio]   speechSynthesis.paused:', window.speechSynthesis.paused);

                    // 【关键修复】设置重试标志，避免 stop() 干扰重试
                    window.ttsIsRetrying = true;
                    console.log('[Audio] Set ttsIsRetrying = true');

                    TTSService.speak(retryText, retryOptions).finally(() => {
                        // 重试结束后清除标志
                        setTimeout(() => {
                            window.ttsIsRetrying = false;
                            console.log('[Audio] Cleared ttsIsRetrying = false');
                        }, 100);
                    });
                }, 200);

                return; // 重试后直接返回，不继续执行下面的代码
            }

            // 如果已经解锁过，不需要再次解锁
            if (audioUnlocked) {
                console.log('[Audio] Already unlocked, skipping');
                return;
            }

            // 首次解锁
            audioUnlocked = true;
            console.log('[Audio] Audio unlocked for the first time');

            // 播放静音音频来"解锁"浏览器音频策略
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==');
            silentAudio.play().then(() => {
                console.log('[Audio] Silent audio played successfully');
            }).catch((e) => {
                console.log('[Audio] Silent audio play failed (expected):', e.message);
            });
        }
        
        // 点击页面时触发解锁（持续监听，不需要 once）
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);

        // TTS Service - Using Hermes TTS (Edge TTS) as default
        const TTSService = {
            audioPlayer: null,
            isSpeaking: false,
            currentVoice: 'Chinese (Mandarin)_Warm_Bestie',
            apiBase: '',
            charTimer: null,
            volume: 1.5,
            // TTS服务配置：默认使用 Hermes TTS (Edge TTS)
            ttsService: 'hermes', // 'hermes' (默认), 'webSpeech', 'minimax'
            webSpeechVoice: null,
            webSpeechRate: 0.9,
            webSpeechPitch: 1.0,
            webSpeechVolume: 1.0,

            init() {
                console.log('[TTS] Initialized with Hermes TTS (Edge TTS) as default');
                // 自动检测当前服务器地址
                this.apiBase = window.location.origin;
                console.log('[TTS] API base set to:', this.apiBase);
                console.log('[TTS] Window location:', window.location.href);
                // 强制使用正确的端口（避免缓存问题）
                if (this.apiBase.includes('localhost:6588')) {
                    this.apiBase = 'http://localhost:6688';
                    console.log('[TTS] Corrected API base to:', this.apiBase);
                }
                // 初始化 Web Speech API
                this.initWebSpeechAPI();
                // 检查 MiniMax 状态（作为备选）
                this.checkStatus();
                return true;
            },

            initWebSpeechAPI() {
                if (typeof window === 'undefined' || !window.speechSynthesis) {
                    console.warn('[TTS] Web Speech API not supported');
                    return false;
                }

                // 设置 voiceschanged 事件监听 - 浏览器会在语音列表准备好后触发此事件
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = () => {
                        console.log('[TTS] voiceschanged event fired, reloading voices...');
                        this.loadWebSpeechVoices();
                    };
                }

                // 初始加载音色列表（可能为空，需要等待 voiceschanged）
                this.loadWebSpeechVoices();
                
                // 某些浏览器需要延迟加载语音
                setTimeout(() => {
                    const voices = speechSynthesis.getVoices();
                    if (voices.length === 0) {
                        console.log('[TTS] Retrying voice load after delay...');
                        this.loadWebSpeechVoices();
                    }
                }, 1000);
                
                console.log('[TTS] Web Speech API initialized');
                return true;
            },

            loadWebSpeechVoices() {
                if (!window.speechSynthesis) return;

                const voices = speechSynthesis.getVoices();
                console.log('[TTS] ========== loadWebSpeechVoices called ==========');
                console.log('[TTS] Web Speech voices loaded:', voices.length);

                // 调试：列出所有可用语音
                if (voices.length > 0) {
                    console.log('[TTS] Available voices:');
                    voices.forEach((v, i) => {
                        console.log(`  ${i + 1}. "${v.name}" (${v.lang})`);
                    });
                } else {
                    console.warn('[TTS] No voices available in this environment');
                    console.log('[TTS] ========== loadWebSpeechVoices end ==========');
                    return;
                }

                // 尝试找到好的中文音色
                const chineseVoices = voices.filter(v => v.lang && v.lang.startsWith('zh'));
                console.log('[TTS] Chinese voices found:', chineseVoices.length);

                if (chineseVoices.length > 0) {
                    // 调试：列出所有中文语音
                    console.log('[TTS] Available Chinese voices:');
                    chineseVoices.forEach((v, i) => {
                        console.log(`  ${i + 1}. "${v.name}" (${v.lang})`);
                    });

                    // 1. 优先使用 "Google 國語（臺灣）" (Chrome/Edge)
                    console.log('[TTS] Looking for "Google 國語（臺灣）" voice...');
                    const googleTWVoice = chineseVoices.find(v =>
                        v.name === 'Google 國語（臺灣）'
                    );
                    if (googleTWVoice) {
                        this.webSpeechVoice = googleTWVoice;
                        console.log('[TTS] ✓ Selected Google 國語（臺灣）voice:', this.webSpeechVoice.name);
                        console.log('[TTS] ========== loadWebSpeechVoices end ==========');
                        return;
                    }
                    console.log('[TTS] ✗ Google 國語（臺灣） not found, trying "美嘉" voice...');

                    // 2. 尝试 "美嘉" (macOS 台湾国语女声)
                    const meijiaVoice = chineseVoices.find(v =>
                        v.name === '美嘉' || v.name.includes('美嘉')
                    );
                    if (meijiaVoice) {
                        this.webSpeechVoice = meijiaVoice;
                        console.log('[TTS] ✓ Selected 美嘉 voice:', this.webSpeechVoice.name);
                        console.log('[TTS] ========== loadWebSpeechVoices end ==========');
                        return;
                    }
                    console.log('[TTS] ✗ 美嘉 not found, trying other zh-TW voices...');
                    
                    // 3. 尝试其他台湾语音 (zh-TW)
                    const twVoice = chineseVoices.find(v =>
                        v.lang === 'zh-TW' ||
                        v.name.includes('台湾') ||
                        v.name.includes('臺灣')
                    );
                    if (twVoice) {
                        this.webSpeechVoice = twVoice;
                        console.log('[TTS] ✓ Selected Taiwan voice:', this.webSpeechVoice.name);
                        console.log('[TTS] ========== loadWebSpeechVoices end ==========');
                        return;
                    }
                    console.log('[TTS] ✗ No Taiwan voice found');

                    // 3. 如果都没有，优先选择女声
                    const femaleVoices = chineseVoices.filter(v =>
                        v.name.includes('Female') ||
                        v.name.includes('女') ||
                        v.name.includes('F')
                    );

                    if (femaleVoices.length > 0) {
                        this.webSpeechVoice = femaleVoices[0];
                        console.log('[TTS] Selected female Chinese voice:', this.webSpeechVoice.name);
                    } else {
                        this.webSpeechVoice = chineseVoices[0];
                        console.log('[TTS] Selected Chinese voice:', this.webSpeechVoice.name);
                    }
                } else if (voices.length > 0) {
                    this.webSpeechVoice = voices[0];
                    console.warn('[TTS] No Chinese voice found, using default:', this.webSpeechVoice.name);
                } else {
                    console.error('[TTS] No voices available at all');
                }
            },

            async checkStatus() {
                try {
                    const response = await fetch(`${this.apiBase}/api/tts/status`);
                    const data = await response.json();
                    if (data.success && data.data.configured) {
                        console.log('[TTS] MiniMax API is configured and available as option');
                    } else {
                        console.log('[TTS] MiniMax API not configured, only Web Speech API available');
                    }
                } catch (e) {
                    console.log('[TTS] Cannot connect to MiniMax server (not needed):', e.message);
                }
            },

            async speak(text, options = {}) {
                console.log('[TTS] speak called with service:', this.ttsService, 'text length:', text.length);
                console.log('[TTS] API base:', this.apiBase);

                // 如果文本太长，分段合成
                const MAX_TEXT_LENGTH = 100;
                if (text.length > MAX_TEXT_LENGTH) {
                    console.warn('[TTS] Text too long (' + text.length + ' chars), splitting...');
                    return this.speakLongText(text, options, MAX_TEXT_LENGTH);
                }

                // 【关键修复】只在非重试情况下调用 stop()，避免 stop() 干扰重试
                // stop() 会调用 speechSynthesis.cancel()，这可能导致浏览器重置 speechSynthesis 状态
                if (!window.ttsIsRetrying) {
                    console.log('[TTS] Calling stop() to clear any existing TTS');
                    this.stop();
                } else {

                    return Promise.resolve(result);

            speakWithWebSpeechAPI(text, options = {}) {

                const charInterval = 250 / this.webSpeechRate;
                console.log('[TTS] Char interval:', charInterval, 'ms (rate:', this.webSpeechRate, ')');
                console.log('[TTS] Creating utterance object...');
                let currentCharIndex = 0;
                let charTimer = null;

                console.log('[TTS] About to set utterance.onstart handler');
                utterance.onstart = () => {
                    console.log('[TTS] ⚠️⚠️⚠️ Web Speech API onstart fired! THIS MEANS TTS IS WORKING! ⚠️⚠️⚠️');
                    this.isSpeaking = true;

                    // 估算总时长
                    const estimatedDuration = (chars.length * charInterval) / 1000;

                    charTimer = setInterval(() => {

                            if (options.onWord) options.onWord(chars[currentCharIndex], currentCharIndex);
                            // 更新进度条（基于估算的时间）
                            const estimatedCurrentTime = (currentCharIndex * charInterval) / 1000;
                            if (options.onProgress) options.onProgress(estimatedCurrentTime, estimatedDuration);
                            currentCharIndex++;
                        } else {

                            if (options.onProgress) options.onProgress(estimatedDuration, estimatedDuration);

                console.log('[TTS]   rate:', utterance.rate);

            // 使用 Hermes TTS（Edge TTS，本地服务）
            async speakWithHermes(text, options = {}) {
                console.log('[TTS] speakWithHermes called');
                
                try {
                    const response = await fetch(`${this.apiBase}/api/tts/synthesize`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            voice: 'zh-CN-XiaoxiaoNeural',
                            rate: 0,
                            pitch: 0
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const arrayBuffer = await response.arrayBuffer();
                    
                    // 转换为 Base64 音频
                    const audioBase64 = btoa(
                        new Uint8Array(arrayBuffer)
                            .reduce((data, byte) => data + String.fromCharCode(byte), '')
                    );
                    
                    await this.playAudio(audioBase64, text, options);
                    return true;
                    
                } catch (error) {
                    console.error('[TTS] Hermes TTS error:', error.message);
                    if (options.onEnd) options.onEnd();
                    throw error;
                }

            async playAudio(base64Audio, text, options) {
                console.log('[TTS] playAudio called, audio length:', base64Audio.length);
                this.audioPlayer = new Audio(`data:audio/mp3;base64,${base64Audio}`);
                console.log('[TTS] Audio object created');

                // 设置音频音量
                this.audioPlayer.volume = Math.min(this.volume / 2, 1.0); // 音频元素音量范围是 0-1
                console.log('[TTS] Audio volume set to:', this.audioPlayer.volume);

                // 保存音频引用到 AppState 用于 Hermes 控制
                if (window.AppState && window.AppState.hermesAudio !== undefined) {
                    window.AppState.hermesAudio = this.audioPlayer;
                }
                
                // 设置回调函数
                this.onProgress = options.onProgress || null;
                this.onWord = options.onWord || null;
                
                // 使用智能分词进行同步显示
                const chars = Utils.splitTextForHighlight(text);
                console.log('[TTS] Text split into', chars.length, 'chars');

                this.audioPlayer.onplay = () => {
                    console.log('[TTS] Audio playback started');
                    this.isSpeaking = true;
                    if (options.onStart) options.onStart();
                    
                    // 等待音频时长可用，然后基于实际音频时长计算每个字符的间隔
                    const setupProgressUpdate = () => {
                        const duration = this.audioPlayer.duration;
                        if (duration && duration > 0) {
                            // 基于实际音频时长计算每个字符的间隔
                            const charInterval = (duration * 1000) / chars.length;
                            this.startProgressUpdate(chars, charInterval);
                        } else {
                            // 如果时长还不可用，使用估算值（中文约 250ms/字）
                            const charInterval = 250;
                            this.startProgressUpdate(chars, charInterval);
                        }
                    };
                    
                    // 如果时长已经可用，直接使用；否则等待 loadedmetadata 事件
                    if (this.audioPlayer.duration) {
                        setupProgressUpdate();
                    } else {
                        this.audioPlayer.addEventListener('loadedmetadata', setupProgressUpdate, { once: true });
                    }
                };

                this.audioPlayer.onended = () => {
                    console.log('[TTS] Audio playback ended');
                    this.isSpeaking = false;
                    this.clearProgressTimer();
                    if (options.onEnd) options.onEnd();
                    // 重置 Hermes 状态
                    if (window.AppState) {
                        window.AppState.hermesSpeaking = false;
                        window.AppState.hermesPaused = false;
                        window.AppState.updateHermesPlayButton();
                    }
                };

                this.audioPlayer.onerror = (e) => {
                    console.error('[TTS] Audio playback error:', e);
                    this.isSpeaking = false;
                    this.clearProgressTimer();
                    // 重置 Hermes 状态
                    if (window.AppState) {
                        window.AppState.hermesSpeaking = false;
                        window.AppState.hermesPaused = false;
                        window.AppState.updateHermesPlayButton();
                    }
                    if (options.onEnd) options.onEnd();
                };

                try {
                    await this.audioPlayer.play();
                    console.log('[TTS] Audio play() succeeded');
                } catch (playError) {
                    console.error('[TTS] Audio play() failed:', playError.message);
                    // 可能是自动播放策略阻止
                    if (playError.name === 'NotAllowedError') {
                        console.warn('[TTS] Autoplay blocked by browser. User interaction required.');
                        // 显示提示给用户，并添加点击播放按钮
                        this.showAudioUnlockPrompt(options);
                    }
                    throw playError;
                }
            },

            clearProgressTimer() {

            stop() {
                console.log('[TTS] stop called');
                if (this.audioPlayer) {
                    this.audioPlayer.pause();
                    this.audioPlayer = null;
                }
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
                if (this.charTimer) {

                }

            resume(items, itemInterval) {
                console.log('[TTS] resume called');
                if (this.audioPlayer) {
                    this.audioPlayer.play();
                    this.startProgressUpdate(items, itemInterval);
                }
                if (window.speechSynthesis) {
                    window.speechSynthesis.resume();
                }
            },

            startProgressUpdate(items, itemInterval) {
                this.clearProgressTimer();
                let lastItemIndex = -1;
                // 使用 requestAnimationFrame 实现更流畅的进度更新 (60fps)
                const updateFrame = () => {
                    if (this.audioPlayer && !this.audioPlayer.paused) {
                        const currentTime = this.audioPlayer.currentTime;
                        const duration = this.audioPlayer.duration;
                        
                        // 更新进度条
                        if (this.onProgress) {
                            this.onProgress(currentTime, duration);
                        }
                        
                        // 更新文字高亮 - 根据实际播放时间计算当前应该高亮的字符/单词
                        if (items && itemInterval && this.onWord) {
                            const estimatedItemIndex = Math.floor(currentTime * 1000 / itemInterval);
                            if (estimatedItemIndex !== lastItemIndex && estimatedItemIndex < items.length) {
                                this.onWord(items[estimatedItemIndex], estimatedItemIndex);
                                lastItemIndex = estimatedItemIndex;
                            }
                        }
                    }
                    if (this.isSpeaking) {
                        this.progressTimer = requestAnimationFrame(updateFrame);
                    }
                };
                this.progressTimer = requestAnimationFrame(updateFrame);
            },

            setVoice(voiceType) {
                this.currentVoice = voiceType;
                console.log('[TTS] Voice set to:', voiceType);
            },

            // 分段合成长文本
            async speakLongText(text, options, maxLength) {
                console.log('[TTS] speakLongText called, text length:', text.length);
                
                // 按句子分割文本
                const sentences = text.match(/[^。！？.!?]+[。！？.!?]+/g) || [text];
                console.log('[TTS] Split into', sentences.length, 'sentences');
                
                // 合并句子，确保每段不超过 maxLength
                const chunks = [];
                let currentChunk = '';
                
                for (const sentence of sentences) {
                    if ((currentChunk + sentence).length <= maxLength) {
                        currentChunk += sentence;
                    } else {
                        if (currentChunk) chunks.push(currentChunk);
                        currentChunk = sentence;
                    }
                }
                if (currentChunk) chunks.push(currentChunk);
                
                console.log('[TTS] Merged into', chunks.length, 'chunks');
                
                // 顺序播放每个片段
                let hasCalledOnStart = false;
                
                for (let i = 0; i < chunks.length; i++) {
                    console.log('[TTS] Speaking chunk', i + 1, '/', chunks.length, 'length:', chunks[i].length);
                    
                    await new Promise((resolve) => {
                        this.speak(chunks[i], {
                            onStart: () => {
                                // 只在第一个片段开始时调用一次 onStart
                                if (i === 0 && options.onStart && !hasCalledOnStart) {
                                    hasCalledOnStart = true;
                                    options.onStart();
                                }
                            },
                            onWord: (word, index) => {
                                if (options.onWord) {
                                    // 调整索引，使其对应原始文本
                                    const offset = chunks.slice(0, i).join('').length;
                                    options.onWord(word, index + offset);
                                }
                            },
                            onEnd: () => {
                                console.log('[TTS] Chunk', i + 1, 'ended');
                                resolve();
                            }
                        });
                    });
                    
                    // 在片段之间添加短暂延迟，避免触发频率限制
                    if (i < chunks.length - 1) {
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
                
                console.log('[TTS] All chunks spoken');
                if (options.onEnd) options.onEnd();
                return true;
            }
        };

                turn.dataset.type = type;
                
                // 智能分词：中文按字符分割，英文按单词分割
                const chars = Utils.splitTextForHighlight(text);
                console.log('[RadioHost] Split into', chars.length, 'chars:', chars);
                
                const charSpans = chars.map((char, i) =>
                    `<span class="word future" data-index="${i}">${char}</span>`
                ).join('');
                
                turn.innerHTML = `
                    <div class="turn-head">Hermes · ${time}</div>
                    <div class="turn-body">${charSpans}</div>
                `;
                
                scroll.appendChild(turn);
                
                // 确保滚动到底部，使用 requestAnimationFrame 确保 DOM 更新完成
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        scroll.scrollTop = scroll.scrollHeight;
                        console.log('[RadioHost] Scrolled to bottom, scrollHeight:', scroll.scrollHeight);
                    });
                });
                
                console.log('[RadioHost] Turn added to DOM');
                
                // Mark previous turns as completed
                scroll.querySelectorAll('.turn').forEach((t, i, arr) => {
                    if (i < arr.length - 1) {
                        t.classList.remove('active');
                    }
                });
                
                // Mark current turn as active
                turn.classList.add('active');
                
                this.currentTurn = turn;
                return turn;
            },

            currentWords: null,
            currentWordInterval: null,

            speakWithSync(text, options = {}) {
                console.log('[RadioHost] speakWithSync called, text length:', text.length);
                console.log('[RadioHost] Text preview:', text.substring(0, 50) + '...');
                
                // 强制显示一个提示，确认函数被调用
                console.warn('[RadioHost] ⚠️ TTS about to start!');

                const turn = this.addTurn(text);
                turn.classList.add('speaking');

                const words = turn.querySelectorAll('.word');
                console.log('[RadioHost] Word spans created:', words.length);

                // 保存当前单词信息供 pause/resume 使用
                this.currentWords = words;
                // 根据语速动态调整
                this.currentWordInterval = 250 / TTSService.webSpeechRate;

                // 重置进度条为 0%
                if (window.AppState && window.AppState.resetHermesProgress) {
                    window.AppState.resetHermesProgress();
                }

                // 调用 TTS 服务
                console.log('[RadioHost] Calling TTSService.speak...');
                const speakResult = TTSService.speak(text, {
                    onStart: () => {
                        console.log('[RadioHost] TTS onStart callback');
                        console.time('[RadioHost] TTS duration');
                        // 只有在 TTS 真正开始后才设置 Hermes 播放状态
                        if (window.AppState) {
                            window.AppState.hermesSpeaking = true;
                            window.AppState.hermesPaused = false;
                            window.AppState.updateHermesPlayButton();
                        }
                        if (options.onStart) options.onStart();
                    },
                    onWord: (word, index) => {
                        // Highlight current word with correct classes
                        words.forEach((w, i) => {
                            w.classList.remove('said', 'current', 'future');
                            if (i < index) {
                                w.classList.add('said');
                            } else if (i === index) {
                                w.classList.add('current');
                            } else {
                                w.classList.add('future');
                            }
                        });
                        if (options.onWord) options.onWord(word, index);
                    },
                    onProgress: (currentTime, duration) => {
                        // 更新 Hermes 进度条
                        if (window.AppState && window.AppState.updateHermesProgress) {
                            window.AppState.updateHermesProgress(currentTime, duration);
                        }
                    },
                    onEnd: () => {
                        console.log('[RadioHost] TTS onEnd callback');
                        console.timeEnd('[RadioHost] TTS duration');
                        turn.classList.remove('speaking');
                        // Mark all words as said
                        words.forEach(w => {
                            w.classList.remove('current', 'future');
                            w.classList.add('said');
                        });
                        this.currentWords = null;
                        this.currentWordInterval = null;
                        // 设置进度条为 100%
                        if (window.AppState && window.AppState.setHermesProgressFull) {
                            window.AppState.setHermesProgressFull();
                        }
                        if (options.onEnd) options.onEnd();
                    }
                });
                
                console.log('[RadioHost] TTSService.speak returned:', speakResult);
                
                // 捕获任何未处理的错误（如果返回的是 Promise）
                if (speakResult && typeof speakResult.then === 'function') {
                    speakResult.catch(error => {
                        console.error('[RadioHost] TTS speak error:', error);
                        // 确保清理状态并调用 onEnd
                        turn.classList.remove('speaking');
                        words.forEach(w => {
                            w.classList.remove('current', 'future');
                            w.classList.add('said');
                        });
                        this.currentWords = null;
                        this.currentWordInterval = null;
                        if (window.AppState) {
                            window.AppState.hermesSpeaking = false;
                            window.AppState.hermesPaused = false;
                            window.AppState.updateHermesPlayButton();
                        }
                        if (options.onEnd) options.onEnd();
                    });
                }
            },

            async waitForServer() {
                console.log('[ServerConnection] Waiting for server to be ready...');
                this.showLoadingOverlay();

                for (let i = 0; i < this.maxRetries; i++) {
                    try {
                        const response = await fetch('/api/health', {
                            method: 'GET',
                            headers: { 'Accept': 'application/json' }
                        });

                        if (response.ok) {
                            const data = await response.json();
                            if (data.status === 'ok') {
                                console.log('[ServerConnection] Server is ready!');
                                this.isReady = true;
                                this.hideLoadingOverlay();
                                return true;
                            }
                        }
                    } catch (error) {
                        console.log(`[ServerConnection] Retry ${i + 1}/${this.maxRetries}: Server not ready yet`);
                    }

                    // Update loading message
                    this.updateLoadingMessage(`正在连接服务器... (${i + 1}/${this.maxRetries})`);
                    await this.sleep(this.retryInterval);
                }

                console.error('[ServerConnection] Server connection failed after max retries');
                this.showErrorOverlay();
                return false;
            },

                            document.querySelectorAll(bottomButtonsSelector).forEach(b => {
                                if (b.dataset.mode) b.classList.remove('active');
                            });
                            btn.classList.add('active');
                            // Sync with top mode buttons
                            document.querySelectorAll('.mode-btn').forEach(b => {
                                b.classList.toggle('active', b.dataset.mode === mode);
                            });
                            await this.switchMode(mode);
                        }
                    });
                });

                // Radio mode controls
                const mpBtn = document.getElementById('mpBtn');
                if (mpBtn) {
                    mpBtn.addEventListener('click', () => this.togglePlay());
                }
                
                const mpPrevBtn = document.getElementById('mpPrevBtn');
                if (mpPrevBtn) {
                    mpPrevBtn.addEventListener('click', () => this.playPrevious());
                }
                
                const mpNextBtn = document.getElementById('mpNextBtn');
                if (mpNextBtn) {
                    mpNextBtn.addEventListener('click', () => this.skipToNextSong());
                }

                // Hermes 进度条点击/拖拽事件
                const hermesScrubber = document.getElementById('hermesScrubber');
                if (hermesScrubber) {
                    let isDragging = false;

                    const handleSeek = (e) => {
                        if (!this.hermesSpeaking || !this.hermesAudio) return;

                        const rect = hermesScrubber.getBoundingClientRect();
                        const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                        const clickX = clientX - rect.left;
                        const progress = Math.max(0, Math.min(1, clickX / rect.width));

                        // 跳转到对应位置
                        if (this.hermesAudio.duration) {
                            this.hermesAudio.currentTime = progress * this.hermesAudio.duration;
                            // 立即更新进度条视觉反馈
                            this.updateHermesProgress(this.hermesAudio.currentTime, this.hermesAudio.duration);
                        }
                    };

                    // 鼠标/触摸按下时立即跳转
                    hermesScrubber.addEventListener('pointerdown', (e) => {
                        isDragging = true;
                        hermesScrubber.setPointerCapture(e.pointerId);
                        handleSeek(e);
                    });

                    // 拖拽过程中持续跳转
                    hermesScrubber.addEventListener('pointermove', (e) => {
                        if (!isDragging) return;
                        e.preventDefault();
                        handleSeek(e);
                    });

                    // 释放时停止拖拽
                    hermesScrubber.addEventListener('pointerup', (e) => {
                        isDragging = false;
                        hermesScrubber.releasePointerCapture(e.pointerId);
                    });

                    // 触摸设备支持
                    hermesScrubber.addEventListener('touchstart', (e) => {
                        handleSeek(e);
                    }, { passive: true });
                }

                // Hermes 播放/暂停按钮事件
                const hermesPlayBtn = document.getElementById('hermesPlayBtn');
                if (hermesPlayBtn) {
                    hermesPlayBtn.addEventListener('click', () => this.toggleHermesSpeech());
                }

                // Chat mode controls
                const topPlayBtn = document.getElementById('topPlayBtn');
                if (topPlayBtn) {
                    topPlayBtn.addEventListener('click', () => this.togglePlay());
                }
                const topPrevBtn = document.getElementById('topPrevBtn');
                if (topPrevBtn) {
                    topPrevBtn.addEventListener('click', () => this.playPrevious());
                }
                const topNextBtn = document.getElementById('topNextBtn');
                if (topNextBtn) {
                    topNextBtn.addEventListener('click', () => this.playNext());
                }
                const topLikeBtn = document.getElementById('topLikeBtn');
                if (topLikeBtn) {
                    topLikeBtn.addEventListener('click', () => this.toggleLike());
                }

                // Queue toggle
                const queueHeader = document.getElementById('queueHeader');
                if (queueHeader) {
                    queueHeader.addEventListener('click', () => this.toggleQueue());
                }

                // Queue items
                document.querySelectorAll('.queue-item').forEach(item => {
                    item.addEventListener('click', () => this.selectQueueItem(item));
                });

                // Song cards
                document.querySelectorAll('.song-card').forEach(card => {
                    card.addEventListener('click', () => this.playSongCard(card));
                });

                // Chat input
                const chatSendBtn = document.getElementById('chatSendBtn');
                if (chatSendBtn) {
                    chatSendBtn.addEventListener('click', () => this.sendChatMessage());
