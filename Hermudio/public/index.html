            async playCurrentSongWithIntro(retryCount = 0) {
                const song = this.playlist[this.currentSongIndex];
                console.log('[RadioFlow] playCurrentSongWithIntro called, songIndex:', this.currentSongIndex, 'retryCount:', retryCount);
                
                if (!song) {
                    console.error('[RadioFlow] No song found at index:', this.currentSongIndex);
                    return;
                }
                
                const maxRetries = 2;
                const retryDelay = 1500;
                
                console.log('[RadioFlow] Current song:', song.name, '-', song.artist);
                this.radioState = 'intro';
                console.log('[RadioFlow] State changed to: intro');
                console.time('[RadioFlow] Song intro generation');
                
                // Generate song intro
                try {
                    console.log('[RadioFlow] Fetching song intro from API...');
                    const response = await API.post('/api/radio/song-intro', { song });
                    console.log('[RadioFlow] Song intro API response:', response.success ? 'success' : 'failed');
                    
                    if (response.success && response.script) {
                        console.log('[RadioFlow] Song intro received, length:', response.script.length);

                        // 根据文案长度计算超时时间（中文约 250ms/字，加上 10 秒缓冲）
                        const estimatedDuration = response.script.length * 250 + 10000;
                        const timeoutDuration = Math.max(estimatedDuration, 30000); // 至少30秒
                        console.log('[RadioFlow] Estimated TTS duration:', estimatedDuration, 'ms, timeout:', timeoutDuration, 'ms');

                        // 确保 TTS 的 onEnd 总是被调用
                        let introTtsCompleted = false;
                        const introTtsTimeout = setTimeout(() => {
                            if (!introTtsCompleted) {
                                console.warn('[RadioFlow] Intro TTS onEnd timeout, forcing play song');
                                introTtsCompleted = true;
                                console.timeEnd('[RadioFlow] Song intro generation');
                                this.actuallyPlaySong(song);
                            }
                        }, timeoutDuration);

                        RadioHost.speakWithSync(response.script, {
                            onStart: () => console.log('[RadioFlow] Song intro TTS started'),
                            onEnd: () => {
                                if (introTtsCompleted) return; // 已经通过超时调用了
                                introTtsCompleted = true;
                                clearTimeout(introTtsTimeout);
                                console.log('[RadioFlow] Song intro TTS ended');
                                console.timeEnd('[RadioFlow] Song intro generation');
                                // After intro, play the song
                                this.actuallyPlaySong(song);
                            }
                        });
                    } else {
                        console.warn('[RadioFlow] Song intro API returned no script');
                        this.actuallyPlaySong(song);
                    }
                } catch (error) {
                    console.error('[RadioFlow] Song intro error:', error);
                    console.timeEnd('[RadioFlow] Song intro generation');
                    
                    // 自动重试机制
                    if (retryCount < maxRetries) {
                        console.log(`[RadioFlow] Retrying playCurrentSongWithIntro in ${retryDelay}ms... (${retryCount + 1}/${maxRetries})`);
                        await this.sleep(retryDelay);
                        return this.playCurrentSongWithIntro(retryCount + 1);
                    }
                    
                    console.warn('[RadioFlow] Max retries reached, playing song without intro');
                    this.actuallyPlaySong(song);
                }
            },

            async actuallyPlaySong(song) {
                // 防止重复调用
                if (this.currentPlayingSongId === song.id) {
                    console.log('[RadioFlow] Song already playing, skipping:', song.name);
                    return;
                }
                this.currentPlayingSongId = song.id;

                console.log('[RadioFlow] actuallyPlaySong called for:', song.name);
                this.radioState = 'playing';
                console.log('[RadioFlow] State changed to: playing');
                this.updateCurrentSong(song);

                // Mark song as played to avoid repeats
                if (song.id) {
                    API.post('/api/radio/mark-played', { songId: song.id }).catch(e => {
                        console.warn('[RadioFlow] Failed to mark song as played:', e.message);
                    });
                }

                try {
                    console.log('[RadioFlow] Calling API.play with songId:', song.id, 'encryptedId:', song.encryptedId);
                    console.time('[RadioFlow] Song playback start');
                    const response = await API.play(song.id, song.encryptedId);
                    console.log('[RadioFlow] Play API response:', response.success ? 'success' : 'failed', response);

                    if (response.success) {
                        this.setPlaying(true);
                        this.consecutiveFailures = 0; // Reset failure counter
                        console.log('[RadioFlow] Song playback started successfully');
                        console.timeEnd('[RadioFlow] Song playback start');
                        // Restart status polling if it was stopped
                        if (!this.statusPollInterval) {
                            this.startStatusPolling();
                        }
                        // Monitor song progress and play outro when done
                        this.monitorSongProgress();
                    } else if (response.loginRequired) {
                        console.error('[RadioFlow] Play API returned login required');
                        console.timeEnd('[RadioFlow] Song playback start');
                        // Show login required message
                        this.showLoginRequiredMessage();
                        this.setPlaying(false);
                        this.radioState = 'idle';
                    } else {
                        console.error('[RadioFlow] Play API returned failure:', response.error, response.message, response.details || '', response);
                        // If play fails, skip outro and go directly to next song intro
                        console.log('[RadioFlow] Song playback failed, skipping to next song...');
                        this.consecutiveFailures = (this.consecutiveFailures || 0) + 1;
                        
                        // If too many consecutive failures, stop trying and show error
                        if (this.consecutiveFailures >= 3) {
                            console.error('[RadioFlow] Too many consecutive failures, stopping playback');
                            this.addChatMessage('⚠️ 连续多首歌曲播放失败，请检查网络连接或尝试重新登录网易云音乐。', false);
                            this.setPlaying(false);
                            this.radioState = 'idle';
                            this.consecutiveFailures = 0;
                        } else {
                            this.skipToNextSongAfterFailure();
                        }
                    }
                } catch (error) {
                    console.error('[RadioFlow] Play error:', error);
                    console.timeEnd('[RadioFlow] Song playback start');
                    // If play throws error, skip outro and go directly to next song intro
                    console.log('[RadioFlow] Song playback error, skipping to next song...');
                    this.consecutiveFailures = (this.consecutiveFailures || 0) + 1;
                    
                    if (this.consecutiveFailures >= 3) {
                        console.error('[RadioFlow] Too many consecutive failures, stopping playback');
                        this.addChatMessage('⚠️ 连续多首歌曲播放失败，请检查网络连接或尝试重新登录网易云音乐。', false);
                        this.setPlaying(false);
                        this.radioState = 'idle';
                        this.consecutiveFailures = 0;
                    } else {
                        this.skipToNextSongAfterFailure();
                    }
                }
            },

            showLoginRequiredMessage() {

                const loginMessage = '请先登录网易云音乐账号才能播放歌曲。点击确定前往登录页面。';

            monitorSongProgress() {
                console.log('[RadioFlow] monitorSongProgress started, polling every 5s');
                let pollCount = 0;
                let hasStartedPlaying = false; // Track if song has actually started
                let consecutiveStoppedCount = 0; // Count consecutive stopped states
                
                // Poll for song completion
                const checkInterval = setInterval(async () => {
                    pollCount++;
                    
                    if (!this.isPlaying) {
                        console.log('[RadioFlow] Song monitoring stopped (isPlaying=false), polls:', pollCount);
                        clearInterval(checkInterval);
                        return;
                    }
                    
                    try {
                        const status = await API.getStatus();
                        if (status.success && status.status) {
                            const progress = status.status.progress || 0;
                            const isPlayingStatus = status.status.isPlaying;
                            
                            // Mark as started if we see progress > 5% or ncm reports playing
                            if (!hasStartedPlaying && (progress > 5 || isPlayingStatus)) {
                                hasStartedPlaying = true;
                                console.log('[RadioFlow] Song has started playing, progress:', progress.toFixed(1) + '%');
                            }
                            
                            // Log every 6 polls (30 seconds), or every poll if debugging
                            if (pollCount % 6 === 0 || pollCount <= 3) {
                                console.log(`[RadioFlow] Song progress: ${progress.toFixed(1)}%, isPlaying: ${isPlayingStatus}, hasStarted: ${hasStartedPlaying}`);
                            }
                            
                            // Count consecutive stopped states (only after song has started)
                            if (hasStartedPlaying && !isPlayingStatus) {
                                consecutiveStoppedCount++;
                                console.log(`[RadioFlow] Detected stopped state (${consecutiveStoppedCount}/2), progress: ${progress.toFixed(1)}%`);
                            } else {
                                consecutiveStoppedCount = 0;
                            }
                            
                            // Check if song finished:
                            // 1. Progress > 95%, OR
                            // 2. NCM reports stopped for 2 consecutive checks (after song has started)
                            const shouldTriggerOutro = progress > 95 || (hasStartedPlaying && consecutiveStoppedCount >= 2);
                            
                            if (shouldTriggerOutro) {
                                console.log('[RadioFlow] Song finished detected, progress:', progress.toFixed(1) + '%', 'isPlaying:', isPlayingStatus, 'stoppedCount:', consecutiveStoppedCount);
                                clearInterval(checkInterval);
                                // Important: Stop status polling and set isPlaying to false
                                this.stopStatusPolling();
                                this.setPlaying(false);
                                this.onSongFinished();
                            }
                        }
                    } catch (e) {
                        console.error('[RadioFlow] Status check error:', e.message);
                    }
                }, 5000);
            },

            async onSongFinished(retryCount = 0) {
                console.log('[RadioFlow] onSongFinished called for song index:', this.currentSongIndex, 'retryCount:', retryCount);
                this.radioState = 'outro';
                console.log('[RadioFlow] State changed to: outro');
                const song = this.playlist[this.currentSongIndex];
                
                if (!song) {
                    console.error('[RadioFlow] No song found for outro at index:', this.currentSongIndex);
                    return;
                }
                
                const maxRetries = 2;
                const retryDelay = 1500;
                
                console.log('[RadioFlow] Generating outro for song:', song.name, '-', song.artist);
                console.time('[RadioFlow] Song outro generation');
                
                // Generate outro
                try {
                    console.log('[RadioFlow] Fetching song outro from API...');
                    const response = await API.post('/api/radio/song-outro', { song });
                    console.log('[RadioFlow] Song outro API response:', response.success ? 'success' : 'failed', response.error || '');
                    
                    if (response.success && response.script) {
                        console.log('[RadioFlow] Song outro received, length:', response.script.length, 'content:', response.script.substring(0, 50) + '...');

                        // 根据文案长度计算超时时间（中文约 250ms/字，加上 10 秒缓冲）
                        const estimatedDuration = response.script.length * 250 + 10000;
                        const timeoutDuration = Math.max(estimatedDuration, 30000); // 至少30秒
                        console.log('[RadioFlow] Estimated outro TTS duration:', estimatedDuration, 'ms, timeout:', timeoutDuration, 'ms');

                        // 确保 TTS 的 onEnd 总是被调用
                        let ttsCompleted = false;
                        const ttsTimeout = setTimeout(() => {
                            if (!ttsCompleted) {
                                console.warn('[RadioFlow] TTS onEnd timeout, forcing next song');
                                ttsCompleted = true;
                                this.moveToNextSongAfterOutro();
                            }
                        }, timeoutDuration);

                        RadioHost.speakWithSync(response.script, {
                            onStart: () => console.log('[RadioFlow] Song outro TTS started'),
                            onEnd: () => {
                                if (ttsCompleted) return; // 已经通过超时调用了
                                ttsCompleted = true;
                                clearTimeout(ttsTimeout);
                                console.log('[RadioFlow] Song outro TTS ended');
                                console.timeEnd('[RadioFlow] Song outro generation');
                                this.moveToNextSongAfterOutro();
                            }
                        });
                    } else {
                        console.warn('[RadioFlow] Song outro API returned no script, skipping to next song');
                        this.moveToNextSongAfterOutro();
                    }
                } catch (error) {
                    console.error('[RadioFlow] Song outro error:', error);
                    console.timeEnd('[RadioFlow] Song outro generation');
                    
                    // 自动重试机制
                    if (retryCount < maxRetries) {
                        console.log(`[RadioFlow] Retrying onSongFinished in ${retryDelay}ms... (${retryCount + 1}/${maxRetries})`);
                        await this.sleep(retryDelay);
                        return this.onSongFinished(retryCount + 1);
                    }
                    
                    console.warn('[RadioFlow] Max retries reached, skipping to next song');
                    this.moveToNextSongAfterOutro();
                }
            },

            initWaveCanvas() {
                const canvas = document.getElementById('radioWaveCanvas');
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                let time = 0;
                this.wavePlaying = false;

                const draw = () => {
                    ctx.clearRect(0, 0, width, height);

                    // Draw wave lines
                    ctx.strokeStyle = 'rgba(41, 255, 184, 0.6)';
                    ctx.lineWidth = 2;

                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        for (let x = 0; x < width; x += 2) {
                            const amplitude = this.wavePlaying ? 30 + i * 10 : 10;
                            const frequency = 0.02 + i * 0.005;
                            const y = height / 2 + Math.sin(x * frequency + time + i) * amplitude * Math.sin(x / width * Math.PI);

                            if (x === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.stroke();
                    }

                    time += this.wavePlaying ? 0.1 : 0.02;
                    requestAnimationFrame(draw);
                };

                draw();
            },

                // Add user message

                // Get AI response

                    if (response.success) {
                        // Handle different action types
                        if (response.action === 'recommend' && response.recommendedSongs && response.recommendedSongs.length > 0) {
                            // Show recommendation cards
                            this.addRecommendationMessage(response.message, response.recommendedSongs, response.autoPlayTimeout);
                        } else if (response.action === 'play' && response.song) {
                            // Direct play - show message and update player
                            this.addChatMessage(response.message, false);
                            this.updateCurrentSong(response.song);
                            this.setPlaying(true);
                        } else {
                            // Regular chat message
                            this.addChatMessage(response.message, false);
                        }
                    }
                } catch (error) {
                    console.error('Chat error:', error);
                }
            },

            // Add recommendation message with song cards
            addRecommendationMessage(text, songs, autoPlayTimeout = 30000) {
                const container = document.getElementById('chatContainer');
                const now = new Date();
                const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                const messageId = 'rec-' + Date.now();
                const message = document.createElement('div');
                message.className = 'chat-message';
                message.id = messageId;
                
                // Build song cards HTML
                const songCardsHtml = songs.map((song, index) => `
                    <div class="song-card" data-index="${index}" data-song-id="${song.id}" data-encrypted-id="${song.encryptedId}">
                        <div class="song-card-play">▶</div>
                        <div class="song-card-info">
                            <div class="song-card-title">${song.displayName || song.name}</div>
                            <div class="song-card-artist">${song.displayArtist || song.artist}</div>
                        </div>
                    </div>
                `).join('');
                
                // Auto-play countdown HTML
                const countdownHtml = `
                    <div class="auto-play-countdown" style="font-size: 11px; color: var(--text-secondary); margin-top: 8px; text-align: center;">
                        <span class="countdown-text">${Math.floor(autoPlayTimeout / 1000)}秒后自动播放第一首</span>
                        <div class="countdown-bar" style="width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 4px; border-radius: 1px; overflow: hidden;">
                            <div class="countdown-fill" style="width: 100%; height: 100%; background: var(--accent); transition: width 1s linear;"></div>
                        </div>
                    </div>
                `;
                
                message.innerHTML = `
                    <div class="message-avatar">🎵</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">Hermes</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-bubble">${text}</div>
                        <div class="song-recommendations">
                            ${songCardsHtml}
                        </div>
                        ${countdownHtml}
                    </div>
                `;
                
                container.appendChild(message);
                container.scrollTop = container.scrollHeight;
                
                // Add click handlers for song cards
                const cards = message.querySelectorAll('.song-card');
                let autoPlayCancelled = false;
                let userSelectedSong = false;

                const playSong = async (index, card) => {
                    if (autoPlayCancelled) return;
                    autoPlayCancelled = true;
                    userSelectedSong = true;

                    const song = songs[index];

                    // Update UI
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // Hide countdown
                    const countdown = message.querySelector('.auto-play-countdown');
                    if (countdown) countdown.style.display = 'none';

                    // Play song
                    try {
                        const result = await API.play(song.id, song.encryptedId);

                        // Check if play failed
                        if (!result.success) {
                            throw new Error(result.message || result.error || '播放失败');
                        }

                        this.updateCurrentSong(song);
                        this.setPlaying(true);

                        // Show playing indicator
                        const playBtn = card.querySelector('.song-card-play');
                        if (playBtn) playBtn.textContent = '♪';

                        // 添加正在播放的消息
                        this.addChatMessage(`正在为你播放 **《${song.name}》** — ${song.artist}`, false);
                    } catch (error) {
                        console.error('Failed to play song:', error);

                        // Show error message in chat and recommend alternatives
                        const errorMessage = error.message || '播放失败';
                        let userFriendlyError = '播放失败';

                        // Map error codes to user-friendly messages
                        if (errorMessage.includes('ncm_not_logged_in')) {
                            userFriendlyError = '播放失败，因为需要先登录网易云音乐';
                        } else if (errorMessage.includes('missing_encrypted_id')) {
                            userFriendlyError = '播放失败，因为无法获取歌曲播放信息（可能因版权问题）';
                        } else if (errorMessage.includes('copyright') || errorMessage.includes('版权')) {
                            userFriendlyError = '播放失败，因为歌曲版权受限';
                        } else if (errorMessage.includes('network') || errorMessage.includes('网络')) {
                            userFriendlyError = '播放失败，因为网络连接问题';
                        } else {
                            userFriendlyError = `播放失败，因为${errorMessage}`;
                        }

                        // Add error message to chat
                        this.addChatMessage(`${userFriendlyError}。让我为你推荐其他类似的歌曲：`, false);

                        // Get song style/genre for similar recommendations
                        const songStyle = song.style || song.genre || this.inferSongStyle(song);

                        // Recommend 3 similar songs
                        this.recommendSimilarSongs(song, songStyle);
                    }
                };
                
                cards.forEach((card, index) => {
                    card.addEventListener('click', () => playSong(index, card));
                });
                
                // Auto-play countdown
                let remainingTime = autoPlayTimeout / 1000;
                const countdownText = message.querySelector('.countdown-text');
                const countdownFill = message.querySelector('.countdown-fill');
                
                const countdownInterval = setInterval(() => {
                    if (autoPlayCancelled) {
                        clearInterval(countdownInterval);
                        return;
                    }
                    
                    remainingTime--;
                    if (countdownText) {
                        countdownText.textContent = `${remainingTime}秒后自动播放第一首`;
                    }
                    if (countdownFill) {
                        const progress = (remainingTime / (autoPlayTimeout / 1000)) * 100;
                        countdownFill.style.width = `${progress}%`;
                    }
                    
                    if (remainingTime <= 0) {
                        clearInterval(countdownInterval);
                        if (!autoPlayCancelled && cards.length > 0) {
                            playSong(0, cards[0]);
                        }
                    }
                }, 1000);
            },

            addChatMessage(text, isUser) {
                const container = document.getElementById('chatContainer');
                const now = new Date();
                const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                const message = document.createElement('div');
                message.className = `chat-message ${isUser ? 'user' : ''}`;
                message.innerHTML = `
                    <div class="message-avatar">${isUser ? '👤' : '🎵'}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">${isUser ? 'You' : 'Hermes'}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-bubble ${isUser ? 'user' : ''}">${text}</div>
                    </div>
                `;
                container.appendChild(message);
                container.scrollTop = container.scrollHeight;
            },

            /**
             * Infer song style based on song name, artist, or album
             */
            inferSongStyle(song) {
                const text = `${song.name} ${song.artist} ${song.album || ''}`.toLowerCase();
                
                // Jazz keywords
                if (/jazz|爵士|萨克斯|蓝调|blues/.test(text)) return 'jazz';
                
                // Classical keywords
                if (/classical|古典|钢琴|piano|小提琴|violin|交响曲|symphony/.test(text)) return 'classical';
                
                // Rock keywords
                if (/rock|摇滚|金属|metal|乐队|band/.test(text)) return 'rock';
                
                // Pop keywords
                if (/pop|流行|热门|hit/.test(text)) return 'pop';
                
                // Folk keywords
                if (/folk|民谣|吉他|guitar/.test(text)) return 'folk';
                
                // Electronic keywords
                if (/electronic|电子|edm|电音|dance|舞曲/.test(text)) return 'electronic';
                
                // Light music keywords
                if (/light|轻音乐|纯音乐|instrumental|bgm|背景/.test(text)) return 'light';
                
                // Default to pop
                return 'pop';
            },

            /**
             * Recommend similar songs when playback fails
             */
            async recommendSimilarSongs(failedSong, style) {
                try {
                    // Search for similar songs based on style
                    const styleKeywords = {
                        'jazz': ['爵士', 'jazz', '萨克斯'],
                        'classical': ['古典', '钢琴', 'classical', 'piano'],
                        'rock': ['摇滚', 'rock', '乐队'],
                        'pop': ['流行', 'pop', '热门'],
                        'folk': ['民谣', 'folk', '吉他'],
                        'electronic': ['电子', 'electronic', 'edm'],
                        'light': ['轻音乐', 'light', '纯音乐']
                    };
                    
                    const keywords = styleKeywords[style] || ['流行'];
                    const searchKeyword = keywords[Math.floor(Math.random() * keywords.length)];
                    
                    // Search for songs
                    const searchResponse = await API.search(searchKeyword, 10);
                    
                    if (!searchResponse.success || !searchResponse.data || searchResponse.data.length === 0) {
                        this.addChatMessage('抱歉，暂时找不到类似的歌曲。你可以尝试搜索其他风格。', false);
                        return;
                    }
                    
                    // Filter out the failed song and select 3 random songs
                    const similarSongs = searchResponse.data
                        .filter(s => s.id !== failedSong.id)
                        .slice(0, 3);
                    
                    if (similarSongs.length === 0) {
                        this.addChatMessage('抱歉，暂时找不到类似的歌曲。你可以尝试搜索其他风格。', false);
                        return;
                    }
                    
                    // Build recommendation message
                    let message = `为你推荐${similarSongs.length}首类似的${style === 'pop' ? '流行' : style === 'jazz' ? '爵士' : style === 'classical' ? '古典' : style === 'rock' ? '摇滚' : style === 'folk' ? '民谣' : style === 'electronic' ? '电子' : '轻音乐'}歌曲：\n\n`;
                    similarSongs.forEach((song, index) => {
                        message += `${index + 1}. **《${song.name}》** — ${song.artist}\n`;
                    });
                    message += '\n点击卡片选择你想听的~';
                    
                    // Add recommendation with cards
                    this.addRecommendationMessage(message, similarSongs, 30000);
                    
                } catch (error) {
                    console.error('Failed to recommend similar songs:', error);
                    this.addChatMessage('抱歉，推荐歌曲时出错了。你可以直接告诉我你想听什么类型的音乐。', false);
                }
            },

            startStatusPolling() {
                this.statusPollInterval = setInterval(() => this.loadStatus(), 2000);
            },

            stopStatusPolling() {
                if (this.statusPollInterval) {
                    clearInterval(this.statusPollInterval);
                    this.statusPollInterval = null;
                }
            },

            async loadStatus() {
                try {
                    const response = await API.getStatus();
                    if (response.success && response.status) {
                        const status = response.status;
                        
                        // Update current song if changed
                        if (status.currentSong) {
                            const song = status.currentSong;
                            if (!this.currentSong || this.currentSong.id !== song.id) {
                                this.updateCurrentSong(song);
                            }
                        }
                        
                        // Update playing state
                        this.setPlaying(status.isPlaying);
                        
                        // Update mini player progress (radio mode)
                        this.updateMiniPlayerProgress(status.progress || 0, status.currentSong);
                        
                        // Update chat mode progress bar
                        this.updateChatProgress(status.progress || 0, status.currentSong);
                        
                        // Check if song finished in chat mode and auto-recommend next
                        if (this.currentMode === 'chat' && status.currentSong && status.progress >= 99) {
                            this.handleChatSongFinished();
                        }
                    }
                } catch (error) {
                    // Silent fail
                }
            },

            // Handle song finished in chat mode - auto recommend next
            async handleChatSongFinished() {
                console.log('[Chat] Song finished, auto-recommending next song...');
                
                // Prevent multiple triggers
                if (this._chatSongFinishedHandled) return;
                this._chatSongFinishedHandled = true;
                
                // Reset flag after 5 seconds
                setTimeout(() => {
                    this._chatSongFinishedHandled = false;
                }, 5000);
                
                // Add a message indicating song finished
                this.addChatMessage('刚才的歌曲播放完毕了，让我为你推荐下一首...', false);
                
                try {
                    // Get recommendation from Hermes
                    const response = await API.chat('推荐一首歌');
                    if (response.success) {
                        if (response.action === 'recommend' && response.recommendedSongs && response.recommendedSongs.length > 0) {
                            this.addRecommendationMessage(response.message, response.recommendedSongs, response.autoPlayTimeout);
                        } else if (response.action === 'play' && response.song) {
                            this.addChatMessage(response.message, false);
                            this.updateCurrentSong(response.song);
                            this.setPlaying(true);
                        } else {
                            this.addChatMessage(response.message, false);
                        }
                    }
                } catch (error) {
                    console.error('[Chat] Auto-recommend error:', error);
                    this.addChatMessage('抱歉，推荐歌曲时出错了。你可以告诉我你想听什么类型的音乐。', false);
                }
            },

            // Update mini player progress bar and time
            updateMiniPlayerProgress(progress, song) {
                const fill = document.getElementById('radioMpFill');
                const timeEl = document.getElementById('radioMpTime');
                
                if (fill) {
                    fill.style.width = progress + '%';
                }
                
                if (timeEl && song && song.duration) {
                    const durationSec = Math.floor(song.duration / 1000);
                    const currentSec = Math.floor((progress / 100) * durationSec);
                    
                    const currentMins = Math.floor(currentSec / 60);
                    const currentSecs = currentSec % 60;
                    const durationMins = Math.floor(durationSec / 60);
                    const durationSecs = durationSec % 60;
                    
                    timeEl.textContent = `${currentMins}:${currentSecs.toString().padStart(2, '0')} / ${durationMins}:${durationSecs.toString().padStart(2, '0')}`;
                }
            },

            // Update chat mode progress bar and time
            updateChatProgress(progress, song) {
                const fill = document.getElementById('topProgressFill');
                const currentTimeEl = document.getElementById('currentTime');
                const totalTimeEl = document.getElementById('totalTime');
                
                if (fill) {
                    fill.style.width = progress + '%';
                }
                
                if (song && song.duration) {
                    const durationSec = Math.floor(song.duration / 1000);
                    const currentSec = Math.floor((progress / 100) * durationSec);
                    
                    const currentMins = Math.floor(currentSec / 60);
                    const currentSecs = currentSec % 60;
                    const durationMins = Math.floor(durationSec / 60);
                    const durationSecs = durationSec % 60;
                    
                    if (currentTimeEl) {
                        currentTimeEl.textContent = `${currentMins}:${currentSecs.toString().padStart(2, '0')}`;
                    }
                    if (totalTimeEl) {
                        totalTimeEl.textContent = `${durationMins}:${durationSecs.toString().padStart(2, '0')}`;
                    }
                }
            },

            async loadInitialStatus() {
                try {
                    const response = await API.getStatus();
                    if (response.success && response.status.currentSong) {
                        this.updateCurrentSong(response.status.currentSong);
                        this.setPlaying(response.status.isPlaying);
                    }
                } catch (error) {
                    console.log('Server not ready');
                }
            }
        };

        // Expose AppState to window for TTSService access
        window.AppState = AppState;

        // Audio context unlock - required for browser autoplay policy
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            console.log('[Audio] User interaction detected, audio unlocked');
            // Create a silent audio context to unlock audio
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==');
            silentAudio.play().catch(() => {});
        }
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });

        // Expose test functions for debugging
        window.testTTS = async function() {
            console.log('[Test] ========== TTS Test Start ==========');
            console.log('[Test] TTSService.apiBase:', TTSService.apiBase);
            console.log('[Test] TTSService.isSpeaking:', TTSService.isSpeaking);
            console.log('[Test] Audio unlocked:', audioUnlocked);
            
            const testText = '你好，这是TTS测试。';
            console.log('[Test] Calling TTSService.speak with:', testText);
            
            try {
                const result = await TTSService.speak(testText, {
                    onStart: () => console.log('[Test] ✅ TTS onStart callback fired'),
                    onEnd: () => console.log('[Test] ✅ TTS onEnd callback fired'),
                    onWord: (word, index) => console.log('[Test] TTS onWord:', word, index)
                });
                console.log('[Test] TTS speak returned:', result);
            } catch (error) {
                console.error('[Test] ❌ TTS speak failed:', error);
            }
            console.log('[Test] ========== TTS Test End ==========');
        };
        
        window.testDirectAudio = async function() {
            console.log('[Test] ========== Direct Audio Test ==========');
            try {
                const response = await fetch('http://localhost:6688/api/tts/doubao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: '直接音频测试',
                        voice_type: 'Chinese (Mandarin)_Warm_Bestie',
                        speed: 0.9,
                        vol: 1.0
                    })
                });
                const data = await response.json();
                console.log('[Test] API response:', data.success ? 'success' : 'failed');
                
                if (data.success && data.data.audio) {
                    console.log('[Test] Creating audio element...');
                    const audio = new Audio(`data:audio/mp3;base64,${data.data.audio}`);
                    audio.volume = 0.5;
                    
                    audio.onplay = () => console.log('[Test] ✅ Direct audio playing');
                    audio.onended = () => console.log('[Test] ✅ Direct audio ended');
                    audio.onerror = (e) => console.error('[Test] ❌ Direct audio error:', e);
                    
                    console.log('[Test] Calling audio.play()...');
                    await audio.play();
                    console.log('[Test] ✅ audio.play() succeeded');
                }
            } catch (error) {
                console.error('[Test] ❌ Direct audio test failed:', error);
            }
        };
        
        window.testRadioHost = function() {
            console.log('[Test] Testing RadioHost...');
            RadioHost.speakWithSync('你好，这是RadioHost测试。', {
                onStart: () => console.log('[Test] RadioHost onStart'),
                onEnd: () => console.log('[Test] RadioHost onEnd')
            });
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            AppState.init();
        });
    </script>
