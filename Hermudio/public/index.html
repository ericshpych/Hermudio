            // 【新增】平滑进度动画
            smoothProgressInterval: null,
            lastKnownProgress: 0,
            lastProgressUpdateTime: 0,
            currentSongDuration: 0,

            startSmoothProgressAnimation() {
                // 每 100ms 更新一次进度，实现平滑动画
                this.smoothProgressInterval = setInterval(() => {
                    if (!this.isPlaying || !this.currentSong) return;

                    const now = Date.now();
                    const elapsed = now - this.lastProgressUpdateTime;

                    // 如果距离上次服务器更新超过 500ms，使用本地估算
                    if (elapsed > 500 && this.currentSongDuration > 0) {
                        // 基于时间估算进度增量
                        const progressIncrement = (elapsed / this.currentSongDuration) * 100;
                        this.lastKnownProgress = Math.min(this.lastKnownProgress + progressIncrement, 99);

                        // 更新UI（不触发服务器请求）
                        this.updateMiniPlayerProgressSmooth(this.lastKnownProgress);
                        this.updateChatProgressSmooth(this.lastKnownProgress);
                    }
                }, 100);
            },

            stopSmoothProgressAnimation() {
                if (this.smoothProgressInterval) {
                    clearInterval(this.smoothProgressInterval);
                    this.smoothProgressInterval = null;
                }
            },

            // 【新增】格式化时间戳用于日志
            formatTimestamp(ts) {
                const d = new Date(ts);
                const h = String(d.getHours()).padStart(2, '0');
                const m = String(d.getMinutes()).padStart(2, '0');
                const s = String(d.getSeconds()).padStart(2, '0');
                const ms = String(d.getMilliseconds()).padStart(3, '0');
                return `${h}:${m}:${s}.${ms}`;
            },

            // 【新增】带时间戳的日志
            logWithTime(msg) {
                const now = Date.now();
                const ts = this.formatTimestamp(now);
                let elapsedStr = '';
                if (this._pageLoadStartTime) {
                    const elapsed = now - this._pageLoadStartTime;
                    elapsedStr = ` (+${(elapsed/1000).toFixed(2)}s)`;
                }
                console.log(`⏱️ [${ts}]${elapsedStr} ${msg}`);
            },

            // 【新增】平滑更新迷你播放器进度（不触发时间计算）
            updateMiniPlayerProgressSmooth(progress) {
                const fill = document.getElementById('mpFill');
                if (fill) {
                    fill.style.width = progress + '%';

            },

            // 【新增】平滑更新聊天模式进度（不触发时间计算）
            updateChatProgressSmooth(progress) {

                if (fill) {

            async loadStatus() {
                try {
                    const response = await API.getStatus();
                    if (response.success && response.status) {
                        const status = response.status;

                        // 【修复】更新当前歌曲 - 不仅检查ID，还检查歌曲名是否一致
                        if (status.currentSong) {
                            const song = status.currentSong;
                            const songChanged = !this.currentSong || 
                                                this.currentSong.id !== song.id ||
                                                this.currentSong.name !== song.name;
                            if (songChanged) {
                                console.log('[Status] Song changed, updating display:', song.name, 'previous:', this.currentSong?.name);
                                this.updateCurrentSong(song);
                            }
                        }

                        // 【修复】更新播放状态 - 优先信任前端状态，仅在明确知道状态变化时才更新
                        // 问题：后端ncm-cli状态可能和实际播放状态不一致
                        // 解决：如果前端显示正在播放，且进度在更新，则保持播放状态
                        const progress = status.progress || 0;
                        const progressMoving = this.lastKnownProgress !== undefined && 
                                               Math.abs(progress - this.lastKnownProgress) > 0.5;
                        
                        if (this.isPlaying && !status.isPlaying) {
                            // 前端认为在播放，但后端报告未播放
                            if (progressMoving || progress > 0) {
                                // 进度在变化或有进度，说明实际在播放，保持前端状态
                                console.log('[Status] Progress is moving (' + this.lastKnownProgress + ' -> ' + progress + '), keeping playing state');
                            } else {
                                // 进度没有变化，可能确实暂停了
                                console.log('[Status] No progress change, updating to paused');
                                this.setPlaying(false);
                            }
                        } else if (!this.isPlaying && status.isPlaying) {
                            // 前端认为未播放，但后端报告在播放
                            console.log('[Status] Backend reports playing, updating state');
                            this.setPlaying(true);
                        }

                        // 【修复】更新进度时记录时间和进度
                        this.lastKnownProgress = progress;
                        this.lastProgressUpdateTime = Date.now();
                        if (status.currentSong && status.currentSong.duration) {
                            this.currentSongDuration = status.currentSong.duration;
                        }

                        // 【修复】暂停时保持进度，不更新进度条
                        if (this._pausedProgress !== null && !this.isPlaying) {
                            // 暂停状态下，使用保存的进度，不更新进度条
                            console.log('[Status] Paused, keeping progress:', this._pausedProgress + '%');
                            this.updateMiniPlayerProgress(this._pausedProgress, this.currentSong, status.position, status.duration);
                            this.updateChatProgress(this._pausedProgress, this.currentSong, status.position, status.duration);
                        } else {
                            // 正常播放状态，更新进度条
                            this.updateMiniPlayerProgress(progress, status.currentSong, status.position, status.duration);
                            this.updateChatProgress(progress, status.currentSong, status.position, status.duration);
                        }

                        // Check if song finished in chat mode and auto-recommend next
                        if (this.currentMode === 'chat' && status.currentSong && progress >= 99) {
                            this.handleChatSongFinished();
                        }
                    }
                } catch (error) {
                    // Silent fail
                }
            },

            // Handle song finished in chat mode - auto recommend next
            async handleChatSongFinished() {
                console.log('[Chat] Song finished, auto-recommending next song...');
                
                // Prevent multiple triggers
                if (this._chatSongFinishedHandled) return;
                this._chatSongFinishedHandled = true;
                
                // Reset flag after 5 seconds
                setTimeout(() => {

                    const blockedSongs = Array.from(this.blockedSongs);

                    if (response.success) {

                } catch (error) {
                    console.error('[Chat] Auto-recommend error:', error);

                }

            // Update mini player progress bar and time
            updateMiniPlayerProgress(progress, song, positionSec = null, durationSec = null) {
                const fill = document.getElementById('mpFill');
                const timeEl = document.getElementById('mpTime');
                
                if (fill) {
                    fill.style.width = progress + '%';
                }
                
                if (timeEl) {
                    // 优先使用直接从 ncm-cli 获得的 position 和 duration（秒）
                    let currentSec = positionSec;
                    let totalSec = durationSec;
                    
                    // 【修复】确保是数字，取整秒数
                    if (currentSec !== null) currentSec = Math.floor(currentSec);
                    if (totalSec !== null) totalSec = Math.floor(totalSec);
                    
                    // 如果没有直接提供，再尝试从 song 中计算
                    if (currentSec === null || totalSec === null) {
                        const currentSong = song || this.currentSong;
                        if (currentSong && currentSong.duration) {
                            // 安全检查：确保 duration 是合理的毫秒数（不超过1小时）
                            let durationMs = currentSong.duration;
                            if (durationMs > 3600000) {
                                // 如果超过1小时，说明可能是秒为单位的，或者有问题
                                if (durationMs < 10000) {
                                    // 可能是以秒为单位的，乘以1000转成毫秒
                                    durationMs = durationMs * 1000;
                                } else {
                                    // 太大了，用默认的4分钟
                                    durationMs = 240000;
                                }
                            }
                            
                            totalSec = Math.floor(durationMs / 1000);
                            currentSec = Math.floor((progress / 100) * totalSec);
                        }
                    }
                    
                    if (currentSec !== null && totalSec !== null && totalSec > 0) {
                        const currentMins = Math.floor(currentSec / 60);
                        const currentSecs = currentSec % 60;
                        const durationMins = Math.floor(totalSec / 60);
                        const durationSecs = totalSec % 60;
                        
                        timeEl.textContent = `${currentMins}:${currentSecs.toString().padStart(2, '0')} / ${durationMins}:${durationSecs.toString().padStart(2, '0')}`;
                    }
                }
            },

        // Expose AppState to window for TTSService access
        window.AppState = AppState;

        // 页面卸载前停止所有播放，防止刷新后音乐冲突
        window.addEventListener('beforeunload', () => {
            console.log('[Audio] Page unloading, stopping all playback...');
            // 停止浏览器音频
            if (window.audioPlayer) {
                window.audioPlayer.pause();
                window.audioPlayer.currentTime = 0;
            }
            // 停止 TTS Service 的音频
            if (window.TTSService && window.TTSService.audioPlayer) {
                window.TTSService.audioPlayer.pause();
                window.TTSService.audioPlayer = null;
            }
            // 停止语音合成
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            // 通知服务器停止播放（同步请求确保在页面卸载前完成）
            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/stop', false); // 同步请求
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify({}));
                console.log('[Audio] Stop API called, status:', xhr.status);
            } catch (e) {
                console.warn('[Audio] Failed to call stop API:', e.message);
            }
        });
        
        // 也处理 visibilitychange，当页面隐藏时暂停播放
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('[Audio] Page hidden, pausing playback...');
                // 暂停前端音频
                if (window.audioPlayer) {
                    window.audioPlayer.pause();
                }
                if (window.TTSService && window.TTSService.audioPlayer) {
                    window.TTSService.audioPlayer.pause();
                }
                // 暂停语音合成
                if (window.speechSynthesis) {
                    window.speechSynthesis.pause();
                }
            } else {
                console.log('[Audio] Page visible, checking if TTS needs to be resumed...');
                // 如果 TTS 应该正在播放但被暂停了，尝试恢复
                if (window.TTSService && window.TTSService.isSpeaking) {
                    console.log('[Audio] TTS was speaking, attempting to resume...');
                    window.speechSynthesis.resume();
                }
                // 如果 Hermes 应该在说话，通知它
                if (RadioHost && RadioHost.hermesSpeaking && RadioHost.hermesPaused) {
                    console.log('[Audio] Hermes was paused, resuming...');
                    RadioHost.hermesPaused = false;
                    RadioHost.updateHermesPlayButton();
                    // 尝试恢复 TTS
                    if (RadioHost.currentWords && RadioHost.currentWordInterval) {
                        TTSService.resume(RadioHost.currentWords, RadioHost.currentWordInterval);
                    }
                }
            }
        });


        // Expose test functions for debugging
        window.testTTS = async function() {
            console.log('[Test] ========== TTS Test Start ==========');
            console.log('[Test] TTSService.apiBase:', TTSService.apiBase);
            console.log('[Test] TTSService.isSpeaking:', TTSService.isSpeaking);
            console.log('[Test] Audio unlocked:', audioUnlocked);

            const testText = '你好，这是TTS测试。';
            console.log('[Test] Calling TTSService.speak with:', testText);

            try {
                const result = await TTSService.speak(testText, {
                    onStart: () => console.log('[Test] ✅ TTS onStart callback fired'),
                    onEnd: () => console.log('[Test] ✅ TTS onEnd callback fired'),
                    onWord: (word, index) => console.log('[Test] TTS onWord:', word, index)
                });
                console.log('[Test] TTS speak returned:', result);
            } catch (error) {
                console.error('[Test] ❌ TTS speak failed:', error);
            }
            console.log('[Test] ========== TTS Test End ==========');
        };

        // 直接测试 Web Speech API（绕过 TTSService）
        window.testDirectWebSpeech = function() {
            console.log('[Test] ========== Direct Web Speech API Test ==========');
            console.log('[Test] speechSynthesis supported:', !!window.speechSynthesis);
            console.log('[Test] audioUnlocked:', audioUnlocked);

            if (!window.speechSynthesis) {
                console.error('[Test] Web Speech API not supported!');
                return;
            }

            const utterance = new SpeechSynthesisUtterance('你好，这是一个直接测试。');
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;

            const voices = window.speechSynthesis.getVoices();
            const chineseVoice = voices.find(v => v.lang.startsWith('zh'));
            if (chineseVoice) {
                utterance.voice = chineseVoice;
                console.log('[Test] Using voice:', chineseVoice.name);
            }

            utterance.onstart = () => console.log('[Test] ✅ DIRECT: utterance.onstart fired!');
            utterance.onend = () => console.log('[Test] ✅ DIRECT: utterance.onend fired');
            utterance.onerror = (e) => console.error('[Test] ❌ DIRECT: utterance.onerror:', e.error);

            console.log('[Test] Calling speechSynthesis.speak() directly...');
            console.log('[Test] speaking before:', window.speechSynthesis.speaking);
            console.log('[Test] pending before:', window.speechSynthesis.pending);

            window.speechSynthesis.speak(utterance);

            console.log('[Test] speaking after:', window.speechSynthesis.speaking);
            console.log('[Test] pending after:', window.speechSynthesis.pending);

            console.log('[Test] ========== Direct Test End ==========');
        };
        
        window.testDirectAudio = async function() {
            console.log('[Test] ========== Direct Audio Test ==========');
            try {
                const response = await fetch(`${TTSService.apiBase}/api/tts/doubao`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: '直接音频测试',
                        voice_type: 'Chinese (Mandarin)_Warm_Bestie',
                        speed: 0.9,
                        vol: 1.0
                    })
                });
                const data = await response.json();
                console.log('[Test] API response:', data.success ? 'success' : 'failed');
                
                if (data.success && data.data.audio) {
                    console.log('[Test] Creating audio element...');
                    const audio = new Audio(`data:audio/mp3;base64,${data.data.audio}`);
                    audio.volume = 0.5;
                    
                    audio.onplay = () => console.log('[Test] ✅ Direct audio playing');
                    audio.onended = () => console.log('[Test] ✅ Direct audio ended');
                    audio.onerror = (e) => console.error('[Test] ❌ Direct audio error:', e);
                    
                    console.log('[Test] Calling audio.play()...');
                    try {
                        await audio.play();
                        console.log('[Test] ✅ audio.play() succeeded');
                    } catch (playError) {
                        console.error('[Test] ❌ audio.play() failed:', playError.message);
                    }
                }
            } catch (error) {
                console.error('[Test] ❌ Direct audio test failed:', error);
            }
        };
        
        window.testRadioHost = function() {
            console.log('[Test] Testing RadioHost...');
            RadioHost.speakWithSync('你好，这是RadioHost测试。', {
                onStart: () => console.log('[Test] RadioHost onStart'),
                onEnd: () => console.log('[Test] RadioHost onEnd')
            });
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // 【新增】记录页面开始加载时间
            window._hermudioPageLoadStart = Date.now();
            const ts = new Date(window._hermudioPageLoadStart);
            console.log(`⏱️ [${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}:${String(ts.getSeconds()).padStart(2,'0')}.${String(ts.getMilliseconds()).padStart(3,'0')}] Hermudio 页面加载开始！`);
            
            // 预先解锁音频，防止自动播放被阻止
            unlockAudio();
            AppState.init();
            initTTSSwitchButton();
        });

        // TTS Service Switch Button Initialization
        function initTTSSwitchButton() {
            // Find the radio-player-label (🎙️) element
            const labelElement = document.querySelector('.radio-player-label');
            if (!labelElement) {
                console.warn('[TTS Switch] Could not find radio-player-label element');
                return;
            }

            // Make 🎙️ label clickable for TTS switch
            labelElement.style.cursor = 'pointer';
            labelElement.title = '点击切换 TTS 服务';

            async function loadVoiceProviders() {
                try {
                    const response = await fetch('/api/tts/providers');
                    const data = await response.json();
                    return data.providers || [];
                } catch (error) {
                    console.error('[TTS] Failed to load providers:', error);
                    return [
                        { id: 'webSpeech', name: '浏览器语音', description: 'Web Speech API - 免费无限制' },
                        { id: 'hermes', name: 'Hermes 语音', description: 'Edge TTS - 高质量音色' },
                        { id: 'minimax', name: '云端语音', description: 'MiniMax API - 高质量音色' }
                    ];
                }
            }

            async function createTtsMenu() {
                const providers = await loadVoiceProviders();
                const icons = {
                    'browser': '🌐',
                    'webSpeech': '🌐',
                    'hermes': '🎵',
                    'cloud': '☁️',
                    'minimax': '☁️'
                };

                let menuHtml = '<h4>选择语音服务</h4>';
                providers.forEach(provider => {
                    const icon = icons[provider.id] || '🔊';
                    const isActive = TTSService.ttsService === provider.id || 
                                    (provider.id === 'browser' && TTSService.ttsService === 'webSpeech') ||
                                    (provider.id === 'cloud' && TTSService.ttsService === 'minimax');
                    menuHtml += `
                        <div class="tts-option ${isActive ? 'active' : ''}" data-service="${provider.id}">
                            <div class="tts-option-icon">${icon}</div>
                            <div class="tts-option-info">
                                <div class="tts-option-name">${provider.name}</div>
                                <div class="tts-option-desc">${provider.description}</div>
                            </div>
                        </div>
                    `;
                });
                menuHtml += `
                    <div class="tts-current-voice" id="ttsCurrentVoice">
                        当前: ${TTSService.webSpeechVoice ? TTSService.webSpeechVoice.name : '系统默认'}
                    </div>
                `;

                const menu = document.createElement('div');
                menu.className = 'tts-switch-menu tts-inline-menu';
                menu.id = 'ttsSwitchMenu';
                menu.innerHTML = menuHtml;
                document.body.appendChild(menu);

                labelElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rect = labelElement.getBoundingClientRect();
                    menu.style.bottom = (window.innerHeight - rect.top + 10) + 'px';
                    menu.style.left = rect.left + 'px';
                    menu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (!menu.contains(e.target) && e.target !== labelElement) {
                        menu.classList.remove('show');
                    }
                });

                menu.addEventListener('click', (e) => {
                    const option = e.target.closest('.tts-option');
                    if (option) {
                        const service = option.dataset.service;
                        TTSService.setTtsService(service);
                        menu.classList.remove('show');
                        updateTtsIndicator();
                        
                        // 更新菜单选项的选中状态
                        menu.querySelectorAll('.tts-option').forEach(opt => {
                            const optService = opt.dataset.service;
                            const isActive = TTSService.ttsService === optService || 
                                            (optService === 'browser' && TTSService.ttsService === 'webSpeech') ||
                                            (optService === 'cloud' && TTSService.ttsService === 'minimax');
                            opt.classList.toggle('active', isActive);
                        });
                    }
                });
            }

            createTtsMenu();

            // Update initial state
            if (TTSService.ttsService === 'minimax') {
                labelElement.style.filter = 'hue-rotate(240deg)';
            }
            
            // 更新 TTS 指示器
            function updateTtsIndicator() {
                // 更新标签样式
                if (TTSService.ttsService === 'minimax') {
                    labelElement.style.filter = 'hue-rotate(240deg)';
                } else if (TTSService.ttsService === 'hermes') {
                    labelElement.style.filter = 'hue-rotate(120deg)';
                } else {
                    labelElement.style.filter = 'none';
                }
                // 更新当前语音显示
                updateCurrentVoiceDisplay();
            }
        }

        function switchTTSService(service) {
            if (TTSService.ttsService === service) return;

            TTSService.ttsService = service;
            console.log(`[TTS] Switched to ${service === 'webSpeech' ? 'Web Speech API' : 'MiniMax API'}`);

            // Show notification
            showTTSNotification(service);
        }

        function showTTSNotification(service) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--bg-card);
                color: var(--text-primary);
                padding: 12px 24px;
                border-radius: 24px;
                font-size: 14px;
                z-index: 10000;
                border: 1px solid var(--accent);
                box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
                animation: slideDown 0.3s ease;
            `;
            notification.textContent = service === 'webSpeech'
                ? '已切换到浏览器语音 (Web Speech API)'
                : '已切换到云端语音 (MiniMax API)';
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        function updateCurrentVoiceDisplay() {
            const display = document.getElementById('ttsCurrentVoice');
            if (display) {
                if (TTSService.ttsService === 'webSpeech') {
                    const voiceName = TTSService.webSpeechVoice ? TTSService.webSpeechVoice.name : '系统默认';
                    display.textContent = `当前: ${voiceName}`;
                } else if (TTSService.ttsService === 'hermes') {
                    display.textContent = `当前: Hermes 语音 (Edge TTS)`;
                } else if (TTSService.ttsService === 'minimax') {
                    display.textContent = `当前: MiniMax ${TTSService.currentVoice}`;
                } else {
                    display.textContent = `当前: ${TTSService.ttsService}`;
                }
            }
        }

        // 调试函数：列出所有可用语音
        function listAvailableVoices() {
            if (!window.speechSynthesis) {
                console.error('[TTS Debug] Web Speech API not supported');
                return [];
            }

            const voices = window.speechSynthesis.getVoices();
            console.log('[TTS Debug] ========== Available Voices ==========');
            console.log(`Total voices: ${voices.length}`);

            const chineseVoices = voices.filter(v => v.lang && v.lang.startsWith('zh'));
            console.log(`Chinese voices: ${chineseVoices.length}`);

            if (voices.length === 0) {
                console.warn('[TTS Debug] No voices available - this is common in embedded browsers like Trae');
                console.log('[TTS Debug] Possible reasons:');
                console.log('  1. Browser does not support Web Speech API');
                console.log('  2. No speech synthesis engine installed');
                console.log('  3. Running in a restricted environment');
            } else {
                voices.forEach((voice, index) => {
                    const isChinese = voice.lang.startsWith('zh');
                    const marker = isChinese ? ' 🇨🇳' : '';
                    console.log(`  ${index + 1}. ${voice.name} (${voice.lang})${marker}`);
                });
            }
            console.log('[TTS Debug] ======================================');

            return voices;
        }

        // 导出调试函数到全局
        window.listVoices = listAvailableVoices;
        window.debugTTS = function() {
            console.log('[TTS Debug] ========== TTS Status ==========');
            console.log('Service:', TTSService.ttsService);
            console.log('Current Voice:', TTSService.webSpeechVoice ? TTSService.webSpeechVoice.name : 'null');
            console.log('Rate:', TTSService.webSpeechRate);
            console.log('Pitch:', TTSService.webSpeechPitch);
            console.log('Volume:', TTSService.webSpeechVolume);
            console.log('Is Speaking:', TTSService.isSpeaking);
            console.log('[TTS Debug] =================================');
            listAvailableVoices();
        };

        // Add animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
