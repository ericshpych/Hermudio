            async switchMode(mode) {
                const previousMode = this.currentMode;
                this.currentMode = mode;

                // Update buttons
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                // Sync bottom control buttons - both bottom-control-btn and sleep-preset classes
                document.querySelectorAll('.bottom-control-btn, .sleep-preset').forEach(btn => {
                    const btnMode = btn.dataset.mode;
                    if (btnMode) {
                        btn.classList.toggle('active', btnMode === mode);
                    }
                });

                // Update mode display
                const radioMode = document.getElementById('radioMode');
                if (radioMode) {
                    radioMode.classList.toggle('active', mode === 'radio');
                }
                const chatMode = document.getElementById('chatMode');
                if (chatMode) {
                    chatMode.classList.toggle('active', mode === 'chat');
                }

                // Handle mode switch: pause radio when switching to chat, resume when switching back
                if (mode === 'chat') {
                    // Switching to chat mode
                    if (previousMode === 'radio') {
                        // From radio to chat: pause radio playback
                        console.log('[ModeSwitch] Switching from radio to chat, pausing radio playback...');
                        await this.pauseRadioForChat();
                    }

                    // 切换到聊天模式时，如果聊天框为空且未发送过欢迎语，Hermes 主动发起欢迎
                    const chatContainer = document.getElementById('chatContainer');
                    const messages = chatContainer.querySelectorAll('.chat-message');
                    if (messages.length === 0 && !this.chatWelcomeSent) {
                        console.log('[ModeSwitch] Chat is empty, sending welcome...');
                        this.sendChatWelcome();
                    } else {
                        console.log('[ModeSwitch] Chat welcome already sent or messages exist, skipping...');
                    }
                } else if (mode === 'radio' && previousMode === 'chat') {
                    // Switching from chat to radio: resume radio playback
                    console.log('[ModeSwitch] Switching from chat to radio, resuming radio playback...');
                    this.resumeRadioFromChat();
                }
            },

            // Pause radio playback when switching to chat mode
            async pauseRadioForChat() {
                console.log('[ModeSwitch] Pausing radio for chat mode...');
                
                // Save current radio state
                this.radioStateBeforeChat = {
                    isPlaying: this.isPlaying,
                    radioState: this.radioState,
                    currentSongIndex: this.currentSongIndex
                };
                
                // Stop music playback
                if (this.isPlaying) {
                    try {
                        await API.stop();
                        console.log('[ModeSwitch] Music playback stopped');
                    } catch (e) {
                        console.warn('[ModeSwitch] Failed to stop music:', e.message);
                    }
                    this.setPlaying(false);
                }
                
                // Stop status polling
                this.stopStatusPolling();
                
                // Pause Hermes TTS when switching to chat mode (can resume when switching back)
                if (TTSService.isSpeaking) {
                    TTSService.pause();
                    this.hermesPaused = true;
                    this.updateHermesPlayButton();
                    console.log('[ModeSwitch] Hermes TTS paused');
                }
                
                // Set radio state to idle (paused)
                this.radioState = 'idle';
                console.log('[ModeSwitch] Radio state set to idle');
                
                console.log('[ModeSwitch] Radio paused for chat mode');
            },

            // Resume radio playback when switching back to radio mode
            async resumeRadioFromChat() {
                console.log('[ModeSwitch] Resuming radio from chat mode...');

                // 1. 首先暂停聊天模式的歌曲播放
                if (this.isPlaying) {
                    console.log('[ModeSwitch] Pausing chat mode music playback...');
                    await API.stop();
                    this.setPlaying(false);
                }

                // 2. 恢复 Hermes TTS 播报（如果有）
                if (this.hermesPaused) {
                    console.log('[ModeSwitch] Resuming Hermes TTS...');
                    TTSService.resume(RadioHost.currentWords, RadioHost.currentWordInterval);
                    this.hermesPaused = false;
                    this.updateHermesPlayButton();
                    // TTS 会在播报完成后自动触发电台音乐播放，不需要额外处理
                } else {
                    // 3. 如果没有 TTS 需要恢复，根据电台状态决定下一步
                    const savedState = this.radioStateBeforeChat;
                    if (!savedState) {
                        console.log('[ModeSwitch] No saved radio state, starting fresh...');
                        if (this.radioState === 'idle') {
                            await this.startRadioShow();
                        }
                    } else if (this.radioState === 'idle') {
                        // 电台处于空闲状态，启动新的电台节目
                        console.log('[ModeSwitch] Radio was idle, starting fresh...');
                        await this.startRadioShow();
                    }
                    // 如果电台正在播放中（有 TTS 或音乐），让现有的逻辑继续执行
                }

                // Clear saved state
                this.radioStateBeforeChat = null;
            },

            // 聊天模式欢迎语 - 只显示文字，不播放语音，自动推荐歌曲
            async sendChatWelcome(retryCount = 0) {
                // 防止重复发送
                if (this.chatWelcomeSent) {
                    console.log('[Chat] Welcome already sent, skipping...');
                    return;
                }
                this.chatWelcomeSent = true;

                const maxRetries = 3;
                const retryDelay = 2000;
                let welcomeText = null;

                // 尝试获取欢迎语（带重试）
                for (let i = 0; i <= maxRetries; i++) {
                    try {
                        console.log(`[Chat] Fetching welcome message from Hermes... attempt: ${i + 1}`);
                        const response = await API.get('/api/chat/welcome');

                        if (response.success && response.message) {
                            welcomeText = response.message;
                            console.log('[Chat] Welcome message from Hermes:', welcomeText);
                            break;
                        }
                    } catch (error) {
                        console.error(`[Chat] Failed to fetch welcome message (attempt ${i + 1}):`, error.message);
                        if (i < maxRetries) {
                            console.log(`[Chat] Retrying in ${retryDelay}ms...`);
                            await this.sleep(retryDelay);
                        }
                    }
                }

                // 如果所有重试都失败，使用兜底文案
                if (!welcomeText) {
                    const hour = new Date().getHours();
                    let greeting = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';
                    welcomeText = `${greeting}！我是 Hermes，你的音乐助手。告诉我你现在的心情或者想听什么类型的音乐，我来为你推荐。`;
                    console.log('[Chat] Using fallback welcome message');
                }

                // 添加 Hermes 欢迎消息（仅文字，不播放语音）
                this.addChatMessage(welcomeText, false);
                console.log('[Chat] Welcome message displayed (text only)');

                // 自动推荐一首歌并播放
                console.log('[Chat] Auto-recommending first song...');
                setTimeout(() => this.autoRecommendAndPlay(), 1000);
            },

            // 聊天模式自动推荐并播放歌曲
            async autoRecommendAndPlay() {
                const maxRetries = 3;
                const retryDelay = 2000;

                // 尝试获取推荐（带重试）
                for (let i = 0; i <= maxRetries; i++) {
                    try {
                        console.log(`[Chat] Fetching song recommendation... attempt: ${i + 1}`);
                        // 传入被屏蔽的歌曲列表，避免推荐这些歌曲
                        const blockedSongs = Array.from(this.blockedSongs);
                        console.log('[Chat] Sending blocked songs:', blockedSongs.length);
                        const response = await API.chat('推荐一首歌', blockedSongs);

                        if (response.success) {
                            if (response.action === 'recommend' && response.recommendedSongs && response.recommendedSongs.length > 0) {
                                // 显示推荐卡片（包含自动倒计时播放逻辑）
                                this.addRecommendationMessage(response.message, response.recommendedSongs, response.autoPlayTimeout || 30000);
                                return; // 成功，退出

                            } else if (response.action === 'play' && response.song) {
                                // 直接播放
                                this.updateCurrentSong(response.song);
                                this.setPlaying(true);
                                this.addChatMessage(response.message, false);
                                return; // 成功，退出

                            } else {
                                // 普通聊天消息
                                this.addChatMessage(response.message, false);
                                return; // 成功，退出
                            }
                        } else {
                            console.error('[Chat] Recommendation failed:', response.error);
                            if (i < maxRetries) {
                                console.log(`[Chat] Retrying in ${retryDelay}ms...`);
                                await this.sleep(retryDelay);
                            }
                        }
                    } catch (error) {
                        console.error(`[Chat] Auto-recommend error (attempt ${i + 1}):`, error);
                        if (i < maxRetries) {
                            console.log(`[Chat] Retrying in ${retryDelay}ms...`);
                            await this.sleep(retryDelay);
                        }
                    }
                }

                // 所有重试都失败
                this.addChatMessage('抱歉，获取推荐时出错了。请直接告诉我你想听什么歌。', false);
            },

                try {

                    console.log('[Queue] Status response:', response);
                    
                    if (response.success && response.status) {
                        // 合并已播放和待播放歌曲用于显示
                        const allSongs = [
                            ...response.status.played,
                            ...(response.status.current ? [response.status.current] : []),
                            ...response.status.queued
                        ];
                        
                        // 更新本地播放列表
                        this.playlist = allSongs;

                        if (response.status.current) {
                            const currentIndex = allSongs.findIndex(s => s.id === response.status.current.id);
                            if (currentIndex !== -1) {
                                this.currentSongIndex = currentIndex;
                            }
                        }
                        
                        this.renderQueue(allSongs, response.status.current);
                    }
                } catch (error) {
                    console.error('[Queue] Failed to load queue:', error);

                    return `

            // 预加载第一首歌的音频（并行处理，节省时间）
            startFirstSongPreload() {

                if (cached && (Date.now() - cached.timestamp) < this.songUrlCacheMaxAge) {
                    return cached.url;
                }
                return null;

            cacheSongUrl(songId, url) {

                });

            toggleHermesSpeech() {
                console.log('[Hermes] Toggle speech, current state:', { speaking: this.hermesSpeaking, paused: this.hermesPaused });

                if (!this.hermesSpeaking) {
                    // 如果当前没有在播放 Hermes 语音，重新开始电台流程
                    console.log('[Hermes] Starting radio show...');
                    this.startRadioShow();
                    this.hermesSpeaking = true;
                    this.hermesPaused = false;
                    this.updateHermesPlayButton();
                } else if (this.hermesPaused) {
                    // 恢复播放
                    console.log('[Hermes] Resuming speech...');
                    if (this.hermesAudio) {
                        this.hermesAudio.play().catch(e => console.warn('[Hermes] Audio resume failed:', e.message));
                    }
                    // 传递保存的 words 和 wordInterval（添加 null 检查）
                    if (RadioHost.currentWords && RadioHost.currentWordInterval) {
                        TTSService.resume(RadioHost.currentWords, RadioHost.currentWordInterval);
                    } else {
                        console.warn('[Hermes] Cannot resume: missing currentWords or currentWordInterval');
                    }
                    this.hermesPaused = false;
                    this.updateHermesPlayButton();
                } else {
                    // 暂停播放
                    console.log('[Hermes] Pausing speech...');
                    if (this.hermesAudio) {
                        this.hermesAudio.pause();
                    }
                    TTSService.pause();
                    this.hermesPaused = true;
                    this.updateHermesPlayButton();
                }

            updateHermesPlayButton() {
                const playBtn = document.getElementById('hermesPlayBtn');
                if (!playBtn) return;
                
                const iconPlay = document.getElementById('hermesIconPlay');
                const iconPause = document.getElementById('hermesIconPause');
                if (!iconPlay || !iconPause) return;
                
                if (this.hermesSpeaking && !this.hermesPaused) {
                    // 正在播放，显示暂停图标
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                } else {
                    // 暂停或未播放，显示播放图标
                    iconPlay.style.display = 'block';
                    iconPause.style.display = 'none';
                }
            },

            // 更新 Hermes 语音进度条
            updateHermesProgress(currentTime, duration) {
                if (!duration) return;

                const progress = Math.min(currentTime / duration, 1); // 确保不超过 1
                const bars = document.querySelectorAll('#hermesScrubber .player-bar');
                const activeCount = Math.ceil(progress * bars.length); // 使用 ceil 确保进度接近 100% 时显示完整

                bars.forEach((bar, index) => {
                    if (index < activeCount) {
                        bar.classList.add('played');
                    } else {
                        bar.classList.remove('played');
                    }
                });

                // 更新时间显示
                const timeEl = document.getElementById('hermesPlayerTime');
                if (timeEl) {
                    const mins = Math.floor(currentTime / 60);
                    const secs = Math.floor(currentTime % 60);
                    timeEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                }
            },

            // 重置 Hermes 进度条为 0%
            resetHermesProgress() {
                const bars = document.querySelectorAll('#hermesScrubber .player-bar');
                bars.forEach(bar => bar.classList.remove('played'));
                const timeEl = document.getElementById('hermesPlayerTime');
                if (timeEl) {
                    timeEl.textContent = '0:00';
                }
            },

            // 设置 Hermes 进度条为 100%
            setHermesProgressFull() {
                const bars = document.querySelectorAll('#hermesScrubber .player-bar');
                bars.forEach(bar => bar.classList.add('played'));
            },

            // 【新增】TTS期间后台准备第一首歌
            prepareFirstSongDuringTts() {
                console.log('[RadioFlow] prepareFirstSongDuringTts called');
                
                if (!this.playlist || this.playlist.length === 0) {
                    console.warn('[RadioFlow] No playlist to prepare');
                    this._firstSongPrepared = false;
                    return;
                }
                
                const firstSong = this.playlist[0];
                console.log('[RadioFlow] Preparing first song during TTS:', firstSong?.name);
                
                // 重置准备状态
                this._firstSongPrepared = false;
                this._firstSongPreparePromise = null;
                
                // 后台准备：获取歌曲详细信息（不包括播放，因为ncm-cli不支持预加载URL）
                this._firstSongPreparePromise = (async () => {
                    try {
                        console.time('[RadioFlow] First song background prepare');
                        
                        // 获取歌曲详细信息（封面、歌词等）
                        const detailsResponse = await API.get(`/api/song-details?songId=${firstSong.id}`);
                        if (detailsResponse.success) {
                            // 更新歌曲信息
                            Object.assign(firstSong, detailsResponse.details);
                            console.log('[RadioFlow] First song details prepared:', firstSong.name);
                        }
                        
                        console.timeEnd('[RadioFlow] First song background prepare');
                        this._firstSongPrepared = true;
                        return { success: true, song: firstSong };
                    } catch (error) {
                        console.warn('[RadioFlow] Background prepare failed:', error);
                        console.timeEnd('[RadioFlow] First song background prepare');
                        this._firstSongPrepared = true; // 即使失败也标记为准备完成
                        return { success: false, song: firstSong };
                    }
                })();
            },

                console.log('[RadioFlow] playPreparedFirstSong called');
                console.log('[RadioFlow] Current state - _isPlayingSong:', this._isPlayingSong, 'currentPlayingSongId:', this.currentPlayingSongId);

                if (!this.playlist || this.playlist.length === 0) {
                    console.error('[RadioFlow] No playlist available');
                    this.playRecommendedSong();
                    return;
                }

                const firstSong = this.playlist[0];
                this.currentSongIndex = 0;

                console.log('[RadioFlow] Playing prepared first song:', firstSong?.name, 'id:', firstSong?.id);

                // 更新队列显示
                if (this.queueExpanded) {
                    this.renderQueue(this.playlist);
                }

                // 等待后台准备完成（如果还在进行中）
                if (this._firstSongPreparePromise && !this._firstSongPrepared) {
                    console.log('[RadioFlow] Waiting for background prepare...');
                    try {
                        await this._firstSongPreparePromise;
                    } catch (error) {
                        console.warn('[RadioFlow] Error waiting for prepare:', error);

            async continueRadioShow(retryCount = 0) {
                console.log('[RadioFlow] continueRadioShow called, retryCount:', retryCount);
                console.time('[RadioFlow] Playlist generation');
                
                const maxRetries = 3;
                const retryDelay = 2000;
                
                // 【优化】并行获取歌单和预加载第一首歌的intro
                try {
                    console.log('[RadioFlow] Fetching playlist from API...');
                    const response = await API.get('/api/radio/playlist');
                    console.log('[RadioFlow] Playlist API response:', response.success ? 'success' : 'failed');
                    
                    if (response.success && response.songs && response.songs.length > 0) {
                        this.playlist = response.songs;
                        this.currentSongIndex = 0;
                        console.log('[RadioFlow] Playlist received, songs count:', this.playlist.length);
                        console.log('[RadioFlow] First song:', this.playlist[0]?.name, '-', this.playlist[0]?.artist);
                        console.timeEnd('[RadioFlow] Playlist generation');
                        
                        // Update queue display if expanded
                        if (this.queueExpanded) {
                            this.renderQueue(this.playlist);
                        }
                        
                        // 【优化】并行获取歌单intro和第一首歌的intro
                        const firstSong = this.playlist[0];
                        console.time('[RadioFlow] Parallel intro generation');
                        console.log('[RadioFlow] Fetching playlist intro and first song intro in parallel...');
                        
                        const [playlistIntroResponse, songIntroResponse] = await Promise.all([
                            API.post('/api/radio/playlist-intro', { songs: this.playlist.slice(0, 5) }),
                            firstSong ? API.post('/api/radio/song-intro', { song: firstSong }) : Promise.resolve({ success: false })
                        ]);
                        
                        console.log('[RadioFlow] Parallel intro responses:', {
                            playlistIntro: playlistIntroResponse.success ? 'success' : 'failed',
                            songIntro: songIntroResponse.success ? 'success' : 'failed'
                        });
                        console.timeEnd('[RadioFlow] Parallel intro generation');
                        
                        // 缓存第一首歌的intro
                        this._cachedFirstSongIntro = songIntroResponse.success ? songIntroResponse.script : null;
                        
                        if (playlistIntroResponse.success && playlistIntroResponse.script) {
                            console.log('[RadioFlow] Playlist intro received, length:', playlistIntroResponse.script.length);
                            RadioHost.speakWithSync(playlistIntroResponse.script, {
                                onStart: () => console.log('[RadioFlow] Playlist intro TTS started'),
                                onEnd: () => {
                                    console.log('[RadioFlow] Playlist intro TTS ended');
                                    // 【优化】使用预加载的歌曲intro直接播放
                                    this.playCurrentSongWithCachedIntro();
                                }
                            });
                        } else {
                            console.warn('[RadioFlow] Playlist intro API returned no script');
                            this.playCurrentSongWithCachedIntro();
                        }
                    } else {
                        console.warn('[RadioFlow] Playlist API returned no songs, using fallback');
                        console.timeEnd('[RadioFlow] Playlist generation');
                        // Fallback: just play recommended song
                        this.playRecommendedSong();
                    }
                } catch (error) {
                    console.error('[RadioFlow] Playlist error:', error);
                    console.timeEnd('[RadioFlow] Playlist generation');
                    
                    // 自动重试机制
                    if (retryCount < maxRetries) {
                        console.log(`[RadioFlow] Retrying continueRadioShow in ${retryDelay}ms... (${retryCount + 1}/${maxRetries})`);
                        await this.sleep(retryDelay);
                        return this.continueRadioShow(retryCount + 1);
                    }
                    
                    console.warn('[RadioFlow] Max retries reached, using fallback');
                    this.playRecommendedSong();
                }
            },

            // 【新增】使用预加载的intro播放第一首歌
            async playCurrentSongWithCachedIntro() {
                const song = this.playlist[this.currentSongIndex];
                console.log('[RadioFlow] playCurrentSongWithCachedIntro called, song:', song?.name);
                
                if (!song) {
                    console.error('[RadioFlow] No song found at index:', this.currentSongIndex);
                    return;
                }
                
                // 使用预加载的intro
                const cachedIntro = this._cachedFirstSongIntro;
                this._cachedFirstSongIntro = null; // 清除缓存
                
                if (cachedIntro) {
                    console.log('[RadioFlow] Using cached song intro, length:', cachedIntro.length);
                    this.radioState = 'intro';
                    
                    // 根据文案长度计算超时时间
                    const estimatedDuration = cachedIntro.length * 250 + 10000;
                    const timeoutDuration = Math.max(estimatedDuration, 30000);
                    
                    let introTtsCompleted = false;
                    const introTtsTimeout = setTimeout(() => {
                        if (!introTtsCompleted) {
                            console.warn('[RadioFlow] Intro TTS timeout, forcing play song');
                            introTtsCompleted = true;
                            this.actuallyPlaySong(song);
                        }
                    }, timeoutDuration);
                    
                    RadioHost.speakWithSync(cachedIntro, {
                        onStart: () => console.log('[RadioFlow] Cached intro TTS started'),
                        onEnd: () => {
                            if (introTtsCompleted) return;
                            introTtsCompleted = true;
                            clearTimeout(introTtsTimeout);
                            console.log('[RadioFlow] Cached intro TTS ended');
                            this.actuallyPlaySong(song);
                        }
                    });
                } else {
                    console.log('[RadioFlow] No cached intro, playing without intro');
                    this.actuallyPlaySong(song);
                }
            },

            async playCurrentSongWithIntro(retryCount = 0) {
                const song = this.playlist[this.currentSongIndex];
                console.log('[RadioFlow] playCurrentSongWithIntro called, songIndex:', this.currentSongIndex, 'retryCount:', retryCount);
                console.log('[RadioFlow] Song to play:', song?.name, 'id:', song?.id);
                
                if (!song) {
                    console.error('[RadioFlow] No song found at index:', this.currentSongIndex);
                    return;
                }
                
                console.log('[RadioFlow] Playlist length:', this.playlist.length, 'current index:', this.currentSongIndex);
                
                const maxRetries = 2;
                const retryDelay = 1500;
                
                console.log('[RadioFlow] Current song:', song.name, '-', song.artist);
                this.radioState = 'intro';
                console.log('[RadioFlow] State changed to: intro');
                console.time('[RadioFlow] Song intro generation');
                
                // Generate song intro
                try {
                    console.log('[RadioFlow] Fetching song intro from API...');
                    const response = await API.post('/api/radio/song-intro', { song });
                    console.log('[RadioFlow] Song intro API response:', response.success ? 'success' : 'failed');
                    
                    if (response.success && response.script) {
                        console.log('[RadioFlow] Song intro received, length:', response.script.length);

                        // 根据文案长度计算超时时间（中文约 250ms/字，加上 10 秒缓冲）
                        const estimatedDuration = response.script.length * 250 + 10000;
                        const timeoutDuration = Math.max(estimatedDuration, 30000); // 至少30秒
                        console.log('[RadioFlow] Estimated TTS duration:', estimatedDuration, 'ms, timeout:', timeoutDuration, 'ms');

                        // 确保 TTS 的 onEnd 总是被调用
                        let introTtsCompleted = false;
                        const introTtsTimeout = setTimeout(() => {
                            if (!introTtsCompleted) {
                                console.warn('[RadioFlow] Intro TTS onEnd timeout, forcing play song');
                                introTtsCompleted = true;
                                console.timeEnd('[RadioFlow] Song intro generation');
                                this.actuallyPlaySong(song);
                            }
                        }, timeoutDuration);

                        RadioHost.speakWithSync(response.script, {
                            onStart: () => console.log('[RadioFlow] Song intro TTS started'),
                            onEnd: () => {
                                if (introTtsCompleted) return; // 已经通过超时调用了
                                introTtsCompleted = true;
                                clearTimeout(introTtsTimeout);
                                console.log('[RadioFlow] Song intro TTS ended');
                                console.timeEnd('[RadioFlow] Song intro generation');
                                // After intro, play the song
                                this.actuallyPlaySong(song);
                            }
                        });
                    } else {
                        console.warn('[RadioFlow] Song intro API returned no script');
                        this.actuallyPlaySong(song);
                    }
                } catch (error) {
                    console.error('[RadioFlow] Song intro error:', error);
                    console.timeEnd('[RadioFlow] Song intro generation');
                    
                    // 自动重试机制
                    if (retryCount < maxRetries) {
                        console.log(`[RadioFlow] Retrying playCurrentSongWithIntro in ${retryDelay}ms... (${retryCount + 1}/${maxRetries})`);
                        await this.sleep(retryDelay);
                        return this.playCurrentSongWithIntro(retryCount + 1);
                    }
                    
                    console.warn('[RadioFlow] Max retries reached, playing song without intro');
                    this.actuallyPlaySong(song);
                }
            },

            async actuallyPlaySong(song) {
                this.logWithTime(`🎶 actuallyPlaySong 开始播放：${song.name}`);
                console.log('[RadioFlow] ===== TIMING: actuallyPlaySong called for:', song.name, 'id:', song.id, '=====');
                console.time('[RadioFlow] actuallyPlaySong total');
                console.log('[RadioFlow] actuallyPlaySong called for:', song.name, 'id:', song.id);
                console.log('[RadioFlow] currentPlayingSongId:', this.currentPlayingSongId, 'new song id:', song.id, 'isPlayingSong:', this._isPlayingSong);
                
                // 【关键修复1】清理 monitor 相关的状态（防止旧的定时器还在运行）
                if (this._monitorSongInterval) {
                    console.log('[RadioFlow] Clearing monitor interval in actuallyPlaySong');
                    clearInterval(this._monitorSongInterval);
                    this._monitorSongInterval = null;
                }
                this._monitorSongActive = false;
                
                // 【关键修复2】播放锁检查 - 防止并发播放
                if (this._isPlayingSong) {
                    console.warn('[RadioFlow] Another song is currently being played, skipping:', song.name);
                    return;
                }
                
                // 设置播放锁（带超时保护，防止死锁）
                this._isPlayingSong = true;
                if (this._playLockTimeout) {
                    clearTimeout(this._playLockTimeout);
                }
                this._playLockTimeout = setTimeout(() => {
                    console.warn('[RadioFlow] Play lock timeout, releasing lock');
                    this._isPlayingSong = false;
                }, 30000); // 30秒超时保护
                
                // 检查歌曲是否被屏蔽
                if (this.isSongBlocked(song.id)) {
                    console.log('[RadioFlow] Song is blocked, skipping:', song.name, 'id:', song.id);
                    this.addChatMessage(`🚫 已跳过屏蔽歌曲「${song.name}」`, false);
                    // 释放锁
                    this._isPlayingSong = false;
                    if (this._playLockTimeout) {
                        clearTimeout(this._playLockTimeout);
                        this._playLockTimeout = null;
                    }
                    // 自动跳到下一首
                    this.skipToNextSongAfterFailure();
                    return;
                }
                
                // 防止重复调用 - 但如果已经停止了（isPlaying为false），即使是同一首歌也重新播放
                if (this.currentPlayingSongId === song.id && this.isPlaying) {
                    console.log('[RadioFlow] Song already playing, skipping:', song.name);
                    // 释放锁
                    this._isPlayingSong = false;
                    if (this._playLockTimeout) {
                        clearTimeout(this._playLockTimeout);
                        this._playLockTimeout = null;
                    }
                    return;
                }
                this.currentPlayingSongId = song.id;
                console.log('[RadioFlow] currentPlayingSongId set to:', this.currentPlayingSongId);

                this.radioState = 'playing';
                console.log('[RadioFlow] State changed to: playing');
                this.updateCurrentSong(song);

                // Mark song as played to avoid repeats
                if (song.id) {
                    API.post('/api/radio/mark-played', { songId: song.id }).catch(e => {
                        console.warn('[RadioFlow] Failed to mark song as played:', e.message);
                    });
                }

                try {
                    // 检查是否有预加载的结果可以复用（带超时）
                    let response;
                    const isFirstSong = song.id === this.playlist?.[0]?.id;

                    if (this.firstSongPreloadPromise && isFirstSong) {
                        const preloadElapsed = Date.now() - (this.firstSongPreloadStartTime || 0);
                        const remainingWait = this.firstSongPreloadMaxWait - preloadElapsed;

                        if (remainingWait > 0) {
                            // 等待预加载结果，但有超时
                            console.log('[RadioFlow] Waiting for preload (elapsed:', preloadElapsed, 'ms, max:', this.firstSongPreloadMaxWait, 'ms)...');
                            try {
                                response = await Promise.race([
                                    this.firstSongPreloadPromise,
                                    new Promise((_, reject) => setTimeout(() => reject(new Error('preload_timeout')), remainingWait))
                                ]);
                                console.log('[RadioFlow] Preload ready, using cached result');
                            } catch (preloadError) {
                                console.warn('[RadioFlow] Preload timeout or error, falling back to direct API:', preloadError.message);
                                // 预加载超时，直接调用 API
                                console.time('[RadioFlow] Song playback start');
                                response = await API.play(song.id, song.encryptedId);
                                console.timeEnd('[RadioFlow] Song playback start');
                            }
                        } else {
                            // 已经超过最大等待时间，直接调用 API
                            console.log('[RadioFlow] Preload wait exceeded, calling API directly');
                            console.time('[RadioFlow] Song playback start');
                            response = await API.play(song.id, song.encryptedId);
                            console.timeEnd('[RadioFlow] Song playback start');
                        }
                        this.firstSongPreloadPromise = null; // 清除预加载
                    } else {
                        console.log('[RadioFlow] Calling API.play with songId:', song.id, 'encryptedId:', song.encryptedId);
                        console.time('[RadioFlow] Song playback start');
                        console.log('[RadioFlow] ===== TIMING: API.play started =====');
                        response = await API.play(song.id, song.encryptedId);
                        console.log('[RadioFlow] ===== TIMING: API.play finished =====');
                        console.timeEnd('[RadioFlow] Song playback start');
                    }
                    console.log('[RadioFlow] Play API response:', response.success ? 'success' : 'failed', response);

                    if (response.success) {
                        // 【新增】记录从页面刷新到第一首歌播放的总耗时
                        if (this._pageLoadStartTime && !this._firstSongPlayed) {
                            const totalTime = Date.now() - this._pageLoadStartTime;
                            console.log('🚀 ========================================');
                            console.log(`🚀 页面刷新到第一首歌播放总耗时: ${totalTime}ms (${(totalTime / 1000).toFixed(2)}秒)`);
                            console.log('🚀 ========================================');
                            this._firstSongPlayed = true;
                        }

                        // 缓存成功的歌曲URL（用于下次快速播放）
                        if (response.url) {
                            this.cacheSongUrl(song.id, response.url);
                        }
                        this.setPlaying(true);
                        this.consecutiveFailures = 0; // Reset failure counter
                        console.log('[RadioFlow] ===== TIMING: Song playback STARTED =====');
                        console.timeEnd('[RadioFlow] Song playback start');
                        console.timeEnd('[RadioFlow] actuallyPlaySong total');
                        console.timeEnd('[RadioFlow] Total time to start playing');
                        // Restart status polling if it was stopped
                        if (!this.statusPollInterval) {
                            this.startStatusPolling();
                        }
                        // Monitor song progress and play outro when done
                        this.monitorSongProgress();
                    } else if (response.loginRequired) {
                        console.error('[RadioFlow] Play API returned login required');
                        console.timeEnd('[RadioFlow] Song playback start');
                        // Show login required message
                        this.showLoginRequiredMessage();
                        this.setPlaying(false);
                        this.radioState = 'idle';
                    } else {
                        console.error('[RadioFlow] Play API returned failure:', response.error, response.message, response.details || '', response);
                        // If play fails, skip outro and go directly to next song intro
                        console.log('[RadioFlow] Song playback failed, skipping to next song...');
                        this.consecutiveFailures = (this.consecutiveFailures || 0) + 1;
                        
                        // If too many consecutive failures, stop trying and show error
                        if (this.consecutiveFailures >= 3) {
                            console.error('[RadioFlow] Too many consecutive failures, stopping playback');
                            this.addChatMessage('⚠️ 连续多首歌曲播放失败，请检查网络连接或尝试重新登录网易云音乐。', false);
                            this.setPlaying(false);
                            this.radioState = 'idle';
                            this.consecutiveFailures = 0;
                        } else {
                            this.skipToNextSongAfterFailure();
                        }
                    }
                } catch (error) {
                    console.error('[RadioFlow] Play error:', error);
                    console.timeEnd('[RadioFlow] Song playback start');
                    // If play throws error, skip outro and go directly to next song intro
                    console.log('[RadioFlow] Song playback error, skipping to next song...');
                    this.consecutiveFailures = (this.consecutiveFailures || 0) + 1;
                    
                    if (this.consecutiveFailures >= 3) {
                        console.error('[RadioFlow] Too many consecutive failures, stopping playback');
                        this.addChatMessage('⚠️ 连续多首歌曲播放失败，请检查网络连接或尝试重新登录网易云音乐。', false);
                        this.setPlaying(false);
                        this.radioState = 'idle';
                        this.consecutiveFailures = 0;
                    } else {
                        this.skipToNextSongAfterFailure();
                    }
                } finally {
                    // 【关键】无论成功失败，都释放播放锁
                    this._isPlayingSong = false;
                    if (this._playLockTimeout) {
                        clearTimeout(this._playLockTimeout);
                        this._playLockTimeout = null;
                    }
                    console.log('[RadioFlow] Play lock released for:', song.name);
                }
            },

            // Show login required message
            showLoginRequiredMessage() {
                console.log('[RadioFlow] Showing login required message');
                const loginMessage = '请先登录网易云音乐账号才能播放歌曲。请点击页面上的"登录网易云音乐"按钮完成登录。';

                // Add system message to chat
                this.addChatMessage('🔐 ' + loginMessage, false);

                // Show confirm dialog
                alert(loginMessage);
            },

            // Skip to next song after playback failure (no outro, just intro for next song)
            async skipToNextSongAfterFailure() {
                console.log('[RadioFlow] skipToNextSongAfterFailure called');
                
                // 【关键修复】清理 monitor 相关的状态
                if (this._monitorSongInterval) {
                    console.log('[RadioFlow] Clearing monitor interval in skipToNextSongAfterFailure');
                    clearInterval(this._monitorSongInterval);
                    this._monitorSongInterval = null;
                }
                this._monitorSongActive = false;
                
                // First, record the skip to PlaylistService
                try {
                    const status = await API.playlistStatus();
                    if (status.success && status.status && status.status.current) {
                        const failedSong = status.status.current;
                        console.log('[RadioFlow] Recording skip for failed song:', failedSong.name);
                        await API.playlistRecordSkip(failedSong.id, failedSong);
                    }
                } catch (e) {
                    console.warn('[RadioFlow] Failed to record skip for failed song:', e);
                }
                
                // 直接播放下一首（使用 PlaylistService API）
                console.log('[RadioFlow] Skipping to next song after failure...');
                await this.playNextFromPlaylist();
            },

            async playRecommendedSong() {
                console.log('[RadioFlow] playRecommendedSong called (fallback mode)');

                // 如果有缓存的歌单，直接从歌单选择歌曲播放
                if (this.playlist && this.playlist.length > 0) {
                    console.log('[RadioFlow] Using cached playlist, selecting random song');
                    const randomIndex = Math.floor(Math.random() * this.playlist.length);
                    const song = this.playlist[randomIndex];
                    console.log('[RadioFlow] Selected random song:', song.name);
                    this.actuallyPlaySong(song);
                    return;
                }

                const blockedSongs = Array.from(this.blockedSongs);
                const response = await API.playRecommend(blockedSongs);
                if (response.success) {
                    console.log('[RadioFlow] Recommended song playing:', response.song?.name);
                    this.updateCurrentSong(response.song);
                    this.setPlaying(true);
                    // Monitor song progress for fallback mode too
                    this.monitorSongProgress();
                } else if (response.loginRequired) {
                    console.error('[RadioFlow] playRecommend returned login required');
                    this.showLoginRequiredMessage();
                    this.setPlaying(false);
                    this.radioState = 'idle';
                } else {
                    console.error('[RadioFlow] playRecommend failed:', response);
                }
            },

            monitorSongProgress() {
                console.log('[RadioFlow] monitorSongProgress started (方案1: 前端独立状态管理)');
                
                // 【关键修复1】先清理旧的定时器，再初始化变量
                if (this._monitorSongInterval) {
                    console.log('[RadioFlow] Existing monitorSongProgress found, clearing first');
                    clearInterval(this._monitorSongInterval);
                    this._monitorSongInterval = null;
                }
                
                // 【关键修复2】加一个 active 标志，防止重复进入
                if (this._monitorSongActive) {
                    console.log('[RadioFlow] monitorSongProgress is already active, skipping');
                    return;
                }
                this._monitorSongActive = true;
                
                // 初始化局部变量
                let pollCount = 0;
                let hasStartedPlaying = false;
                let songStartTime = null;
                let lastProgress = 0;
                let progressStuckCount = 0;
                let isPlayingFalseCount = 0;
                
                // 获取当前歌曲信息
                const currentSong = this.playlist[this.currentSongIndex];
                // 估算歌曲时长，确保 duration 是合理的毫秒数
                let durationMs = currentSong?.duration || 180000;
                // 安全检查：如果 duration 超过1小时，说明可能有问题
                if (durationMs > 3600000) {
                    // 如果 duration 小于 10000，可能是以秒为单位的，乘以1000
                    if (durationMs < 10000) {
                        durationMs = durationMs * 1000;
                    } else {
                        // 太大了，用默认的4分钟
                        durationMs = 240000;
                    }
                }
                const estimatedDuration = durationMs;
                console.log('[RadioFlow] Estimated song duration:', estimatedDuration, 'ms for:', currentSong?.name);
                
                // Poll for song completion
                this._monitorSongInterval = setInterval(async () => {
                    // 【关键修复3】每次循环都检查 active 标志
                    if (!this._monitorSongActive) {
                        console.log('[RadioFlow] monitorSongProgress not active, clearing interval');
                        clearInterval(this._monitorSongInterval);
                        this._monitorSongInterval = null;
                        return;
                    }
                    
                    pollCount++;
                    
                    // 如果 this.isPlaying 为 false，先不要立即停止，再检查几次！
                    if (!this.isPlaying) {
                        isPlayingFalseCount++;
                        console.log('[RadioFlow] isPlaying=false count:', isPlayingFalseCount);
                        
                        // 只有连续3次 isPlaying 都是 false，才停止监控
                        if (isPlayingFalseCount < 3) {
                            console.log('[RadioFlow] isPlaying is false but continuing to check...');
                            return;
                        }

                        console.log('[RadioFlow] Song monitoring stopped (isPlaying=false), polls:', pollCount);
                        clearInterval(this._monitorSongInterval);
                        this._monitorSongInterval = null;
                        this._monitorSongActive = false; // 释放 active 标志
                        
                        // 关键：判断是播放失败还是正常结束！
                        const elapsedSinceStart = songStartTime ? (Date.now() - songStartTime) : 0;
                        const elapsedPercent = estimatedDuration > 0 ? (elapsedSinceStart / estimatedDuration) * 100 : 0;
                        console.log('[RadioFlow] Playback stopped - hasStartedPlaying:', hasStartedPlaying, 'elapsed:', elapsedSinceStart + 'ms (', elapsedPercent.toFixed(1) + '%), estimatedDuration:', estimatedDuration + 'ms');
                        
                        // 判断播放失败的条件：
                        // 1. 还没开始播放（hasStartedPlaying=false）
                        // OR
                        // 2. 播放时间 <30秒
                        // OR
                        // 3. 播放时间 < 歌曲总时长的10%
                        const isFailure = !hasStartedPlaying || 
                                          (songStartTime && elapsedSinceStart < 30000) || 
                                          (songStartTime && elapsedPercent < 10);
                        
                        if (isFailure) {
                            console.log('[RadioFlow] Detected playback failure!');
                            this.skipToNextSongAfterFailure();
                        } else {
                            // 判断是否是正常播放完成（进度≥95%或已超过预估时长）
                            const lastEffectiveProgress = lastProgress || 0;
                            const shouldTriggerOutro = lastEffectiveProgress > 90 || elapsedSinceStart > estimatedDuration;
                            
                            if (shouldTriggerOutro) {
                                console.log('[RadioFlow] Detected normal song completion! Triggering outro.');
                                this.onSongFinished();
                            } else {
                                console.log('[RadioFlow] Playback stopped prematurely but not failure, skipping.');
                            }
                        }
                        return;
                    }
                    
                    // 如果 isPlaying 回到 true，重置计数器
                    isPlayingFalseCount = 0;
                    
                    try {
                        const status = await API.getStatus();
                        if (status.success && status.status) {
                            const progress = status.status.progress || 0;
                            const isPlayingStatus = status.status.isPlaying;
                            
                            // 方案1: 前端独立状态判断
                            // 1. 标记歌曲开始 - 基于进度或时间
                            if (!hasStartedPlaying) {
                                if (progress > 0.5) {
                                    // 进度超过0.5%就标记开始，更宽松
                                    hasStartedPlaying = true;
                                    songStartTime = Date.now();
                                    console.log('[RadioFlow] Song started (progress > 0.5%):', progress.toFixed(1) + '%');
                                } else if (pollCount >= 5) {
                                    // 25秒后强制标记为开始
                                    hasStartedPlaying = true;
                                    songStartTime = Date.now();
                                    console.log('[RadioFlow] Song started (forced after 25s)');
                                }
                            }
                            
                            // 2. 检测进度是否卡住（ncm-cli 可能报告进度为0但音乐在播放）
                            // ⚠️ 注意：这里用的是原始 progress，不是 effectiveProgress，因为我们要检测 ncm-cli 报告的进度是否卡住
                            if (hasStartedPlaying && progress === lastProgress && progress > 0) {
                                progressStuckCount++;
                            } else {
                                progressStuckCount = 0;
                            }
                            
                            // 3. 计算基于时间的进度（当 ncm-cli 进度不可靠时）
                            let effectiveProgress = progress;
                            // 只有当进度完全卡住（连续5次不变），才用前端估算
                            if (hasStartedPlaying && songStartTime && progressStuckCount >= 5 && progress < 90) {
                                // 如果进度卡住，使用基于时间的估算
                                const elapsed = Date.now() - songStartTime;
                                const timeBasedProgress = (elapsed / estimatedDuration) * 100;
                                effectiveProgress = timeBasedProgress;
                                console.log('[RadioFlow] Progress stuck, using time-based estimate:', timeBasedProgress.toFixed(1) + '%');
                            }
                            
                            // ⭐ 更新 lastProgress 为 effectiveProgress，这样后面判断时用的是最新的进度
                            lastProgress = effectiveProgress;
                            
                            // 每30秒或前3次轮询记录日志
                            if (pollCount % 6 === 0 || pollCount <= 3) {
                                console.log(`[RadioFlow] Progress: ${progress.toFixed(1)}% (effective: ${effectiveProgress.toFixed(1)}%), ncmPlaying: ${isPlayingStatus}, hasStarted: ${hasStartedPlaying}, stuck: ${progressStuckCount}`);
                            }
                            
                            // 4. 判断歌曲是否结束 - 不依赖 ncm isPlaying 状态
                            let shouldTriggerOutro = false;
                            
                            // 【关键修复】更严格的判断：必须满足两个条件才会触发过渡
                            // 条件A: 进度超过95%
                            let conditionA = false;
                            if (hasStartedPlaying && effectiveProgress > 95) {
                                console.log('[RadioFlow] Song finish detected: progress > 95%');
                                conditionA = true;
                            }
                            
                            // 条件B: 基于时间的检测（歌曲预估时长已过）
                            let conditionB = false;
                            if (hasStartedPlaying && songStartTime) {
                                const elapsed = Date.now() - songStartTime;
                                if (elapsed > estimatedDuration + 10000) { // 给予10秒缓冲
                                    console.log('[RadioFlow] Song finish detected: duration exceeded (', elapsed, 'ms)');
                                    conditionB = true;
                                }
                            }
                            
                            // 条件C: 进度卡住检测（连续3次轮询进度不变，且超过预估时长的80%）
                            let conditionC = false;
                            if (hasStartedPlaying && progressStuckCount >= 3) {
                                const elapsed = Date.now() - songStartTime;
                                if (elapsed > estimatedDuration * 0.8) {
                                    console.log('[RadioFlow] Song finish detected: progress stuck for', progressStuckCount, 'polls');
                                    conditionC = true;
                                }
                            }
                            
                            // 必须至少满足两个条件才触发过渡，避免误判
                            shouldTriggerOutro = (conditionA && conditionB) || (conditionA && conditionC) || (conditionB && conditionC);
                            if (shouldTriggerOutro) {
                                console.log('[RadioFlow] Triggering outro: multiple conditions met');
                            }
                            
                            if (shouldTriggerOutro) {
                                console.log('[RadioFlow] Song finished! effectiveProgress:', effectiveProgress.toFixed(1) + '%');
                                clearInterval(this._monitorSongInterval);
                                this._monitorSongInterval = null;
                                this._monitorSongActive = false; // 【关键修复】释放 active 标志
                                this.stopStatusPolling();
                                this.setPlaying(false);
                                this.onSongFinished();
                            }
                        }
                    } catch (e) {
                        console.error('[RadioFlow] Status check error:', e.message);
                        // 错误时不停止轮询，继续尝试
                    }
                }, 5000);
            },

            async onSongFinished(retryCount = 0) {
                // 【关键修复】防止 onSongFinished 被同时调用多次
                if (this._onSongFinishedLock) {
                    console.log('[RadioFlow] onSongFinished already running, skipping duplicate call');
                    return;
                }
                this._onSongFinishedLock = true;
                console.log('[RadioFlow] onSongFinished called');
                
                // 获取当前播放的歌曲
                let currentSong;
                try {
                    const status = await API.playlistStatus();
                    if (status.success && status.status && status.status.current) {
                        currentSong = status.status.current;
                        
                        // 记录完整播放到 PlaylistService
                        await API.playlistRecordFullPlay(currentSong.id, currentSong);
                        console.log('[RadioFlow] Recorded full play for:', currentSong.name);
                    }
                } catch (e) {
                    console.error('[RadioFlow] Failed to get current song for onSongFinished:', e);
                }
                
                // 如果没有通过 API 获取到歌曲，尝试从本地获取
                if (!currentSong) {
                    currentSong = this.playlist[this.currentSongIndex];
                }
                
                if (!currentSong) {
                    console.error('[RadioFlow] No song found for outro');
                    this._onSongFinishedLock = false;
                    await this.playNextFromPlaylist();
                    return;
                }
                
                this.radioState = 'outro';
                console.log('[RadioFlow] State changed to: outro');
                console.log('[RadioFlow] Current song for outro:', currentSong.name);
                
                // 尝试获取下一首歌曲
                let nextSong;
                try {
                    const status = await API.playlistStatus();
                    if (status.success && status.status && status.status.queued && status.status.queued.length > 0) {
                        nextSong = status.status.queued[0];
                    }
                } catch (e) {
                    console.error('[RadioFlow] Failed to get next song for outro:', e);
                }
                
                const maxRetries = 2;
                const retryDelay = 1500;
                
                console.log('[RadioFlow] Generating transition from:', currentSong.name, 'to:', nextSong?.name || 'none');
                console.time('[RadioFlow] Song transition generation');
                
                // Generate combined outro + next song intro
                try {
                    console.log('[RadioFlow] Fetching song transition from API...');
                    let response;
                    try {
                        response = await API.postNoRetry('/api/radio/song-transition', { 
                            currentSong,
                            nextSong,
                            mode: 'radio'
                        });
                    } catch (transitionError) {
                        console.log('[RadioFlow] Transition API not available (', transitionError.message, '), falling back to outro API...');
                        response = await API.post('/api/radio/song-outro', { song: currentSong });
                    }
                    
                    console.log('[RadioFlow] Song transition API response:', response.success ? 'success' : 'failed', response.error || '');
                    
                    if (response.success && response.script) {
                        console.log('[RadioFlow] Song transition received, length:', response.script.length);

                        const estimatedDuration = response.script.length * 250 + 10000;
                        const timeoutDuration = Math.max(estimatedDuration, 30000);

                        let ttsCompleted = false;
                        const ttsTimeout = setTimeout(() => {
                            if (!ttsCompleted) {
                                console.warn('[RadioFlow] TTS onEnd timeout, forcing next song');
                                ttsCompleted = true;
                                this._onSongFinishedLock = false;
                                this.playNextFromPlaylist();
                            }
                        }, timeoutDuration);

                        RadioHost.speakWithSync(response.script, {
                            onStart: () => console.log('[RadioFlow] Song transition TTS started'),
                            onEnd: () => {
                                if (ttsCompleted) return;
                                ttsCompleted = true;
                                clearTimeout(ttsTimeout);
                                console.log('[RadioFlow] Song transition TTS ended');
                                console.timeEnd('[RadioFlow] Song transition generation');
                                this._onSongFinishedLock = false;
                                this.playNextFromPlaylist();
                            }
                        });
                    } else {
                        console.warn('[RadioFlow] Song transition API returned no script, skipping to next song');
                        this._onSongFinishedLock = false;
                        this.playNextFromPlaylist();
                    }
                } catch (error) {
                    console.error('[RadioFlow] Song transition error:', error);
                    console.timeEnd('[RadioFlow] Song transition generation');
                    
                    if (retryCount < maxRetries) {
                        console.log(`[RadioFlow] Retrying onSongFinished in ${retryDelay}ms... (${retryCount + 1}/${maxRetries})`);
                        this._onSongFinishedLock = false;
                        await this.sleep(retryDelay);
                        return this.onSongFinished(retryCount + 1);
                    }
                    
                    console.warn('[RadioFlow] Max retries reached, skipping to next song');
                    this._onSongFinishedLock = false;
                    this.playNextFromPlaylist();
                }
            },

            async onPlaylistFinished() {
                console.log('[RadioFlow] onPlaylistFinished called, continuing with new playlist...');
                
                // Instead of ending, generate a transition message and get new playlist
                try {

                    ];
                    const transitionMsg = transitionMessages[Math.floor(Math.random() * transitionMessages.length)];
                    
                    // 确保 TTS 的 onEnd 总是被调用
                    let transitionTtsCompleted = false;
                    const transitionTtsTimeout = setTimeout(async () => {
                        if (!transitionTtsCompleted) {
                            console.warn('[RadioFlow] Transition TTS onEnd timeout, forcing fetch new playlist');
                            transitionTtsCompleted = true;
                            await this.fetchNewPlaylistAndContinue();
                        }
                    }, 15000); // 15秒超时
                    
                    RadioHost.speakWithSync(transitionMsg, {
                        onStart: () => console.log('[RadioFlow] Transition message TTS started'),
                        onEnd: async () => {
                            if (transitionTtsCompleted) return; // 已经通过超时调用了
                            transitionTtsCompleted = true;
                            clearTimeout(transitionTtsTimeout);
                            console.log('[RadioFlow] Transition message ended, fetching new playlist...');
                            await this.fetchNewPlaylistAndContinue();

            updateCurrentSong(song) {

                const now = Date.now();
                if (this._lastUpdateSongTime && (now - this._lastUpdateSongTime) < 500) {
                    if (this.currentSong?.name === song?.name && this.currentSong?.artist === song?.artist) {
                        console.log('[updateCurrentSong] Ignoring duplicate call for same song within 500ms');
                        return;
                    }
                }
                this._lastUpdateSongTime = now;

                // 处理无效歌曲数据
                if (!song || (!song.name && !song.artist)) {
                    console.warn('[updateCurrentSong] Invalid song data:', song);
                    return;

            initWaveCanvas() {
                const canvas = document.getElementById('radioWaveCanvas');
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                let time = 0;
                this.wavePlaying = false;
                this.waveAmplitude = 10; // 【新增】当前振幅
                this.waveTargetAmplitude = 10; // 【新增】目标振幅

                const draw = () => {
                    ctx.clearRect(0, 0, width, height);

                    // 【优化】平滑过渡振幅
                    this.waveAmplitude += (this.waveTargetAmplitude - this.waveAmplitude) * 0.1;

                    // Draw wave lines
                    ctx.strokeStyle = 'rgba(41, 255, 184, 0.6)';
                    ctx.lineWidth = 2;

                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        for (let x = 0; x < width; x += 2) {
                            // 【优化】使用平滑后的振幅
                            const amplitude = this.waveAmplitude + i * 5;
                            const frequency = 0.02 + i * 0.005;
                            const y = height / 2 + Math.sin(x * frequency + time + i) * amplitude * Math.sin(x / width * Math.PI);

                            if (x === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.stroke();
                    }

                    // 【优化】根据播放状态调整时间增量
                    const targetSpeed = this.wavePlaying ? 0.1 : 0.02;
                    time += targetSpeed;
                    requestAnimationFrame(draw);
                };

                draw();
            },

            async sendChatMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;

                // Add user message
                this.addChatMessage(text, true);
                input.value = '';

                // Get AI response
                try {
                    // 传入被屏蔽的歌曲列表
                    const blockedSongs = Array.from(this.blockedSongs);
                    const response = await API.chat(text, blockedSongs);
                    if (response.success) {
                        // Handle different action types
                        if (response.action === 'recommend' && response.recommendedSongs && response.recommendedSongs.length > 0) {
                            // Show recommendation cards
                            this.addRecommendationMessage(response.message, response.recommendedSongs, response.autoPlayTimeout);
                        } else if (response.action === 'play' && response.song) {
                            // Direct play - show message and update player
                            this.addChatMessage(response.message, false);
                            this.updateCurrentSong(response.song);
                            this.setPlaying(true);
                        } else {
                            // Regular chat message
                            this.addChatMessage(response.message, false);
                        }
                    }
                } catch (error) {
                    console.error('Chat error:', error);
                }
            },

            // Add recommendation message with song cards
            addRecommendationMessage(text, songs, autoPlayTimeout = 30000) {
                const container = document.getElementById('chatContainer');
                const now = new Date();
                const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                message.innerHTML = `

                container.appendChild(message);
                container.scrollTop = container.scrollHeight;
                
                // Add click handlers for song cards
                const cards = message.querySelectorAll('.song-card');
                let autoPlayCancelled = false;

                const playSong = async (index, card) => {
                    if (autoPlayCancelled) return;
                    autoPlayCancelled = true;
                    userSelectedSong = true;

                    const song = songs[index];

                    // Update UI
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // Hide countdown
                    const countdown = message.querySelector('.auto-play-countdown');
                    if (countdown) countdown.style.display = 'none';

                    // Play song
                    try {
                        const result = await API.play(song.id, song.encryptedId);

                        // Check if play failed
                        if (!result.success) {
                            throw new Error(result.message || result.error || '播放失败');
                        }

                        this.updateCurrentSong(song);
                        this.setPlaying(true);

                        // Show playing indicator
                        const playBtn = card.querySelector('.song-card-play');
                        if (playBtn) playBtn.textContent = '♪';

                        // 添加正在播放的消息
                        this.addChatMessage(`正在为你播放 **《${song.name}》** — ${song.artist}`, false);
                    } catch (error) {
                        console.error('Failed to play song:', error);

                        // Show error message in chat and recommend alternatives
                        const errorMessage = error.message || '播放失败';
                        let userFriendlyError = '播放失败';

                        // Map error codes to user-friendly messages
                        if (errorMessage.includes('ncm_not_logged_in')) {
                            userFriendlyError = '播放失败，因为需要先登录网易云音乐';
                        } else if (errorMessage.includes('missing_encrypted_id')) {
                            userFriendlyError = '播放失败，因为无法获取歌曲播放信息（可能因版权问题）';
                        } else if (errorMessage.includes('copyright') || errorMessage.includes('版权')) {
                            userFriendlyError = '播放失败，因为歌曲版权受限';
                        } else if (errorMessage.includes('network') || errorMessage.includes('网络')) {
                            userFriendlyError = '播放失败，因为网络连接问题';
                        } else {
                            userFriendlyError = `播放失败，因为${errorMessage}`;
                        }

                        // Add error message to chat
                        this.addChatMessage(`${userFriendlyError}。让我为你推荐其他类似的歌曲：`, false);

                        // Get song style/genre for similar recommendations
                        const songStyle = song.style || song.genre || this.inferSongStyle(song);

                        // Recommend 3 similar songs
                        this.recommendSimilarSongs(song, songStyle);

                cards.forEach((card, index) => {
                    card.addEventListener('click', () => playSong(index, card));

            addChatMessage(text, isUser) {
                const container = document.getElementById('chatContainer');
                const now = new Date();
                const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            /**
             * Infer song style based on song name, artist, or album
             */
            inferSongStyle(song) {
                const text = `${song.name} ${song.artist} ${song.album || ''}`.toLowerCase();
                
                // Jazz keywords
                if (/jazz|爵士|萨克斯|蓝调|blues/.test(text)) return 'jazz';
                
                // Classical keywords
                if (/classical|古典|钢琴|piano|小提琴|violin|交响曲|symphony/.test(text)) return 'classical';
                
                // Rock keywords
                if (/rock|摇滚|金属|metal|乐队|band/.test(text)) return 'rock';
                
                // Pop keywords
                if (/pop|流行|热门|hit/.test(text)) return 'pop';
                
                // Folk keywords
                if (/folk|民谣|吉他|guitar/.test(text)) return 'folk';
                
                // Electronic keywords
                if (/electronic|电子|edm|电音|dance|舞曲/.test(text)) return 'electronic';
                
                // Light music keywords
                if (/light|轻音乐|纯音乐|instrumental|bgm|背景/.test(text)) return 'light';
                
                // Default to pop
                return 'pop';
            },

            /**
             * Recommend similar songs when playback fails
             */
            async recommendSimilarSongs(failedSong, style) {
                try {
                    // Search for similar songs based on style
                    const styleKeywords = {
                        'jazz': ['爵士', 'jazz', '萨克斯'],
                        'classical': ['古典', '钢琴', 'classical', 'piano'],
                        'rock': ['摇滚', 'rock', '乐队'],
                        'pop': ['流行', 'pop', '热门'],
                        'folk': ['民谣', 'folk', '吉他'],
                        'electronic': ['电子', 'electronic', 'edm'],
                        'light': ['轻音乐', 'light', '纯音乐']
                    };
                    
                    const keywords = styleKeywords[style] || ['流行'];
                    const searchKeyword = keywords[Math.floor(Math.random() * keywords.length)];
                    
                    // Search for songs
                    const searchResponse = await API.search(searchKeyword, 10);
                    
                    if (!searchResponse.success || !searchResponse.data || searchResponse.data.length === 0) {
                        this.addChatMessage('抱歉，暂时找不到类似的歌曲。你可以尝试搜索其他风格。', false);
                        return;
                    }
                    
                    // Filter out the failed song and select 3 random songs
                    const similarSongs = searchResponse.data
                        .filter(s => s.id !== failedSong.id)
                        .slice(0, 3);
                    
                    if (similarSongs.length === 0) {
                        this.addChatMessage('抱歉，暂时找不到类似的歌曲。你可以尝试搜索其他风格。', false);
                        return;
                    }
                    
                    // Build recommendation message
                    let message = `为你推荐${similarSongs.length}首类似的${style === 'pop' ? '流行' : style === 'jazz' ? '爵士' : style === 'classical' ? '古典' : style === 'rock' ? '摇滚' : style === 'folk' ? '民谣' : style === 'electronic' ? '电子' : '轻音乐'}歌曲：\n\n`;
                    similarSongs.forEach((song, index) => {
                        message += `${index + 1}. **《${song.name}》** — ${song.artist}\n`;
                    });
                    message += '\n点击卡片选择你想听的~';
                    
                    // Add recommendation with cards
                    this.addRecommendationMessage(message, similarSongs, 30000);
                    
                } catch (error) {
                    console.error('Failed to recommend similar songs:', error);
                    this.addChatMessage('抱歉，推荐歌曲时出错了。你可以直接告诉我你想听什么类型的音乐。', false);
                }
            },

            startStatusPolling() {

                this.statusPollInterval = setInterval(() => this.loadStatus(), 3000);
                // 【禁用】平滑进度动画，避免进度忽快忽慢，完全信任后端返回的进度

            stopStatusPolling() {

                    this.statusPollInterval = null;

                // 【新增】停止平滑进度动画
