<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模式切换语音暂停测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .test-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4fc3f7;
        }
        .status-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            color: #aaa;
        }
        .status-value {
            color: #4fc3f7;
            font-weight: bold;
        }
        .status-value.speaking {
            color: #4caf50;
        }
        .status-value.paused {
            color: #ff9800;
        }
        .status-value.stopped {
            color: #f44336;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
        }
        .log-container {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .log-entry.info {
            color: #4fc3f7;
        }
        .log-entry.success {
            color: #4caf50;
        }
        .log-entry.error {
            color: #f44336;
        }
        .log-entry.warn {
            color: #ff9800;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .test-result.pass {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        .test-result.fail {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
        .test-result.pending {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ff9800;
        }
        .mode-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-radio {
            background: #4caf50;
        }
        .mode-chat {
            background: #2196f3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 模式切换语音暂停功能测试</h1>
        
        <div class="test-section">
            <h2>📊 当前状态</h2>
            <div class="status-box">
                <div class="status-item">
                    <span class="status-label">当前模式:</span>
                    <span class="status-value" id="currentMode">
                        <span class="mode-indicator mode-radio">电台模式</span>
                    </span>
                </div>
                <div class="status-item">
                    <span class="status-label">TTS 状态:</span>
                    <span class="status-value stopped" id="ttsStatus">未开始</span>
                </div>
                <div class="status-item">
                    <span class="status-label">是否暂停:</span>
                    <span class="status-value" id="pauseStatus">否</span>
                </div>
                <div class="status-item">
                    <span class="status-label">最后操作:</span>
                    <span class="status-value" id="lastAction">-</span>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>🎮 手动测试</h2>
            <div class="btn-group">
                <button class="btn-primary" onclick="startTTS()">▶️ 开始播放语音</button>
                <button class="btn-secondary" onclick="switchToChat()">💬 切换到聊天模式</button>
                <button class="btn-secondary" onclick="switchToRadio()">📻 切换回电台模式</button>
                <button class="btn-danger" onclick="stopTTS()">⏹️ 停止播放</button>
            </div>
        </div>

        <div class="test-section">
            <h2>🤖 自动测试</h2>
            <div class="btn-group">
                <button class="btn-primary" onclick="runAutoTest()">🚀 运行自动测试</button>
                <button class="btn-secondary" onclick="clearLogs()">🗑️ 清空日志</button>
            </div>
            <div class="test-result pending" id="testResult">等待测试...</div>
        </div>

        <div class="test-section">
            <h2>📝 测试日志</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // 模拟 TTS 服务
        const MockTTSService = {
            isSpeaking: false,
            isPaused: false,
            audioContext: null,
            oscillator: null,
            gainNode: null,
            
            speak(text, options = {}) {
                log('开始播放 TTS: ' + text.substring(0, 30) + '...', 'info');
                this.isSpeaking = true;
                this.isPaused = false;
                updateStatus();
                
                // 模拟音频播放
                this.simulateAudioPlayback(options);
                
                return Promise.resolve();
            },
            
            simulateAudioPlayback(options) {
                // 创建简单的蜂鸣声模拟语音
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.oscillator = this.audioContext.createOscillator();
                    this.gainNode = this.audioContext.createGain();
                    
                    this.oscillator.connect(this.gainNode);
                    this.gainNode.connect(this.audioContext.destination);
                    
                    this.oscillator.frequency.value = 440;
                    this.gainNode.gain.value = 0.1;
                    
                    this.oscillator.start();
                    
                    // 10秒后自动停止
                    setTimeout(() => {
                        if (this.isSpeaking && !this.isPaused) {
                            this.stop();
                            if (options.onEnd) options.onEnd();
                        }
                    }, 10000);
                    
                } catch (e) {
                    log('音频播放失败: ' + e.message, 'error');
                }
            },
            
            pause() {
                if (this.isSpeaking && !this.isPaused) {
                    log('⏸️ TTS 已暂停', 'warn');
                    this.isPaused = true;
                    if (this.gainNode) {
                        this.gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
                    }
                    updateStatus();
                    return true;
                }
                return false;
            },
            
            resume() {
                if (this.isSpeaking && this.isPaused) {
                    log('▶️ TTS 已恢复', 'success');
                    this.isPaused = false;
                    if (this.gainNode) {
                        this.gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    }
                    updateStatus();
                    return true;
                }
                return false;
            },
            
            stop() {
                log('⏹️ TTS 已停止', 'error');
                this.isSpeaking = false;
                this.isPaused = false;
                if (this.oscillator) {
                    this.oscillator.stop();
                    this.oscillator = null;
                }
                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }
                updateStatus();
            }
        };

        // 模拟应用状态
        const MockAppState = {
            currentMode: 'radio',
            hermesPaused: false,
            
            setMode(mode) {
                const oldMode = this.currentMode;
                this.currentMode = mode;
                log(`模式切换: ${oldMode} -> ${mode}`, 'info');
                
                if (mode === 'chat' && oldMode === 'radio') {
                    // 切换到聊天模式时暂停电台语音
                    if (MockTTSService.isSpeaking) {
                        log('检测到切换到聊天模式，暂停电台语音...', 'warn');
                        MockTTSService.pause();
                        this.hermesPaused = true;
                    }
                } else if (mode === 'radio' && oldMode === 'chat') {
                    // 切换回电台模式时恢复语音
                    if (this.hermesPaused) {
                        log('检测到切换回电台模式，恢复语音播放...', 'success');
                        MockTTSService.resume();
                        this.hermesPaused = false;
                    }
                }
                
                updateStatus();
            }
        };

        // 日志系统
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // 更新状态显示
        function updateStatus() {
            const modeEl = document.getElementById('currentMode');
            const ttsStatusEl = document.getElementById('ttsStatus');
            const pauseStatusEl = document.getElementById('pauseStatus');
            
            // 更新模式显示
            if (MockAppState.currentMode === 'radio') {
                modeEl.innerHTML = '<span class="mode-indicator mode-radio">电台模式</span>';
            } else {
                modeEl.innerHTML = '<span class="mode-indicator mode-chat">聊天模式</span>';
            }
            
            // 更新 TTS 状态
            if (MockTTSService.isSpeaking) {
                if (MockTTSService.isPaused) {
                    ttsStatusEl.textContent = '已暂停';
                    ttsStatusEl.className = 'status-value paused';
                } else {
                    ttsStatusEl.textContent = '播放中';
                    ttsStatusEl.className = 'status-value speaking';
                }
            } else {
                ttsStatusEl.textContent = '未开始';
                ttsStatusEl.className = 'status-value stopped';
            }
            
            // 更新暂停状态
            pauseStatusEl.textContent = MockAppState.hermesPaused ? '是' : '否';
        }

        // 按钮操作
        function startTTS() {
            MockTTSService.speak('这是一段测试语音，用于验证模式切换时语音是否正确暂停。', {
                onEnd: () => {
                    log('TTS 播放完成', 'success');
                }
            });
            document.getElementById('lastAction').textContent = '开始播放语音';
        }

        function switchToChat() {
            MockAppState.setMode('chat');
            document.getElementById('lastAction').textContent = '切换到聊天模式';
        }

        function switchToRadio() {
            MockAppState.setMode('radio');
            document.getElementById('lastAction').textContent = '切换回电台模式';
        }

        function stopTTS() {
            MockTTSService.stop();
            document.getElementById('lastAction').textContent = '停止播放';
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            log('日志已清空', 'info');
        }

        // 自动测试
        async function runAutoTest() {
            const resultEl = document.getElementById('testResult');
            resultEl.className = 'test-result pending';
            resultEl.textContent = '测试进行中...';
            
            log('========== 开始自动测试 ==========', 'info');
            
            let testPassed = true;
            
            // 测试步骤 1: 确保初始状态
            log('步骤 1: 重置初始状态', 'info');
            MockTTSService.stop();
            MockAppState.currentMode = 'radio';
            MockAppState.hermesPaused = false;
            await sleep(500);
            
            // 测试步骤 2: 开始播放语音
            log('步骤 2: 开始播放语音', 'info');
            startTTS();
            await sleep(1000);
            
            if (!MockTTSService.isSpeaking) {
                log('❌ 语音未能开始播放', 'error');
                testPassed = false;
            } else {
                log('✅ 语音开始播放', 'success');
            }
            
            // 测试步骤 3: 切换到聊天模式
            log('步骤 3: 切换到聊天模式', 'info');
            switchToChat();
            await sleep(500);
            
            if (MockTTSService.isSpeaking && !MockTTSService.isPaused) {
                log('❌ 切换到聊天模式后语音未暂停', 'error');
                testPassed = false;
            } else if (MockTTSService.isPaused) {
                log('✅ 切换到聊天模式后语音已暂停', 'success');
            }
            
            // 测试步骤 4: 切换回电台模式
            log('步骤 4: 切换回电台模式', 'info');
            switchToRadio();
            await sleep(500);
            
            if (MockTTSService.isSpeaking && MockTTSService.isPaused) {
                log('❌ 切换回电台模式后语音未恢复', 'error');
                testPassed = false;
            } else if (MockTTSService.isSpeaking && !MockTTSService.isPaused) {
                log('✅ 切换回电台模式后语音已恢复', 'success');
            }
            
            // 测试步骤 5: 停止播放
            log('步骤 5: 停止播放', 'info');
            stopTTS();
            await sleep(500);
            
            if (MockTTSService.isSpeaking) {
                log('❌ 语音未能停止', 'error');
                testPassed = false;
            } else {
                log('✅ 语音已停止', 'success');
            }
            
            // 显示测试结果
            if (testPassed) {
                resultEl.className = 'test-result pass';
                resultEl.textContent = '✅ 测试通过！模式切换语音暂停功能正常工作';
                log('========== 测试通过 ==========', 'success');
            } else {
                resultEl.className = 'test-result fail';
                resultEl.textContent = '❌ 测试失败！请检查实现';
                log('========== 测试失败 ==========', 'error');
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化
        log('测试页面已加载', 'info');
        log('服务器状态: 运行中 (端口 6688)', 'success');
        updateStatus();
    </script>
</body>
</html>
